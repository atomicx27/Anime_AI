<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Matchmaker AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }

        body {
            background-color: #0f172a; /* slate-900 */
            background-image: radial-gradient(circle at 20% 30%, rgba(236, 72, 153, 0.15) 0%, transparent 40%),
                              radial-gradient(circle at 80% 70%, rgba(139, 92, 246, 0.15) 0%, transparent 40%);
            color: #f8fafc; /* slate-50 */
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 10% 20%, rgba(236, 72, 153, 0.1), transparent 40%),
                              radial-gradient(circle at 90% 80%, rgba(168, 85, 247, 0.1), transparent 40%);
            background-attachment: fixed;
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1e293b;
        }
        ::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }

        .terminal-container {
            background-color: #020617;
            border: 1px solid #334155;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5), 0 2px 4px -1px rgba(0, 0, 0, 0.3);
        }

        .log-entry {
            opacity: 0;
            animation: fadeIn 0.3s forwards;
            padding-left: 1rem;
            text-indent: -1rem;
        }

        .log-timestamp {
            color: #64748b;
            font-size: 0.8em;
            margin-right: 0.5rem;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .card-enter {
            opacity: 0;
            transform: translateY(20px);
            animation: slideUp 0.5s forwards ease-out;
        }

        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .pulse-dot {
            height: 8px;
            width: 8px;
            background-color: #10b981;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }

        .match-badge {
            background: linear-gradient(135deg, #ec4899 0%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: bold;
        }

        .btn-gradient {
            background: linear-gradient(135deg, #ec4899 0%, #8b5cf6 100%);
            transition: all 0.3s ease;
        }
        .btn-gradient:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(139, 92, 246, 0.5);
        }
        .btn-gradient:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="min-h-screen flex flex-col items-center py-10 px-4 md:px-8 relative font-sans">

    <!-- Ambient Background Decoration -->
    <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_top_left,_var(--tw-gradient-stops))] from-violet-900/20 via-slate-900 to-slate-900 -z-10"></div>
    <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_bottom_right,_var(--tw-gradient-stops))] from-pink-900/20 via-transparent to-transparent -z-10"></div>

    <div class="max-w-6xl w-full relative z-10">
        <!-- Header -->
        <header class="text-center mb-12">
            <h1 class="text-5xl font-extrabold mb-4 tracking-tight drop-shadow-[0_0_15px_rgba(236,72,153,0.3)]">
                <span class="text-transparent bg-clip-text bg-gradient-to-r from-pink-400 via-violet-400 to-indigo-400">
                    Anime Matchmaker AI
                </span>
            </h1>
            <p class="text-slate-300/80 text-lg max-w-2xl mx-auto font-medium">
                Enter your personality profile and what you're looking for. Our AI agent will analyze the character database to find your perfect match.
            </p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">

            <!-- Left Column: Input Form & Terminal -->
            <div class="lg:col-span-1 flex flex-col gap-6">

                <!-- Input Panel -->
                <div class="bg-slate-800/40 backdrop-blur-xl rounded-xl p-6 border border-slate-700/50 shadow-xl">
                    <h2 class="text-xl font-semibold mb-4 flex items-center">
                        <i class="fas fa-user-circle mr-2 text-pink-400"></i> Your Profile
                    </h2>

                    <div class="mb-4 relative z-10">
                        <label for="profileInput" class="block text-sm font-medium text-slate-300 mb-2">Describe yourself (Personality, hobbies, goals):</label>
                        <textarea id="profileInput" rows="4" class="w-full bg-slate-800/60 border border-slate-600/50 rounded-xl p-3 text-slate-100 focus:ring-2 focus:ring-violet-500 focus:border-transparent transition-all placeholder-slate-500 resize-none hover:bg-slate-800/80 shadow-inner" placeholder="E.g., I'm a quiet introvert who enjoys reading and peace, but I deeply admire people with strong ambition and drive..."></textarea>
                    </div>

                    <div class="mb-6 relative z-10">
                        <label for="relationshipType" class="block text-sm font-medium text-slate-300 mb-2">Looking for:</label>
                        <select id="relationshipType" class="w-full bg-slate-800/60 border border-slate-600/50 rounded-xl p-3 text-slate-100 focus:ring-2 focus:ring-violet-500 focus:border-transparent transition-all hover:bg-slate-800/80 shadow-inner">
                            <option value="friendship">Friendship / Best Friend</option>
                            <option value="romantic">Romantic Partner</option>
                            <option value="rival">Rival / Competitor</option>
                            <option value="mentor">Mentor / Student</option>
                        </select>
                    </div>

                    <button id="findMatchesBtn" class="w-full bg-gradient-to-r from-pink-500 to-violet-500 hover:from-pink-400 hover:to-violet-400 text-white font-bold py-3.5 px-4 rounded-xl flex justify-center items-center shadow-[0_0_15px_rgba(236,72,153,0.4)] hover:shadow-[0_0_25px_rgba(236,72,153,0.6)] transform hover:-translate-y-0.5 transition-all">
                        <span>Find My Match</span>
                        <i class="fas fa-heart ml-2"></i>
                    </button>
                </div>

                <!-- Agent Terminal -->
                <div class="terminal-container bg-black/80 backdrop-blur-md rounded-2xl flex flex-col flex-grow h-[400px] border border-green-900/30 shadow-[inset_0_0_20px_rgba(0,0,0,0.5)] overflow-hidden">
                    <div class="bg-white/5 px-4 py-3 border-b border-white/5 flex items-center justify-between">
                        <div class="flex items-center space-x-2">
                            <span class="pulse-dot shadow-[0_0_8px_rgba(16,185,129,0.8)]"></span>
                            <span class="text-xs font-mono text-emerald-500/90 uppercase tracking-wider">Matchmaker Agent</span>
                        </div>
                        <div class="flex space-x-1.5">
                            <div class="w-2.5 h-2.5 rounded-full bg-slate-600/50"></div>
                            <div class="w-2.5 h-2.5 rounded-full bg-slate-600/50"></div>
                            <div class="w-2.5 h-2.5 rounded-full bg-slate-600/50"></div>
                        </div>
                    </div>
                    <div id="terminalLog" class="p-4 font-mono text-[11px] leading-relaxed text-slate-300 overflow-y-auto flex-grow space-y-1.5 opacity-90 custom-scrollbar">
                        <div class="text-slate-500 italic">Waiting for user input...</div>
                    </div>
                </div>

            </div>

            <!-- Right Column: Results -->
            <div class="lg:col-span-2">
                <div class="glass-panel rounded-2xl p-6 shadow-inner min-h-full relative overflow-hidden">
                    <div class="flex items-center justify-between mb-8 border-b border-slate-700/50 pb-4">
                        <h2 class="text-2xl font-bold flex items-center text-white">
                            <i class="fas fa-star mr-3 text-yellow-400"></i> Top Matches
                        </h2>
                        <span id="matchStatus" class="text-sm text-pink-400 font-semibold uppercase tracking-wider hidden">Evaluation Complete</span>
                    </div>

                    <div id="resultsContainer" class="space-y-6 relative z-10">
                        <!-- Initial Placeholder -->
                        <div class="flex flex-col items-center justify-center h-64 text-slate-500 border-2 border-dashed border-slate-700/50 rounded-2xl bg-slate-800/20">
                            <i class="fas fa-search text-5xl mb-4 text-slate-600"></i>
                            <p class="font-medium tracking-wide">Fill out your profile and click "Find My Match"</p>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        const findMatchesBtn = document.getElementById('findMatchesBtn');
        const profileInput = document.getElementById('profileInput');
        const relationshipType = document.getElementById('relationshipType');
        const terminalLog = document.getElementById('terminalLog');
        const resultsContainer = document.getElementById('resultsContainer');
        const matchStatus = document.getElementById('matchStatus');

        function appendToTerminal(message, isImportant = false) {
            const now = new Date();
            const timeString = now.toLocaleTimeString([], { hour12: false, hour: '2-digit', minute:'2-digit', second:'2-digit' }) + '.' + now.getMilliseconds().toString().padStart(3, '0');

            const div = document.createElement('div');
            div.className = `log-entry ${isImportant ? 'text-emerald-400 font-bold' : ''}`;

            // Syntax highlighting for logs
            let formattedMessage = message;
            if (message.includes("Assessment:")) {
                formattedMessage = message.replace(/Assessment: (.*)/, 'Assessment: <span class="text-pink-400">$1</span>');
            } else if (message.includes("Evaluating")) {
                formattedMessage = message.replace(/Evaluating (.*)\.\.\./, 'Evaluating <span class="text-violet-300">$1</span>...');
            }

            div.innerHTML = `<span class="log-timestamp">[${timeString}]</span> > ${formattedMessage}`;
            terminalLog.appendChild(div);
            terminalLog.scrollTop = terminalLog.scrollHeight;
        }

        function createResultCard(match, index) {
            const delay = index * 0.15; // Staggered animation

            // Icon logic
            let icon = 'fa-user';
            let iconColor = 'text-slate-400';
            let glowColor = 'rgba(148, 163, 184, 0.2)';
            if (match.match_level.includes('Soulmate') || match.match_level.includes('Best')) { icon = 'fa-heart'; iconColor = 'text-pink-400'; glowColor = 'rgba(244, 114, 182, 0.2)'; }
            else if (match.match_level.includes('Great')) { icon = 'fa-star'; iconColor = 'text-yellow-400'; glowColor = 'rgba(250, 204, 21, 0.2)'; }
            else if (match.match_level.includes('Good')) { icon = 'fa-thumbs-up'; iconColor = 'text-blue-400'; glowColor = 'rgba(96, 165, 250, 0.2)'; }
            else if (match.match_level.includes('Incompatible')) { icon = 'fa-times-circle'; iconColor = 'text-red-400'; glowColor = 'rgba(248, 113, 113, 0.2)'; }

            return `
                <div class="card-enter glass-panel bg-slate-800/40 backdrop-blur-md rounded-lg p-5 border border-slate-700/50 hover:-translate-y-2 hover:shadow-[0_0_20px_rgba(236,72,153,0.3)] hover:shadow-pink-500/30 hover:border-violet-500/50 transition-all duration-300 relative overflow-hidden" style="animation-delay: ${delay}s">
                    <div class="absolute top-0 right-0 bg-slate-900/80 px-3 py-1 rounded-bl-lg border-b border-l border-slate-700/50 text-xs font-mono text-slate-400">
                        Rank #${index + 1} | Score: ${match.score}
                    </div>

                    <div class="flex items-start gap-5 relative z-10">
                        <div class="flex-shrink-0 w-14 h-14 rounded-full bg-black/40 flex items-center justify-center border border-white/10 shadow-[inset_0_2px_8px_rgba(0,0,0,0.3)] group-hover:scale-110 transition-transform duration-300">
                            <i class="fas ${icon} ${iconColor} text-2xl drop-shadow-[0_0_8px_${glowColor}]"></i>
                        </div>

                        <div class="flex-grow">
                            <div class="flex items-baseline justify-between mb-1.5 pr-28">
                                <h3 class="text-2xl font-bold text-slate-100 group-hover:text-white transition-colors">${match.name}</h3>
                            </div>

                            <div class="text-[11px] font-bold uppercase tracking-wider mb-4 match-badge inline-block bg-white/10 px-3 py-1 rounded-full border border-white/5">
                                ${match.match_level}
                            </div>

                            <div class="bg-black/30 rounded-xl p-4 border border-white/5 shadow-inner group-hover:border-white/10 transition-colors">
                                <p class="text-slate-300 text-sm leading-relaxed">
                                    <span class="text-slate-500 font-bold text-[10px] uppercase tracking-wider block mb-1.5 flex items-center"><i class="fas fa-brain mr-1.5 opacity-50"></i> Agent Reasoning</span>
                                    ${match.reasoning}
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        findMatchesBtn.addEventListener('click', async () => {
            const profile = profileInput.value.trim();
            const relType = relationshipType.value;

            if (!profile) {
                alert("Please describe yourself first!");
                return;
            }

            // Reset UI
            findMatchesBtn.disabled = true;
            findMatchesBtn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i><span class="ml-2">Analyzing...</span>';
            terminalLog.innerHTML = '';
            resultsContainer.innerHTML = '';
            matchStatus.classList.add('hidden');

            appendToTerminal("Initializing AI Matchmaker request...", true);

            try {
                // Determine API URL based on environment (development vs relative)
                const apiUrl = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
                    ? `http://${window.location.hostname}:8005/api/match`
                    : '/api/match';

                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_profile: profile,
                        relationship_type: relType,
                        top_n: 5
                    })
                });

                if (!response.ok) {
                    throw new Error(`Server error: ${response.status}`);
                }

                const data = await response.json();

                // Simulate processing logs (typing effect for logs)
                for (let i = 0; i < data.logs.length; i++) {
                    await new Promise(r => setTimeout(r, 100)); // Delay between logs
                    appendToTerminal(data.logs[i]);
                }

                appendToTerminal("Analysis complete. Rendering results...", true);

                // Render results
                await new Promise(r => setTimeout(r, 500)); // Small pause before showing results

                if (data.matches && data.matches.length > 0) {
                    data.matches.forEach((match, index) => {
                        resultsContainer.innerHTML += createResultCard(match, index);
                    });
                    matchStatus.classList.remove('hidden');
                } else {
                    resultsContainer.innerHTML = `
                        <div class="text-center p-8 text-slate-400">
                            No matches found.
                        </div>
                    `;
                }

            } catch (error) {
                appendToTerminal(`ERROR: ${error.message}`, true);
                resultsContainer.innerHTML = `
                    <div class="bg-red-900/20 border border-red-500/50 text-red-400 rounded-lg p-4 text-center">
                        <i class="fas fa-exclamation-triangle mr-2"></i> Error connecting to the AI Matchmaker API.
                        <p class="text-sm mt-2 opacity-80">Make sure the backend server is running on port 8005.</p>
                    </div>
                `;
            } finally {
                findMatchesBtn.disabled = false;
                findMatchesBtn.innerHTML = '<span>Find My Match</span><i class="fas fa-heart ml-2"></i>';
            }
        });

        // Add some placeholder text on load
        profileInput.value = "I'm a quiet and stoic person who values logic and peace. I try to avoid unnecessary conflict but I admire those who work hard.";
    </script>
</body>
</html>
