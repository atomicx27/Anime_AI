<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime World Simulator AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
        }
        .card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .state-aggressive { border: 2px solid #ef4444; box-shadow: 0 0 15px rgba(239, 68, 68, 0.4); }
        .state-defensive { border: 2px solid #3b82f6; box-shadow: 0 0 15px rgba(59, 130, 246, 0.4); }
        .state-diplomatic { border: 2px solid #10b981; box-shadow: 0 0 15px rgba(16, 185, 129, 0.4); }
        .state-strategic { border: 2px solid #8b5cf6; box-shadow: 0 0 15px rgba(139, 92, 246, 0.4); }
        .state-chaotic { border: 2px solid #f97316; box-shadow: 0 0 15px rgba(249, 115, 22, 0.4); }
        .state-protective { border: 2px solid #ec4899; box-shadow: 0 0 15px rgba(236, 72, 153, 0.4); }
        .state-neutral { border: 2px solid #64748b; }

        .typewriter {
            overflow: hidden;
            border-right: .15em solid orange;
            white-space: pre-wrap;
            margin: 0 auto;
            letter-spacing: .15em;
            animation: typing 3.5s steps(40, end), blink-caret .75s step-end infinite;
        }

        @keyframes blink-caret {
            from, to { border-color: transparent }
            50% { border-color: orange; }
        }
    </style>
</head>
<body class="min-h-screen bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-slate-900 via-slate-900 to-black font-sans antialiased text-slate-200 relative">

    <!-- Background Effects -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none -z-10">
        <div class="absolute -top-[30%] -left-[10%] w-[60%] h-[60%] rounded-full bg-blue-900/10 blur-[120px]"></div>
        <div class="absolute top-[10%] -right-[10%] w-[50%] h-[50%] rounded-full bg-purple-900/10 blur-[120px]"></div>
    </div>

    <div class="container mx-auto px-4 py-8 max-w-6xl relative z-10">
        <header class="text-center mb-12">
            <h1 class="text-5xl font-extrabold mb-4 bg-clip-text text-transparent bg-gradient-to-r from-blue-400 via-indigo-400 to-purple-500 drop-shadow-sm">
                Anime World Simulator
            </h1>
            <p class="text-slate-400 text-lg">Inject a global event and watch the anime universe react.</p>
        </header>

        <main>
            <div class="bg-slate-800/60 backdrop-blur-xl rounded-2xl p-6 shadow-2xl mb-8 border border-slate-700/50">
                <label for="scenario" class="block text-sm font-medium text-slate-300 mb-2">Global Scenario / Event</label>
                <div class="flex flex-col sm:flex-row gap-4">
                    <textarea id="scenario" rows="3" class="w-full bg-slate-900/80 border border-slate-700/50 rounded-xl p-4 text-slate-100 focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500/50 outline-none resize-none shadow-inner transition-all" placeholder="e.g. A mysterious portal opens in the sky, raining demons upon the city..."></textarea>
                    <button id="simulateBtn" class="bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-bold py-3 px-8 rounded-xl transition-all shadow-lg shadow-blue-900/20 active:scale-95 flex-shrink-0 self-start sm:self-center">
                        Simulate
                    </button>
                </div>
            </div>

            <div id="logsContainer" class="hidden bg-black/80 backdrop-blur-md rounded-xl p-4 mb-8 font-mono text-sm text-green-400 border border-green-500/20 shadow-[inset_0_0_20px_rgba(0,0,0,0.5)] max-h-48 overflow-y-auto custom-scrollbar">
                <div id="logsContent"></div>
            </div>

            <div id="loading" class="hidden flex justify-center py-12">
                <div class="animate-spin rounded-full h-16 w-16 border-t-2 border-b-2 border-blue-500"></div>
            </div>

            <div id="resultsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Character cards will be injected here -->
            </div>
        </main>
    </div>

    <script>
        const simulateBtn = document.getElementById('simulateBtn');
        const scenarioInput = document.getElementById('scenario');
        const resultsGrid = document.getElementById('resultsGrid');
        const loading = document.getElementById('loading');
        const logsContainer = document.getElementById('logsContainer');
        const logsContent = document.getElementById('logsContent');

        function getStateClass(state) {
            const stateMap = {
                'Aggressive': 'state-aggressive',
                'Defensive': 'state-defensive',
                'Diplomatic': 'state-diplomatic',
                'Strategic': 'state-strategic',
                'Chaotic': 'state-chaotic',
                'Protective': 'state-protective',
                'Neutral': 'state-neutral'
            };
            return stateMap[state] || 'state-neutral';
        }

        function getStateBadge(state) {
            const colors = {
                'Aggressive': 'bg-red-900 text-red-200',
                'Defensive': 'bg-blue-900 text-blue-200',
                'Diplomatic': 'bg-emerald-900 text-emerald-200',
                'Strategic': 'bg-purple-900 text-purple-200',
                'Chaotic': 'bg-orange-900 text-orange-200',
                'Protective': 'bg-pink-900 text-pink-200',
                'Neutral': 'bg-slate-700 text-slate-200'
            };
            const colorClass = colors[state] || colors['Neutral'];
            return `<span class="px-2 py-1 rounded-full text-xs font-semibold ${colorClass}">${state}</span>`;
        }

        async function typeLogs(logs) {
            logsContainer.classList.remove('hidden');
            logsContent.innerHTML = '';

            for (let log of logs) {
                const p = document.createElement('p');
                p.className = 'mb-1';
                p.textContent = '> ' + log;
                logsContent.appendChild(p);
                logsContainer.scrollTop = logsContainer.scrollHeight;
                await new Promise(r => setTimeout(r, 400));
            }
        }

        simulateBtn.addEventListener('click', async () => {
            const scenario = scenarioInput.value.trim();
            if (!scenario) return alert('Please enter a scenario');

            resultsGrid.innerHTML = '';
            logsContainer.classList.add('hidden');
            loading.classList.remove('hidden');
            simulateBtn.disabled = true;
            simulateBtn.classList.add('opacity-50');

            try {
                const res = await fetch('/api/simulate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ scenario })
                });

                if (!res.ok) throw new Error('Simulation failed');

                const data = await res.json();

                loading.classList.add('hidden');
                await typeLogs(data.logs);

                data.reactions.forEach((reaction, index) => {
                    setTimeout(() => {
                        const card = document.createElement('div');
                        card.className = `card bg-slate-800/80 backdrop-blur-md rounded-2xl p-6 flex flex-col h-full relative overflow-hidden group ${getStateClass(reaction.action_state)}`;

                        card.innerHTML = `
                            <div class="absolute inset-0 bg-gradient-to-b from-white/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 pointer-events-none"></div>
                            <div class="flex justify-between items-start mb-4 relative z-10">
                                <div>
                                    <h3 class="text-xl font-bold text-white group-hover:text-blue-300 transition-colors">${reaction.name}</h3>
                                    <p class="text-xs text-slate-400">${reaction.archetype}</p>
                                </div>
                                ${getStateBadge(reaction.action_state)}
                            </div>
                            <div class="mb-5 relative z-10">
                                <span class="text-[10px] font-bold text-indigo-400/80 uppercase tracking-widest block mb-1">Core Emotion</span>
                                <p class="text-sm italic text-slate-300 bg-slate-900/50 p-2.5 rounded-lg border border-slate-700/50">"${reaction.core_emotion}"</p>
                            </div>
                            <div class="mt-auto pt-4 border-t border-slate-700/50 relative z-10">
                                <span class="text-[10px] font-bold text-blue-400/80 uppercase tracking-widest block mb-2">Reaction Strategy</span>
                                <p class="text-sm text-slate-200 leading-relaxed">${reaction.reaction_strategy}</p>
                            </div>
                        `;
                        resultsGrid.appendChild(card);
                    }, index * 150); // Staggered entrance
                });

            } catch (err) {
                console.error(err);
                alert('Error running simulation');
                loading.classList.add('hidden');
            } finally {
                simulateBtn.disabled = false;
                simulateBtn.classList.remove('opacity-50');
            }
        });

        // Initial load check
        fetch('/api/characters').then(r => r.json()).then(data => {
            console.log('Characters loaded:', data.characters.length);
        }).catch(e => console.log('Backend not ready or accessible via this path.'));
    </script>
</body>
</html>
