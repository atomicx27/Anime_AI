<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime World Simulator AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
        }
        .card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .state-aggressive { border: 2px solid rgba(239, 68, 68, 0.5); box-shadow: 0 0 15px rgba(239, 68, 68, 0.2); }
        .state-defensive { border: 2px solid rgba(59, 130, 246, 0.5); box-shadow: 0 0 15px rgba(59, 130, 246, 0.2); }
        .state-diplomatic { border: 2px solid rgba(16, 185, 129, 0.5); box-shadow: 0 0 15px rgba(16, 185, 129, 0.2); }
        .state-strategic { border: 2px solid rgba(139, 92, 246, 0.5); box-shadow: 0 0 15px rgba(139, 92, 246, 0.2); }
        .state-chaotic { border: 2px solid rgba(249, 115, 22, 0.5); box-shadow: 0 0 15px rgba(249, 115, 22, 0.2); }
        .state-protective { border: 2px solid rgba(236, 72, 153, 0.5); box-shadow: 0 0 15px rgba(236, 72, 153, 0.2); }
        .state-neutral { border: 2px solid rgba(100, 116, 139, 0.5); }

        .card:hover.state-aggressive { box-shadow: 0 0 25px rgba(239, 68, 68, 0.5); border-color: rgba(239, 68, 68, 1); }
        .card:hover.state-defensive { box-shadow: 0 0 25px rgba(59, 130, 246, 0.5); border-color: rgba(59, 130, 246, 1); }
        .card:hover.state-diplomatic { box-shadow: 0 0 25px rgba(16, 185, 129, 0.5); border-color: rgba(16, 185, 129, 1); }
        .card:hover.state-strategic { box-shadow: 0 0 25px rgba(139, 92, 246, 0.5); border-color: rgba(139, 92, 246, 1); }
        .card:hover.state-chaotic { box-shadow: 0 0 25px rgba(249, 115, 22, 0.5); border-color: rgba(249, 115, 22, 1); }
        .card:hover.state-protective { box-shadow: 0 0 25px rgba(236, 72, 153, 0.5); border-color: rgba(236, 72, 153, 1); }
        .card:hover.state-neutral { box-shadow: 0 0 25px rgba(100, 116, 139, 0.5); border-color: rgba(100, 116, 139, 1); }

        .card-enter {
            animation: slideUpFade 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes slideUpFade {
            to { opacity: 1; transform: translateY(0); }
        }

        .typewriter {
            overflow: hidden;
            border-right: .15em solid orange;
            white-space: pre-wrap;
            margin: 0 auto;
            letter-spacing: .15em;
            animation: typing 3.5s steps(40, end), blink-caret .75s step-end infinite;
        }

        @keyframes blink-caret {
            from, to { border-color: transparent }
            50% { border-color: orange; }
        }
    </style>
</head>
<body class="min-h-screen bg-slate-900 font-sans antialiased text-slate-200">

    <div class="container mx-auto px-4 py-8 max-w-6xl">
        <header class="text-center mb-12">
            <h1 class="text-5xl font-extrabold mb-4 bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-500">
                Anime World Simulator
            </h1>
            <p class="text-slate-400 text-lg">Inject a global event and watch the anime universe react.</p>
        </header>

        <main>
            <div class="bg-slate-800 rounded-xl p-6 shadow-2xl mb-8 border border-slate-700">
                <label for="scenario" class="block text-sm font-medium text-slate-300 mb-2">Global Scenario / Event</label>
                <div class="flex flex-col sm:flex-row gap-4">
                    <textarea id="scenario" rows="3" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-slate-100 focus:ring-2 focus:ring-blue-500 focus:outline-none resize-none" placeholder="e.g. A mysterious portal opens in the sky, raining demons upon the city..."></textarea>
                    <button id="simulateBtn" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-8 rounded-lg transition-colors flex-shrink-0 self-start sm:self-center">
                        Simulate
                    </button>
                </div>
            </div>

            <div id="logsContainer" class="hidden bg-black rounded-lg p-4 mb-8 font-mono text-sm text-green-400 border border-green-900 max-h-48 overflow-y-auto">
                <div id="logsContent"></div>
            </div>

            <div id="loading" class="hidden flex flex-col items-center justify-center py-16">
                <div class="relative w-20 h-20 mb-4">
                    <div class="absolute inset-0 rounded-full border-4 border-slate-700"></div>
                    <div class="absolute inset-0 rounded-full border-4 border-t-blue-500 animate-spin"></div>
                    <div class="absolute inset-2 bg-blue-500/20 rounded-full animate-pulse"></div>
                </div>
                <p class="text-blue-400 font-medium tracking-widest uppercase text-sm animate-pulse">Simulating World State...</p>
            </div>

            <div id="resultsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Character cards will be injected here -->
            </div>
        </main>
    </div>

    <script>
        const simulateBtn = document.getElementById('simulateBtn');
        const scenarioInput = document.getElementById('scenario');
        const resultsGrid = document.getElementById('resultsGrid');
        const loading = document.getElementById('loading');
        const logsContainer = document.getElementById('logsContainer');
        const logsContent = document.getElementById('logsContent');

        function getStateClass(state) {
            const stateMap = {
                'Aggressive': 'state-aggressive',
                'Defensive': 'state-defensive',
                'Diplomatic': 'state-diplomatic',
                'Strategic': 'state-strategic',
                'Chaotic': 'state-chaotic',
                'Protective': 'state-protective',
                'Neutral': 'state-neutral'
            };
            return stateMap[state] || 'state-neutral';
        }

        function getStateBadge(state) {
            const colors = {
                'Aggressive': 'bg-red-900 text-red-200',
                'Defensive': 'bg-blue-900 text-blue-200',
                'Diplomatic': 'bg-emerald-900 text-emerald-200',
                'Strategic': 'bg-purple-900 text-purple-200',
                'Chaotic': 'bg-orange-900 text-orange-200',
                'Protective': 'bg-pink-900 text-pink-200',
                'Neutral': 'bg-slate-700 text-slate-200'
            };
            const colorClass = colors[state] || colors['Neutral'];
            return `<span class="px-2 py-1 rounded-full text-xs font-semibold ${colorClass}">${state}</span>`;
        }

        async function typeLogs(logs) {
            logsContainer.classList.remove('hidden');
            logsContent.innerHTML = '';

            for (let log of logs) {
                const p = document.createElement('p');
                p.className = 'mb-1';
                p.textContent = '> ' + log;
                logsContent.appendChild(p);
                logsContainer.scrollTop = logsContainer.scrollHeight;
                await new Promise(r => setTimeout(r, 400));
            }
        }

        simulateBtn.addEventListener('click', async () => {
            const scenario = scenarioInput.value.trim();
            if (!scenario) return alert('Please enter a scenario');

            resultsGrid.innerHTML = '';
            logsContainer.classList.add('hidden');
            loading.classList.remove('hidden');
            simulateBtn.disabled = true;
            simulateBtn.classList.add('opacity-50');

            try {
                const res = await fetch('/api/simulate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ scenario })
                });

                if (!res.ok) throw new Error('Simulation failed');

                const data = await res.json();

                loading.classList.add('hidden');
                await typeLogs(data.logs);

                data.reactions.forEach((reaction, index) => {
                    setTimeout(() => {
                        const card = document.createElement('div');
                        card.className = `card card-enter bg-slate-800/80 backdrop-blur-sm rounded-xl p-5 flex flex-col h-full ${getStateClass(reaction.action_state)}`;
                        card.style.animationDelay = `${index * 0.1}s`;

                        card.innerHTML = `
                            <div class="flex justify-between items-start mb-3">
                                <div>
                                    <h3 class="text-xl font-bold text-white">${reaction.name}</h3>
                                    <p class="text-xs text-slate-400 font-medium">${reaction.archetype}</p>
                                </div>
                                ${getStateBadge(reaction.action_state)}
                            </div>
                            <div class="mb-4 bg-slate-900/50 p-3 rounded-lg border border-slate-700/50">
                                <span class="text-[10px] font-bold text-indigo-400 uppercase tracking-wider block mb-1">Core Emotion</span>
                                <p class="text-sm italic text-slate-300">"${reaction.core_emotion}"</p>
                            </div>
                            <div class="mt-auto pt-4 border-t border-slate-700/80">
                                <span class="text-[10px] font-bold text-blue-400 uppercase tracking-wider block mb-1">Reaction Strategy</span>
                                <p class="text-sm text-slate-200 leading-relaxed">${reaction.reaction_strategy}</p>
                            </div>
                        `;
                        resultsGrid.appendChild(card);
                    }, index * 100); // Faster staggered entrance
                });

            } catch (err) {
                console.error(err);
                alert('Error running simulation');
                loading.classList.add('hidden');
            } finally {
                simulateBtn.disabled = false;
                simulateBtn.classList.remove('opacity-50');
            }
        });

        // Initial load check
        fetch('/api/characters').then(r => r.json()).then(data => {
            console.log('Characters loaded:', data.characters.length);
        }).catch(e => console.log('Backend not ready or accessible via this path.'));
    </script>
</body>
</html>
