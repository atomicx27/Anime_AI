<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime World Simulator AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            background-image: radial-gradient(circle at top, rgba(59, 130, 246, 0.1) 0%, transparent 50%);
            background-attachment: fixed;
        }

        .floating-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: -1;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40"><circle cx="20" cy="20" r="1" fill="rgba(255,255,255,0.05)"/></svg>');
            animation: floating 60s linear infinite;
        }

        @keyframes floating {
            from { background-position: 0 0; }
            to { background-position: -400px -400px; }
        }

        .card {
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .card-enter {
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(30px);
        }
        @keyframes slideUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .card:hover {
            transform: translateY(-8px) scale(1.02);
            z-index: 10;
        }
        .state-aggressive { border: 2px solid #ef4444; box-shadow: 0 0 15px rgba(239, 68, 68, 0.4); }
        .state-aggressive:hover { box-shadow: 0 0 25px rgba(239, 68, 68, 0.6); transform: scale(1.02); }

        .state-defensive { border: 2px solid #3b82f6; box-shadow: 0 0 15px rgba(59, 130, 246, 0.4); }
        .state-defensive:hover { box-shadow: 0 0 25px rgba(59, 130, 246, 0.6); transform: scale(1.02); }

        .state-diplomatic { border: 2px solid #10b981; box-shadow: 0 0 15px rgba(16, 185, 129, 0.4); }
        .state-diplomatic:hover { box-shadow: 0 0 25px rgba(16, 185, 129, 0.6); transform: scale(1.02); }

        .state-strategic { border: 2px solid #8b5cf6; box-shadow: 0 0 15px rgba(139, 92, 246, 0.4); }
        .state-strategic:hover { box-shadow: 0 0 25px rgba(139, 92, 246, 0.6); transform: scale(1.02); }

        .state-chaotic { border: 2px solid #f97316; box-shadow: 0 0 15px rgba(249, 115, 22, 0.4); }
        .state-chaotic:hover { box-shadow: 0 0 25px rgba(249, 115, 22, 0.6); transform: scale(1.02); }

        .state-protective { border: 2px solid #ec4899; box-shadow: 0 0 15px rgba(236, 72, 153, 0.4); }
        .state-protective:hover { box-shadow: 0 0 25px rgba(236, 72, 153, 0.6); transform: scale(1.02); }

        .state-neutral { border: 2px solid #64748b; }
        .state-neutral:hover { box-shadow: 0 0 25px rgba(100, 116, 139, 0.6); transform: scale(1.02); }

        .typewriter {
            overflow: hidden;
            border-right: .15em solid #4ade80; /* Green-400 */
            white-space: pre-wrap;
            margin: 0 auto;
            letter-spacing: .15em;
            animation: typing 3.5s steps(40, end), blink-caret .75s step-end infinite;
        }

        @keyframes typing {
            from { max-width: 0 }
            to { max-width: 100% }
        }
        @keyframes blink-caret {
            from, to { border-color: transparent }
            50% { border-color: #4ade80; }
        }

        #logsContainer {
            box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.8), 0 0 20px rgba(74, 222, 128, 0.1);
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="min-h-screen font-sans antialiased text-slate-200 relative">
    <div class="floating-bg"></div>
    <div class="container mx-auto px-4 py-10 max-w-6xl relative z-10">
        <header class="text-center mb-16">
            <h1 class="text-6xl font-black mb-6 tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-blue-400 via-indigo-400 to-purple-500 drop-shadow-sm">
                Anime World Simulator
            </h1>
            <p class="text-slate-400 text-xl font-light tracking-wide">Inject a global event and watch the anime universe react in real-time.</p>
        </header>

        <main>
            <div class="bg-slate-800/80 backdrop-blur-md rounded-2xl p-8 shadow-2xl mb-10 border border-slate-700">
                <label for="scenario" class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-4">Initialize Global Scenario Parameter</label>
                <div class="flex flex-col sm:flex-row gap-6">
                    <textarea id="scenario" rows="3" class="w-full bg-slate-900/80 border border-slate-600 rounded-xl p-4 text-slate-100 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none resize-none shadow-inner placeholder-slate-500 text-lg" placeholder="e.g. A mysterious portal opens in the sky, raining demons upon the city..."></textarea>
                    <button id="simulateBtn" class="bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-bold py-4 px-10 rounded-xl transition-all shadow-lg shadow-blue-500/20 flex-shrink-0 self-start sm:self-center transform hover:-translate-y-1">
                        Run Simulation
                    </button>
                </div>
            </div>

            <div id="logsContainer" class="hidden bg-black/90 rounded-2xl p-6 mb-10 font-mono text-sm text-green-400 border border-green-500/30 max-h-60 overflow-y-auto">
                <div class="text-xs text-green-600/70 mb-3 border-b border-green-900/50 pb-2">/// WORLD EVENT LOG ///</div>
                <div id="logsContent" class="space-y-2"></div>
            </div>

            <div id="loading" class="hidden flex flex-col items-center justify-center py-16">
                <div class="relative w-20 h-20 mb-4">
                    <div class="absolute inset-0 rounded-full border-4 border-slate-700"></div>
                    <div class="absolute inset-0 rounded-full border-4 border-t-blue-500 animate-spin"></div>
                    <div class="absolute inset-2 bg-blue-500/20 rounded-full animate-pulse"></div>
                </div>
                <p class="text-blue-400 font-medium tracking-widest uppercase text-sm animate-pulse">Simulating World State...</p>
            </div>

            <div id="resultsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                <!-- Character cards will be injected here -->
            </div>
        </main>
    </div>

    <script>
        const simulateBtn = document.getElementById('simulateBtn');
        const scenarioInput = document.getElementById('scenario');
        const resultsGrid = document.getElementById('resultsGrid');
        const loading = document.getElementById('loading');
        const logsContainer = document.getElementById('logsContainer');
        const logsContent = document.getElementById('logsContent');

        function getStateClass(state) {
            const stateMap = {
                'Aggressive': 'state-aggressive',
                'Defensive': 'state-defensive',
                'Diplomatic': 'state-diplomatic',
                'Strategic': 'state-strategic',
                'Chaotic': 'state-chaotic',
                'Protective': 'state-protective',
                'Neutral': 'state-neutral'
            };
            return stateMap[state] || 'state-neutral';
        }

        function getStateBadge(state) {
            const colors = {
                'Aggressive': 'bg-red-900 text-red-200 shadow-[0_0_10px_rgba(239,68,68,0.5)]',
                'Defensive': 'bg-blue-900 text-blue-200 shadow-[0_0_10px_rgba(59,130,246,0.5)]',
                'Diplomatic': 'bg-emerald-900 text-emerald-200 shadow-[0_0_10px_rgba(16,185,129,0.5)]',
                'Strategic': 'bg-purple-900 text-purple-200 shadow-[0_0_10px_rgba(139,92,246,0.5)]',
                'Chaotic': 'bg-orange-900 text-orange-200 shadow-[0_0_10px_rgba(249,115,22,0.5)]',
                'Protective': 'bg-pink-900 text-pink-200 shadow-[0_0_10px_rgba(236,72,153,0.5)]',
                'Neutral': 'bg-slate-700 text-slate-200'
            };
            const colorClass = colors[state] || colors['Neutral'];
            return `<span class="px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider animate-pulse ${colorClass}">${state}</span>`;
        }

        async function typeLogs(logs) {
            logsContainer.classList.remove('hidden');
            logsContent.innerHTML = '';

            for (let log of logs) {
                const p = document.createElement('p');
                p.className = 'mb-2 typewriter text-green-400 font-mono text-sm inline-block';
                p.textContent = '> ' + log;
                const wrapper = document.createElement('div');
                wrapper.appendChild(p);
                logsContent.appendChild(wrapper);
                logsContainer.scrollTop = logsContainer.scrollHeight;
                await new Promise(r => setTimeout(r, 600));
                // Remove typewriter class after animation finishes to stop cursor blinking on old lines
                setTimeout(() => p.style.borderRight = 'none', 750);
            }
        }

        simulateBtn.addEventListener('click', async () => {
            const scenario = scenarioInput.value.trim();
            if (!scenario) return alert('Please enter a scenario');

            resultsGrid.innerHTML = '';
            logsContainer.classList.add('hidden');
            loading.classList.remove('hidden');
            simulateBtn.disabled = true;
            simulateBtn.classList.add('opacity-50');

            try {
                const res = await fetch('/api/simulate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ scenario })
                });

                if (!res.ok) throw new Error('Simulation failed');

                const data = await res.json();

                loading.classList.add('hidden');
                await typeLogs(data.logs);

                data.reactions.forEach((reaction, index) => {
                    setTimeout(() => {
                        const card = document.createElement('div');
                        card.className = `card card-enter bg-slate-800/80 backdrop-blur-sm rounded-xl p-5 flex flex-col h-full ${getStateClass(reaction.action_state)}`;
                        card.style.animationDelay = `${index * 0.1}s`;

                        card.innerHTML = `
                            <div class="flex justify-between items-start mb-5 border-b border-slate-700/50 pb-4">
                                <div>
                                    <h3 class="text-xl font-bold text-white">${reaction.name}</h3>
                                    <p class="text-xs text-slate-400 font-medium">${reaction.archetype}</p>
                                </div>
                            </div>
                            <div class="mb-4 bg-slate-900/50 p-3 rounded-lg border border-slate-700/50">
                                <span class="text-[10px] font-bold text-indigo-400 uppercase tracking-wider block mb-1">Core Emotion</span>
                                <p class="text-sm italic text-slate-300">"${reaction.core_emotion}"</p>
                            </div>
                            <div class="mt-auto pt-4 border-t border-slate-700/80">
                                <span class="text-[10px] font-bold text-blue-400 uppercase tracking-wider block mb-1">Reaction Strategy</span>
                                <p class="text-sm text-slate-200 leading-relaxed">${reaction.reaction_strategy}</p>
                            </div>
                        `;
                        resultsGrid.appendChild(card);
                    }, index * 100); // Faster staggered entrance
                });

            } catch (err) {
                console.error(err);
                alert('Error running simulation');
                loading.classList.add('hidden');
            } finally {
                simulateBtn.disabled = false;
                simulateBtn.classList.remove('opacity-50');
            }
        });

        // Initial load check
        fetch('/api/characters').then(r => r.json()).then(data => {
            console.log('Characters loaded:', data.characters.length);
        }).catch(e => console.log('Backend not ready or accessible via this path.'));
    </script>
</body>
</html>
