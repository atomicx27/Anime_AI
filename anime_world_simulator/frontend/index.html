<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime World Simulator AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
        }
        .card {
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .card.show {
            opacity: 1;
            transform: translateY(0);
        }
        .card:hover {
            transform: translateY(-8px) scale(1.02);
            z-index: 10;
        }
        .state-aggressive { border: 2px solid #ef4444; box-shadow: 0 0 20px rgba(239, 68, 68, 0.15); }
        .state-aggressive:hover { box-shadow: 0 0 30px rgba(239, 68, 68, 0.6), inset 0 0 15px rgba(239, 68, 68, 0.2); }

        .state-defensive { border: 2px solid #3b82f6; box-shadow: 0 0 20px rgba(59, 130, 246, 0.15); }
        .state-defensive:hover { box-shadow: 0 0 30px rgba(59, 130, 246, 0.6), inset 0 0 15px rgba(59, 130, 246, 0.2); }

        .state-diplomatic { border: 2px solid #10b981; box-shadow: 0 0 20px rgba(16, 185, 129, 0.15); }
        .state-diplomatic:hover { box-shadow: 0 0 30px rgba(16, 185, 129, 0.6), inset 0 0 15px rgba(16, 185, 129, 0.2); }

        .state-strategic { border: 2px solid #8b5cf6; box-shadow: 0 0 20px rgba(139, 92, 246, 0.15); }
        .state-strategic:hover { box-shadow: 0 0 30px rgba(139, 92, 246, 0.6), inset 0 0 15px rgba(139, 92, 246, 0.2); }

        .state-chaotic { border: 2px solid #f97316; box-shadow: 0 0 20px rgba(249, 115, 22, 0.15); }
        .state-chaotic:hover { box-shadow: 0 0 30px rgba(249, 115, 22, 0.6), inset 0 0 15px rgba(249, 115, 22, 0.2); }

        .state-protective { border: 2px solid #ec4899; box-shadow: 0 0 20px rgba(236, 72, 153, 0.15); }
        .state-protective:hover { box-shadow: 0 0 30px rgba(236, 72, 153, 0.6), inset 0 0 15px rgba(236, 72, 153, 0.2); }

        .state-neutral { border: 2px solid #64748b; }
        .state-neutral:hover { box-shadow: 0 0 30px rgba(100, 116, 139, 0.6), inset 0 0 15px rgba(100, 116, 139, 0.2); }

        .typewriter {
            overflow: hidden;
            border-right: 0.15em solid #4ade80; /* matches text-green-400 */
            white-space: nowrap;
            animation: typing 0.5s steps(40, end), blink-caret 0.75s step-end infinite;
        }

        @keyframes typing {
            from { max-width: 0 }
            to { max-width: 100% }
        }
        @keyframes blink-caret {
            from, to { border-color: transparent }
            50% { border-color: #4ade80; }
        }
    </style>
</head>
<body class="min-h-screen bg-slate-900 font-sans antialiased text-slate-200">

    <div class="container mx-auto px-4 py-8 max-w-6xl">
        <header class="text-center mb-12">
            <h1 class="text-5xl font-extrabold mb-4 bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-500">
                Anime World Simulator
            </h1>
            <p class="text-slate-400 text-lg">Inject a global event and watch the anime universe react.</p>
        </header>

        <main>
            <div class="bg-slate-800 rounded-xl p-6 shadow-2xl mb-8 border border-slate-700">
                <label for="scenario" class="block text-sm font-medium text-slate-300 mb-2">Global Scenario / Event</label>
                <div class="flex flex-col sm:flex-row gap-4">
                    <textarea id="scenario" rows="3" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-slate-100 focus:ring-2 focus:ring-blue-500 focus:outline-none resize-none" placeholder="e.g. A mysterious portal opens in the sky, raining demons upon the city..."></textarea>
                    <button id="simulateBtn" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-8 rounded-lg transition-colors flex-shrink-0 self-start sm:self-center">
                        Simulate
                    </button>
                </div>
            </div>

            <div id="logsContainer" class="hidden bg-black rounded-lg p-4 mb-8 font-mono text-sm text-green-400 border border-green-900 max-h-48 overflow-y-auto">
                <div id="logsContent"></div>
            </div>

            <div id="loading" class="hidden flex justify-center py-12">
                <div class="animate-spin rounded-full h-16 w-16 border-t-2 border-b-2 border-blue-500"></div>
            </div>

            <div id="resultsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Character cards will be injected here -->
            </div>
        </main>
    </div>

    <script>
        const simulateBtn = document.getElementById('simulateBtn');
        const scenarioInput = document.getElementById('scenario');
        const resultsGrid = document.getElementById('resultsGrid');
        const loading = document.getElementById('loading');
        const logsContainer = document.getElementById('logsContainer');
        const logsContent = document.getElementById('logsContent');

        function getStateClass(state) {
            const stateMap = {
                'Aggressive': 'state-aggressive',
                'Defensive': 'state-defensive',
                'Diplomatic': 'state-diplomatic',
                'Strategic': 'state-strategic',
                'Chaotic': 'state-chaotic',
                'Protective': 'state-protective',
                'Neutral': 'state-neutral'
            };
            return stateMap[state] || 'state-neutral';
        }

        function getStateBadge(state) {
            const colors = {
                'Aggressive': 'bg-red-900 text-red-200',
                'Defensive': 'bg-blue-900 text-blue-200',
                'Diplomatic': 'bg-emerald-900 text-emerald-200',
                'Strategic': 'bg-purple-900 text-purple-200',
                'Chaotic': 'bg-orange-900 text-orange-200',
                'Protective': 'bg-pink-900 text-pink-200',
                'Neutral': 'bg-slate-700 text-slate-200'
            };
            const colorClass = colors[state] || colors['Neutral'];
            return `<span class="px-2 py-1 rounded-full text-xs font-semibold ${colorClass}">${state}</span>`;
        }

        async function typeLogs(logs) {
            logsContainer.classList.remove('hidden');
            logsContent.innerHTML = '';

            for (let log of logs) {
                const p = document.createElement('p');
                p.className = 'mb-2 typewriter text-green-400 font-mono text-sm inline-block';
                p.textContent = '> ' + log;
                const wrapper = document.createElement('div');
                wrapper.appendChild(p);
                logsContent.appendChild(wrapper);
                logsContainer.scrollTop = logsContainer.scrollHeight;
                await new Promise(r => setTimeout(r, 600));
                // Remove typewriter class after animation finishes to stop cursor blinking on old lines
                setTimeout(() => p.style.borderRight = 'none', 750);
            }
        }

        simulateBtn.addEventListener('click', async () => {
            const scenario = scenarioInput.value.trim();
            if (!scenario) return alert('Please enter a scenario');

            resultsGrid.innerHTML = '';
            logsContainer.classList.add('hidden');
            loading.classList.remove('hidden');
            simulateBtn.disabled = true;
            simulateBtn.classList.add('opacity-50');

            try {
                const res = await fetch('/api/simulate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ scenario })
                });

                if (!res.ok) throw new Error('Simulation failed');

                const data = await res.json();

                loading.classList.add('hidden');
                await typeLogs(data.logs);

                data.reactions.forEach((reaction, index) => {
                    setTimeout(() => {
                        const card = document.createElement('div');
                        card.className = `card bg-slate-800/90 backdrop-blur-sm rounded-xl p-6 flex flex-col h-full shadow-lg group ${getStateClass(reaction.action_state)}`;

                        card.innerHTML = `
                            <div class="flex justify-between items-start mb-4">
                                <div>
                                    <h3 class="text-2xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-slate-100 to-slate-400 tracking-wide">${reaction.name}</h3>
                                    <p class="text-xs text-indigo-300/80 font-medium tracking-widest uppercase mt-1">${reaction.archetype}</p>
                                </div>
                                ${getStateBadge(reaction.action_state)}
                            </div>
                            <div class="bg-slate-900/60 rounded-lg p-3 border border-slate-700/50 mb-5 relative overflow-hidden group-hover:border-slate-600 transition-colors">
                                <div class="absolute top-0 left-0 w-1 h-full bg-indigo-500/50"></div>
                                <span class="text-[10px] font-bold text-indigo-400/80 uppercase tracking-widest mb-1 block">Core Emotion</span>
                                <p class="text-sm italic text-slate-300 leading-relaxed">"${reaction.core_emotion}"</p>
                            </div>
                            <div class="mt-auto pt-4 border-t border-slate-700/80">
                                <span class="text-xs font-bold text-blue-400 uppercase tracking-widest block mb-2 flex items-center gap-2">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                                    Reaction Strategy
                                </span>
                                <p class="text-[15px] text-slate-200 leading-relaxed">${reaction.reaction_strategy}</p>
                            </div>
                        `;
                        resultsGrid.appendChild(card);
                        // Trigger the show animation
                        requestAnimationFrame(() => {
                            setTimeout(() => card.classList.add('show'), 50);
                        });
                    }, index * 150); // Staggered entrance
                });

            } catch (err) {
                console.error(err);
                alert('Error running simulation');
                loading.classList.add('hidden');
            } finally {
                simulateBtn.disabled = false;
                simulateBtn.classList.remove('opacity-50');
            }
        });

        // Initial load check
        fetch('/api/characters').then(r => r.json()).then(data => {
            console.log('Characters loaded:', data.characters.length);
        }).catch(e => console.log('Backend not ready or accessible via this path.'));
    </script>
</body>
</html>
