<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime World Simulator AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['Fira Code', 'monospace'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            background-attachment: fixed;
            overflow-x: hidden;
        }

        .floating-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: -1;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40"><circle cx="20" cy="20" r="1" fill="rgba(255,255,255,0.05)"/></svg>');
            animation: floating 60s linear infinite;
        }

        @keyframes floating {
            from { background-position: 0 0; }
            to { background-position: -400px -400px; }
        }

        .card {
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }
        .card-enter {
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(30px);
        }
        @keyframes slideUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .card:hover {
            transform: translateY(-8px) scale(1.02);
            z-index: 10;
        }
        .state-aggressive { border: 1px solid rgba(239, 68, 68, 0.5); box-shadow: 0 0 15px rgba(239, 68, 68, 0.3); }
        .state-aggressive:hover { box-shadow: 0 0 25px rgba(239, 68, 68, 0.8); transform: scale(1.05); }

        .state-defensive { border: 1px solid rgba(59, 130, 246, 0.5); box-shadow: 0 0 15px rgba(59, 130, 246, 0.3); }
        .state-defensive:hover { box-shadow: 0 0 25px rgba(59, 130, 246, 0.8); transform: scale(1.05); }

        .state-diplomatic { border: 1px solid rgba(16, 185, 129, 0.5); box-shadow: 0 0 15px rgba(16, 185, 129, 0.3); }
        .state-diplomatic:hover { box-shadow: 0 0 25px rgba(16, 185, 129, 0.8); transform: scale(1.05); }

        .state-strategic { border: 1px solid rgba(139, 92, 246, 0.5); box-shadow: 0 0 15px rgba(139, 92, 246, 0.3); }
        .state-strategic:hover { box-shadow: 0 0 25px rgba(139, 92, 246, 0.8); transform: scale(1.05); }

        .state-chaotic { border: 1px solid rgba(249, 115, 22, 0.5); box-shadow: 0 0 15px rgba(249, 115, 22, 0.3); }
        .state-chaotic:hover { box-shadow: 0 0 25px rgba(249, 115, 22, 0.8); transform: scale(1.05); }

        .state-protective { border: 1px solid rgba(236, 72, 153, 0.5); box-shadow: 0 0 15px rgba(236, 72, 153, 0.3); }
        .state-protective:hover { box-shadow: 0 0 25px rgba(236, 72, 153, 0.8); transform: scale(1.05); }

        .state-neutral { border: 1px solid rgba(100, 116, 139, 0.5); box-shadow: 0 0 15px rgba(100, 116, 139, 0.2); }
        .state-neutral:hover { box-shadow: 0 0 25px rgba(100, 116, 139, 0.8); transform: scale(1.05); }

        .typewriter {
            overflow: hidden;
            border-right: .15em solid #10b981; /* Emerald-500 */
            white-space: pre-wrap;
            margin: 0 auto;
            letter-spacing: .15em;
            animation: typing 3.5s steps(40, end), blink-caret .75s step-end infinite;
        }

        @keyframes typing {
            from { max-width: 0 }
            to { max-width: 100% }
        }
        @keyframes blink-caret {
            from, to { border-color: transparent }
            50% { border-color: #4ade80; }
        }

        #logsContainer {
            background-color: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.9), 0 0 20px rgba(16, 185, 129, 0.15);
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="min-h-screen font-sans antialiased text-slate-200 relative">

    <!-- Ambient Backgrounds -->
    <div class="absolute inset-0 bg-[radial-gradient(circle_at_top,_var(--tw-gradient-stops))] from-blue-900/20 via-slate-900 to-slate-900 -z-10"></div>
    <div class="absolute inset-0 bg-[radial-gradient(circle_at_bottom,_var(--tw-gradient-stops))] from-indigo-900/10 via-transparent to-transparent -z-10"></div>

    <div class="floating-bg opacity-50"></div>

    <div class="container mx-auto px-4 py-10 max-w-6xl relative z-10">
        <header class="text-center mb-16">
            <h1 class="text-6xl font-black mb-6 tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-blue-400 via-indigo-400 to-purple-500 drop-shadow-[0_0_15px_rgba(99,102,241,0.4)]">
                Anime World Simulator
            </h1>
            <p class="text-slate-300 text-xl font-medium tracking-wide max-w-2xl mx-auto">Inject a global event and watch the anime universe react in real-time.</p>
        </header>

        <main>
            <div class="glass-panel rounded-2xl p-8 mb-10 transition-transform duration-300 hover:shadow-blue-500/10 hover:shadow-2xl">
                <label for="scenario" class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-4 flex items-center gap-2">
                    <svg class="w-4 h-4 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    Initialize Global Scenario Parameter
                </label>
                <div class="flex flex-col sm:flex-row gap-6">
                    <textarea id="scenario" rows="3" class="w-full bg-slate-800/60 border border-slate-600/50 rounded-xl p-4 text-slate-100 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none resize-none shadow-inner hover:bg-slate-800/80 placeholder-slate-500 text-lg transition-all" placeholder="e.g. A mysterious portal opens in the sky, raining demons upon the city..."></textarea>
                    <button id="simulateBtn" class="bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-bold py-4 px-10 rounded-xl transition-all shadow-[0_0_15px_rgba(59,130,246,0.4)] hover:shadow-[0_0_25px_rgba(59,130,246,0.6)] flex-shrink-0 self-start sm:self-center transform hover:-translate-y-1">
                        Run Simulation
                    </button>
                </div>
            </div>

            <div id="logsContainer" class="hidden bg-slate-950/80 backdrop-blur-sm rounded-2xl p-6 mb-10 font-mono text-sm text-green-400 border border-green-500/30 max-h-60 overflow-y-auto relative">
                <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-green-500/50 to-transparent"></div>
                <div class="text-xs text-green-600/70 mb-3 border-b border-green-900/50 pb-2">/// WORLD EVENT LOG ///</div>
                <div id="logsContent" class="space-y-2"></div>
            </div>

            <div id="loading" class="hidden flex flex-col items-center justify-center py-16">
                <div class="relative w-20 h-20 mb-4">
                    <div class="absolute inset-0 rounded-full border-4 border-slate-700"></div>
                    <div class="absolute inset-0 rounded-full border-4 border-t-blue-500 animate-spin"></div>
                    <div class="absolute inset-2 bg-blue-500/20 rounded-full animate-pulse"></div>
                </div>
                <p class="text-blue-400 font-medium tracking-widest uppercase text-sm animate-pulse">Simulating World State...</p>
            </div>

            <div id="resultsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                <!-- Character cards will be injected here -->
            </div>
        </main>
    </div>

    <script>
        const simulateBtn = document.getElementById('simulateBtn');
        const scenarioInput = document.getElementById('scenario');
        const resultsGrid = document.getElementById('resultsGrid');
        const loading = document.getElementById('loading');
        const logsContainer = document.getElementById('logsContainer');
        const logsContent = document.getElementById('logsContent');

        function getStateClass(state) {
            const stateMap = {
                'Aggressive': 'state-aggressive',
                'Defensive': 'state-defensive',
                'Diplomatic': 'state-diplomatic',
                'Strategic': 'state-strategic',
                'Chaotic': 'state-chaotic',
                'Protective': 'state-protective',
                'Neutral': 'state-neutral'
            };
            return stateMap[state] || 'state-neutral';
        }

        function getStateBadge(state) {
            const colors = {
                'Aggressive': 'bg-red-900 text-red-200 shadow-[0_0_10px_rgba(239,68,68,0.5)]',
                'Defensive': 'bg-blue-900 text-blue-200 shadow-[0_0_10px_rgba(59,130,246,0.5)]',
                'Diplomatic': 'bg-emerald-900 text-emerald-200 shadow-[0_0_10px_rgba(16,185,129,0.5)]',
                'Strategic': 'bg-purple-900 text-purple-200 shadow-[0_0_10px_rgba(139,92,246,0.5)]',
                'Chaotic': 'bg-orange-900 text-orange-200 shadow-[0_0_10px_rgba(249,115,22,0.5)]',
                'Protective': 'bg-pink-900 text-pink-200 shadow-[0_0_10px_rgba(236,72,153,0.5)]',
                'Neutral': 'bg-slate-700 text-slate-200'
            };
            const colorClass = colors[state] || colors['Neutral'];
            return `<span class="px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider animate-pulse ${colorClass}">${state}</span>`;
        }

        async function typeLogs(logs) {
            logsContainer.classList.remove('hidden');
            logsContent.innerHTML = '';

            for (let log of logs) {
                const p = document.createElement('p');
                p.className = 'mb-2 typewriter text-green-400 font-mono text-sm inline-block';
                p.textContent = '> ' + log;
                const wrapper = document.createElement('div');
                wrapper.appendChild(p);
                logsContent.appendChild(wrapper);
                logsContainer.scrollTop = logsContainer.scrollHeight;
                await new Promise(r => setTimeout(r, 600));
                // Remove typewriter class after animation finishes to stop cursor blinking on old lines
                setTimeout(() => p.style.borderRight = 'none', 750);
            }
        }

        simulateBtn.addEventListener('click', async () => {
            const scenario = scenarioInput.value.trim();
            if (!scenario) return alert('Please enter a scenario');

            resultsGrid.innerHTML = '';
            logsContainer.classList.add('hidden');
            loading.classList.remove('hidden');
            simulateBtn.disabled = true;
            simulateBtn.classList.add('opacity-50');

            try {
                const res = await fetch('/api/simulate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ scenario })
                });

                if (!res.ok) throw new Error('Simulation failed');

                const data = await res.json();

                loading.classList.add('hidden');
                await typeLogs(data.logs);

                data.reactions.forEach((reaction, index) => {
                    setTimeout(() => {
                        const card = document.createElement('div');
                        card.className = `card card-enter bg-white/5 backdrop-blur-md rounded-2xl p-6 flex flex-col h-full ${getStateClass(reaction.action_state)} relative overflow-hidden group shadow-[0_8px_32px_rgba(0,0,0,0.2)]`;
                        card.style.animationDelay = `${index * 0.1}s`;

                        card.innerHTML = `
                            <div class="absolute inset-0 bg-gradient-to-br from-white/5 to-transparent pointer-events-none opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>

                            <div class="flex justify-between items-start mb-5 border-b border-white/10 pb-4 relative z-10">
                                <div>
                                    <h3 class="text-2xl font-bold text-white group-hover:text-slate-100 transition-colors">${reaction.name}</h3>
                                    <p class="text-[11px] text-slate-300 font-medium bg-black/40 px-2.5 py-0.5 rounded-full mt-2 inline-block border border-white/10">${reaction.archetype}</p>
                                </div>
                                <div class="mt-1">
                                    ${getStateBadge(reaction.action_state)}
                                </div>
                            </div>

                            <div class="mb-5 bg-black/30 p-4 rounded-xl border border-white/5 shadow-inner relative z-10 group-hover:border-white/10 transition-colors">
                                <span class="text-[10px] font-bold text-indigo-300 uppercase tracking-wider flex items-center mb-2"><i class="fa-solid fa-heart-pulse mr-1.5 opacity-70"></i> Core Emotion</span>
                                <p class="text-sm italic text-slate-200 leading-relaxed">"${reaction.core_emotion}"</p>
                            </div>

                            <div class="mt-auto pt-4 border-t border-white/10 relative z-10">
                                <span class="text-[10px] font-bold text-blue-300 uppercase tracking-wider flex items-center mb-2"><i class="fa-solid fa-chess-knight mr-1.5 opacity-70"></i> Reaction Strategy</span>
                                <p class="text-[13px] text-slate-300 leading-relaxed font-medium">${reaction.reaction_strategy}</p>
                            </div>
                        `;
                        resultsGrid.appendChild(card);
                    }, index * 100); // Faster staggered entrance
                });

            } catch (err) {
                console.error(err);
                alert('Error running simulation');
                loading.classList.add('hidden');
            } finally {
                simulateBtn.disabled = false;
                simulateBtn.classList.remove('opacity-50');
            }
        });

        // Initial load check
        fetch('/api/characters').then(r => r.json()).then(data => {
            console.log('Characters loaded:', data.characters.length);
        }).catch(e => console.log('Backend not ready or accessible via this path.'));
    </script>
</body>
</html>
