<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime World Simulator AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
        }
        .card {
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .state-aggressive { border: 1px solid rgba(239, 68, 68, 0.5); box-shadow: 0 0 20px rgba(239, 68, 68, 0.2); }
        .state-aggressive:hover { border-color: rgba(239, 68, 68, 1); box-shadow: 0 0 30px rgba(239, 68, 68, 0.5); }

        .state-defensive { border: 1px solid rgba(59, 130, 246, 0.5); box-shadow: 0 0 20px rgba(59, 130, 246, 0.2); }
        .state-defensive:hover { border-color: rgba(59, 130, 246, 1); box-shadow: 0 0 30px rgba(59, 130, 246, 0.5); }

        .state-diplomatic { border: 1px solid rgba(16, 185, 129, 0.5); box-shadow: 0 0 20px rgba(16, 185, 129, 0.2); }
        .state-diplomatic:hover { border-color: rgba(16, 185, 129, 1); box-shadow: 0 0 30px rgba(16, 185, 129, 0.5); }

        .state-strategic { border: 1px solid rgba(139, 92, 246, 0.5); box-shadow: 0 0 20px rgba(139, 92, 246, 0.2); }
        .state-strategic:hover { border-color: rgba(139, 92, 246, 1); box-shadow: 0 0 30px rgba(139, 92, 246, 0.5); }

        .state-chaotic { border: 1px solid rgba(249, 115, 22, 0.5); box-shadow: 0 0 20px rgba(249, 115, 22, 0.2); }
        .state-chaotic:hover { border-color: rgba(249, 115, 22, 1); box-shadow: 0 0 30px rgba(249, 115, 22, 0.5); }

        .state-protective { border: 1px solid rgba(236, 72, 153, 0.5); box-shadow: 0 0 20px rgba(236, 72, 153, 0.2); }
        .state-protective:hover { border-color: rgba(236, 72, 153, 1); box-shadow: 0 0 30px rgba(236, 72, 153, 0.5); }

        .state-neutral { border: 1px solid rgba(100, 116, 139, 0.5); box-shadow: 0 0 15px rgba(100, 116, 139, 0.1); }
        .state-neutral:hover { border-color: rgba(100, 116, 139, 1); box-shadow: 0 0 25px rgba(100, 116, 139, 0.3); }

        .typewriter {
            overflow: hidden;
            border-right: .15em solid orange;
            white-space: pre-wrap;
            margin: 0 auto;
            letter-spacing: .15em;
            animation: typing 3.5s steps(40, end), blink-caret .75s step-end infinite;
        }

        @keyframes blink-caret {
            from, to { border-color: transparent }
            50% { border-color: orange; }
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="min-h-screen bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-blue-900/40 via-slate-900 to-black font-sans antialiased text-slate-200 relative overflow-x-hidden">
    <!-- Ambient Decor -->
    <div class="absolute top-0 right-0 w-[40vw] h-[40vw] bg-purple-600/10 rounded-full blur-[100px] pointer-events-none"></div>
    <div class="absolute bottom-0 left-0 w-[40vw] h-[40vw] bg-blue-600/10 rounded-full blur-[100px] pointer-events-none"></div>

    <div class="container mx-auto px-4 py-12 max-w-6xl relative z-10">
        <header class="text-center mb-16">
            <h1 class="text-6xl font-extrabold mb-4 bg-clip-text text-transparent bg-gradient-to-r from-blue-400 via-indigo-400 to-purple-500 drop-shadow-lg">
                Anime World Simulator
            </h1>
            <p class="text-slate-300 text-xl font-medium drop-shadow-md">Inject a global event and watch the anime universe react.</p>
        </header>

        <main>
            <div class="glass-panel rounded-2xl p-8 shadow-[0_8px_32px_rgba(0,0,0,0.3)] mb-12 relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-blue-500 to-purple-500"></div>
                <label for="scenario" class="block text-sm font-bold text-slate-300 mb-3 uppercase tracking-wider">Global Scenario / Event</label>
                <div class="flex flex-col sm:flex-row gap-4">
                    <textarea id="scenario" rows="3" class="w-full bg-slate-900/60 border border-slate-600/50 rounded-xl p-4 text-slate-100 focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500/50 outline-none resize-none transition-all shadow-inner placeholder-slate-500" placeholder="e.g. A mysterious portal opens in the sky, raining demons upon the city..."></textarea>
                    <button id="simulateBtn" class="bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-bold py-4 px-10 rounded-xl transition-all shadow-[0_0_20px_rgba(79,70,229,0.4)] flex-shrink-0 self-start sm:self-center transform hover:-translate-y-1">
                        Simulate
                    </button>
                </div>
            </div>

            <div id="logsContainer" class="hidden bg-black/60 backdrop-blur-md rounded-xl p-6 mb-12 font-mono text-sm text-green-400 border border-green-900/50 shadow-[inset_0_0_20px_rgba(0,0,0,0.8)] max-h-48 overflow-y-auto custom-scrollbar relative">
                <div class="absolute top-2 right-4 flex gap-1.5">
                    <div class="w-3 h-3 rounded-full bg-red-500/80"></div>
                    <div class="w-3 h-3 rounded-full bg-yellow-500/80"></div>
                    <div class="w-3 h-3 rounded-full bg-green-500/80"></div>
                </div>
                <div id="logsContent" class="mt-4"></div>
            </div>

            <div id="loading" class="hidden flex flex-col items-center justify-center py-16">
                <div class="animate-spin rounded-full h-16 w-16 border-t-2 border-b-2 border-blue-500 shadow-[0_0_15px_rgba(59,130,246,0.5)] mb-4"></div>
                <p class="text-blue-400 animate-pulse font-medium">Simulating reality physics...</p>
            </div>

            <div id="resultsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                <!-- Character cards will be injected here -->
            </div>
        </main>
    </div>

    <script>
        const simulateBtn = document.getElementById('simulateBtn');
        const scenarioInput = document.getElementById('scenario');
        const resultsGrid = document.getElementById('resultsGrid');
        const loading = document.getElementById('loading');
        const logsContainer = document.getElementById('logsContainer');
        const logsContent = document.getElementById('logsContent');

        function getStateClass(state) {
            const stateMap = {
                'Aggressive': 'state-aggressive',
                'Defensive': 'state-defensive',
                'Diplomatic': 'state-diplomatic',
                'Strategic': 'state-strategic',
                'Chaotic': 'state-chaotic',
                'Protective': 'state-protective',
                'Neutral': 'state-neutral'
            };
            return stateMap[state] || 'state-neutral';
        }

        function getStateBadge(state) {
            const colors = {
                'Aggressive': 'bg-red-900 text-red-200',
                'Defensive': 'bg-blue-900 text-blue-200',
                'Diplomatic': 'bg-emerald-900 text-emerald-200',
                'Strategic': 'bg-purple-900 text-purple-200',
                'Chaotic': 'bg-orange-900 text-orange-200',
                'Protective': 'bg-pink-900 text-pink-200',
                'Neutral': 'bg-slate-700 text-slate-200'
            };
            const colorClass = colors[state] || colors['Neutral'];
            return `<span class="px-2 py-1 rounded-full text-xs font-semibold ${colorClass}">${state}</span>`;
        }

        async function typeLogs(logs) {
            logsContainer.classList.remove('hidden');
            logsContent.innerHTML = '';

            for (let log of logs) {
                const p = document.createElement('p');
                p.className = 'mb-1';
                p.textContent = '> ' + log;
                logsContent.appendChild(p);
                logsContainer.scrollTop = logsContainer.scrollHeight;
                await new Promise(r => setTimeout(r, 400));
            }
        }

        simulateBtn.addEventListener('click', async () => {
            const scenario = scenarioInput.value.trim();
            if (!scenario) return alert('Please enter a scenario');

            resultsGrid.innerHTML = '';
            logsContainer.classList.add('hidden');
            loading.classList.remove('hidden');
            simulateBtn.disabled = true;
            simulateBtn.classList.add('opacity-50');

            try {
                const res = await fetch('/api/simulate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ scenario })
                });

                if (!res.ok) throw new Error('Simulation failed');

                const data = await res.json();

                loading.classList.add('hidden');
                await typeLogs(data.logs);

                data.reactions.forEach((reaction, index) => {
                    setTimeout(() => {
                        const card = document.createElement('div');
                        card.className = `card bg-slate-800/50 rounded-2xl p-6 flex flex-col h-full ${getStateClass(reaction.action_state)}`;

                        card.innerHTML = `
                            <div class="flex justify-between items-start mb-4">
                                <div>
                                    <h3 class="text-xl font-bold text-white drop-shadow-sm">${reaction.name}</h3>
                                    <p class="text-xs text-slate-400 mt-1">${reaction.archetype}</p>
                                </div>
                                ${getStateBadge(reaction.action_state)}
                            </div>
                            <div class="mb-5 bg-black/20 p-3 rounded-lg border border-white/5">
                                <span class="text-[10px] font-bold text-indigo-400 uppercase tracking-widest block mb-1">Core Emotion</span>
                                <p class="text-sm italic text-slate-200 drop-shadow-sm">"${reaction.core_emotion}"</p>
                            </div>
                            <div class="mt-auto pt-4 border-t border-white/10 relative">
                                <div class="absolute -top-1.5 left-1/2 -translate-x-1/2 w-4 h-1 bg-white/10 rounded-full"></div>
                                <span class="text-[10px] font-bold text-blue-400 uppercase tracking-widest block mb-2">Reaction Strategy</span>
                                <p class="text-sm text-slate-300 leading-relaxed drop-shadow-sm">${reaction.reaction_strategy}</p>
                            </div>
                        `;
                        resultsGrid.appendChild(card);
                    }, index * 150); // Staggered entrance
                });

            } catch (err) {
                console.error(err);
                alert('Error running simulation');
                loading.classList.add('hidden');
            } finally {
                simulateBtn.disabled = false;
                simulateBtn.classList.remove('opacity-50');
            }
        });

        // Initial load check
        fetch('/api/characters').then(r => r.json()).then(data => {
            console.log('Characters loaded:', data.characters.length);
        }).catch(e => console.log('Backend not ready or accessible via this path.'));
    </script>
</body>
</html>
