<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Survival Game AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['Fira Code', 'monospace'],
                    },
                    colors: {
                        brand: {
                            400: '#ef4444', // Red for survival/danger
                            500: '#dc2626',
                            600: '#b91c1c',
                        }
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.5s ease-out forwards',
                        'slide-up': 'slideUp 0.5s ease-out forwards',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        slideUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            background-image:
                radial-gradient(at 0% 0%, rgba(239, 68, 68, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(30, 58, 138, 0.15) 0px, transparent 50%);
            background-attachment: fixed;
            min-height: 100vh;
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .text-glow {
            text-shadow: 0 0 10px rgba(239, 68, 68, 0.5);
        }

        .smooth-hover {
            transition: all 0.3s ease;
        }

        .smooth-hover:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2), 0 4px 6px -2px rgba(0, 0, 0, 0.1);
            border-color: rgba(239, 68, 68, 0.4);
        }

        /* Custom scrollbar for terminal */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(15, 23, 42, 0.5);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(71, 85, 105, 0.8);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(100, 116, 139, 1);
        }

        .typing-indicator::after {
            content: '▋';
            animation: blink 1s step-start infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body class="p-4 md:p-8 font-sans antialiased">
    <div class="max-w-6xl mx-auto space-y-8">
        <!-- Header -->
        <header class="text-center space-y-4 animate-fade-in">
            <h1 class="text-4xl md:text-6xl font-bold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-red-400 to-orange-500 text-glow">
                Anime Survival Game AI
            </h1>
            <p class="text-slate-400 max-w-2xl mx-auto text-lg">
                Enter a catastrophic scenario. The AI will evaluate each character's traits, assign them a survival role, and simulate who lives and who dies.
            </p>
        </header>

        <!-- Input Section -->
        <div class="glass-panel rounded-2xl p-6 md:p-8 animate-slide-up" style="animation-delay: 0.1s;">
            <div class="space-y-4">
                <label for="scenario-input" class="block text-sm font-medium text-slate-300">
                    Describe the Survival Scenario (e.g., Zombie apocalypse, Deserted island, Alien invasion):
                </label>
                <textarea
                    id="scenario-input"
                    rows="3"
                    class="w-full bg-slate-900/50 border border-slate-700 rounded-xl p-4 text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition-all font-mono text-sm"
                    placeholder="A highly contagious zombie virus outbreaks in a densely populated city..."
                ></textarea>
                <button
                    id="simulate-btn"
                    class="w-full md:w-auto px-8 py-3 bg-gradient-to-r from-brand-600 to-brand-500 hover:from-brand-500 hover:to-brand-400 text-white rounded-xl font-semibold shadow-[0_0_15px_rgba(239,68,68,0.4)] hover:shadow-[0_0_25px_rgba(239,68,68,0.6)] transition-all flex items-center justify-center gap-2"
                >
                    <span>Simulate Survival</span>
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                </button>
            </div>
        </div>

        <!-- Loading / Terminal State -->
        <div id="terminal-container" class="hidden glass-panel rounded-2xl p-6 border border-slate-700/50">
            <div class="flex items-center gap-2 mb-4 pb-4 border-b border-slate-700/50">
                <div class="w-3 h-3 rounded-full bg-red-500"></div>
                <div class="w-3 h-3 rounded-full bg-yellow-500"></div>
                <div class="w-3 h-3 rounded-full bg-green-500"></div>
                <span class="ml-2 font-mono text-xs text-slate-400">orchestrator_ai_terminal</span>
            </div>
            <div id="terminal-output" class="font-mono text-sm text-green-400 space-y-2 h-48 overflow-y-auto">
                <!-- Terminal logs go here -->
            </div>
        </div>

        <!-- Results Container -->
        <div id="results-container" class="hidden space-y-8 animate-slide-up">
            <div class="flex items-center justify-between border-b border-slate-700 pb-2">
                <h2 class="text-2xl font-bold text-slate-100 flex items-center gap-2">
                    <svg class="w-6 h-6 text-brand-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    Simulation Results
                </h2>
                <div class="flex gap-4 text-sm font-mono">
                    <span class="text-green-400" id="survivors-count">Survivors: 0</span>
                    <span class="text-red-400" id="casualties-count">Casualties: 0</span>
                </div>
            </div>

            <!-- Survivor Grid -->
            <div>
                <h3 class="text-xl font-semibold text-green-400 mb-4 ml-2">Survivors</h3>
                <div id="survivors-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <!-- Cards injected here -->
                </div>
            </div>

            <!-- Casualties Grid -->
            <div class="mt-8">
                <h3 class="text-xl font-semibold text-red-500 mb-4 ml-2">Casualties</h3>
                <div id="casualties-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <!-- Cards injected here -->
                </div>
            </div>
        </div>
    </div>

    <script>
        const simulateBtn = document.getElementById('simulate-btn');
        const scenarioInput = document.getElementById('scenario-input');
        const terminalContainer = document.getElementById('terminal-container');
        const terminalOutput = document.getElementById('terminal-output');
        const resultsContainer = document.getElementById('results-container');
        const survivorsGrid = document.getElementById('survivors-grid');
        const casualtiesGrid = document.getElementById('casualties-grid');
        const survivorsCount = document.getElementById('survivors-count');
        const casualtiesCount = document.getElementById('casualties-count');

        const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

        function sanitizeHTML(str) {
            const temp = document.createElement('div');
            temp.textContent = str;
            return temp.innerHTML;
        }

        async function typeToTerminal(text) {
            const p = document.createElement('p');
            p.className = 'typing-indicator text-slate-300';
            terminalOutput.appendChild(p);

            for (let i = 0; i < text.length; i++) {
                p.textContent = text.substring(0, i + 1);
                terminalOutput.scrollTop = terminalOutput.scrollHeight;
                await sleep(20);
            }
            p.classList.remove('typing-indicator');
        }

        function createCharacterCard(char) {
            const isSurvivor = char.status === 'Survived';
            const statusColor = isSurvivor ? 'text-green-400' : 'text-red-500';
            const borderColor = isSurvivor ? 'border-green-500/30' : 'border-red-500/30';
            const bgGradient = isSurvivor ? 'from-green-500/10' : 'from-red-500/10';

            return `
                <div class="glass-panel rounded-xl p-5 smooth-hover border ${borderColor} flex flex-col h-full bg-gradient-to-b ${bgGradient} to-transparent relative overflow-hidden">
                    ${!isSurvivor ? '<div class="absolute inset-0 bg-red-900/10 pointer-events-none"></div><div class="absolute inset-0 flex items-center justify-center opacity-10 pointer-events-none"><svg class="w-32 h-32 text-red-500" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"></path></svg></div>' : ''}
                    <div class="flex items-start gap-4 mb-4 relative z-10">
                        <img src="${sanitizeHTML(char.avatar)}" alt="${sanitizeHTML(char.name)}" class="w-16 h-16 rounded-full bg-slate-800 p-1 border-2 ${borderColor}">
                        <div>
                            <h3 class="font-bold text-lg text-slate-100">${sanitizeHTML(char.name)}</h3>
                            <div class="flex flex-col gap-1 mt-1">
                                <span class="text-xs font-mono px-2 py-0.5 rounded bg-slate-800 border border-slate-700 text-slate-300 w-fit">${sanitizeHTML(char.role)}</span>
                                <span class="text-xs font-bold ${statusColor} uppercase tracking-wider">${sanitizeHTML(char.status)}</span>
                            </div>
                        </div>
                    </div>
                    <div class="mt-auto relative z-10">
                        <div class="text-sm text-slate-300 bg-slate-900/40 p-3 rounded-lg border border-slate-700/50 italic leading-relaxed">
                            "${sanitizeHTML(char.strategy)}"
                        </div>
                    </div>
                </div>
            `;
        }

        simulateBtn.addEventListener('click', async () => {
            const scenario = scenarioInput.value.trim();
            if (!scenario) {
                alert("Please describe a survival scenario.");
                return;
            }

            // UI Reset
            simulateBtn.disabled = true;
            simulateBtn.innerHTML = '<svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white inline" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Simulating...';
            resultsContainer.classList.add('hidden');
            survivorsGrid.innerHTML = '';
            casualtiesGrid.innerHTML = '';
            terminalOutput.innerHTML = '';
            terminalContainer.classList.remove('hidden');

            try {
                await typeToTerminal(`> INITIALIZING SURVIVAL PROTOCOL`);
                await typeToTerminal(`> SCENARIO DETECTED: "${scenario}"`);
                await typeToTerminal(`> LOADING CHARACTER ROSTER...`);
                await typeToTerminal(`> EVALUATING CORE EMOTIONS AND UNIQUE QUALITIES...`);

                // We use relative path or absolute for local dev. Best to use absolute if running backend on different port.
                // Assuming backend is at http://localhost:8008 for local testing.
                const apiUrl = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
                    ? 'http://localhost:8008/api/survive'
                    : '/api/survive';

                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ scenario })
                });

                if (!response.ok) throw new Error("API request failed");
                const data = await response.json();

                await typeToTerminal(`> ASSIGNING SURVIVAL ROLES...`);
                await typeToTerminal(`> SIMULATING ENCOUNTERS...`);
                await typeToTerminal(`> CALCULATION COMPLETE.`);
                await sleep(500);
                terminalContainer.classList.add('hidden');

                // Populate Results
                survivorsCount.textContent = `Survivors: ${data.survivors.length}`;
                casualtiesCount.textContent = `Casualties: ${data.casualties.length}`;

                data.survivors.forEach((char, index) => {
                    const html = createCharacterCard(char);
                    const div = document.createElement('div');
                    div.innerHTML = html;
                    div.className = 'animate-slide-up opacity-0';
                    div.style.animationDelay = `${index * 0.1}s`;
                    div.style.animationFillMode = 'forwards';
                    survivorsGrid.appendChild(div);
                });

                data.casualties.forEach((char, index) => {
                    const html = createCharacterCard(char);
                    const div = document.createElement('div');
                    div.innerHTML = html;
                    div.className = 'animate-slide-up opacity-0';
                    div.style.animationDelay = `${(data.survivors.length + index) * 0.1}s`;
                    div.style.animationFillMode = 'forwards';
                    casualtiesGrid.appendChild(div);
                });

                resultsContainer.classList.remove('hidden');

            } catch (error) {
                console.error(error);
                await typeToTerminal(`> [ERROR] SIMULATION FAILED: ${error.message}`);
                alert("Failed to simulate. Ensure the backend is running.");
            } finally {
                simulateBtn.disabled = false;
                simulateBtn.innerHTML = '<span>Simulate Survival</span><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>';
            }
        });
    </script>
</body>
</html>
