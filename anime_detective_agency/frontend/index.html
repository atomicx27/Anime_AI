<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Detective Agency AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top, #1e1e2f 0%, #0d0d16 100%);
            color: #e2e8f0;
            min-height: 100vh;
        }
        .fira {
            font-family: 'Fira Code', monospace;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }
        .glow {
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.5);
        }
        .card-hover:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(139, 92, 246, 0.4);
            border-color: rgba(139, 92, 246, 0.5);
        }
        .terminal-text {
            color: #a78bfa;
        }
        .role-badge {
            background: linear-gradient(135deg, #8b5cf6 0%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="p-8">

    <div class="max-w-6xl mx-auto">

        <header class="text-center mb-12">
            <h1 class="text-5xl font-bold mb-4 tracking-tight">Anime <span class="text-violet-500">Detective</span> Agency</h1>
            <p class="text-lg text-gray-400 fira">Submit a mysterious case and watch the characters investigate.</p>
        </header>

        <main class="grid grid-cols-1 lg:grid-cols-3 gap-8">

            <!-- Input Section -->
            <section class="lg:col-span-1 space-y-6">
                <div class="glass-panel p-6 rounded-2xl">
                    <h2 class="text-2xl font-semibold mb-4 text-white">Case Description</h2>
                    <textarea id="case-input" rows="6" class="w-full bg-black/40 border border-gray-600 rounded-lg p-3 text-white focus:outline-none focus:border-violet-500 focus:ring-1 focus:ring-violet-500 transition fira text-sm" placeholder="Describe the mystery... (e.g., The golden artifact was stolen from the central vault overnight without triggering any alarms.)"></textarea>

                    <button id="solve-btn" class="w-full mt-4 bg-violet-600 hover:bg-violet-500 text-white font-semibold py-3 rounded-lg transition duration-300 glow">
                        Assign Investigation Roles
                    </button>
                </div>

                <div id="loading" class="hidden glass-panel p-6 rounded-2xl text-center">
                    <div class="animate-pulse flex flex-col items-center">
                        <div class="h-8 w-8 border-4 border-violet-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                        <p class="fira terminal-text">Analyzing evidence & assigning roles...</p>
                    </div>
                </div>
            </section>

            <!-- Results Section -->
            <section class="lg:col-span-2">
                <div id="results-container" class="hidden space-y-6">
                    <div class="glass-panel p-6 rounded-2xl mb-6">
                        <h2 class="text-xl font-bold mb-2">Active Case</h2>
                        <p id="active-case-text" class="text-gray-300 italic">...</p>
                    </div>

                    <div id="team-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <!-- Cards injected here -->
                    </div>
                </div>

                <div id="empty-state" class="glass-panel p-12 rounded-2xl flex flex-col items-center justify-center h-full text-center border-dashed border-gray-600">
                    <svg xmlns="http://www.w3.org/-svg" class="h-16 w-16 text-gray-500 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                    <p class="text-xl text-gray-400 font-medium">Awaiting Case Submission</p>
                    <p class="text-sm text-gray-500 mt-2">The agency is standing by.</p>
                </div>
            </section>

        </main>
    </div>

    <script>
        document.getElementById('solve-btn').addEventListener('click', async () => {
            const caseDesc = document.getElementById('case-input').value.trim();
            if (!caseDesc) {
                alert("Please describe a case for the agency to investigate.");
                return;
            }

            // UI State updates
            document.getElementById('empty-state').classList.add('hidden');
            document.getElementById('results-container').classList.add('hidden');
            document.getElementById('loading').classList.remove('hidden');

            try {
                // Determine API endpoint based on how it's served
                const apiUrl = window.location.port === '8007' ? '/api/solve' : 'http://localhost:8007/api/solve';

                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ case_description: caseDesc })
                });

                if (!response.ok) throw new Error("Failed to process case");

                const data = await response.json();
                renderResults(data);

            } catch (err) {
                alert("Error connecting to the Detective Agency: " + err.message);
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('empty-state').classList.remove('hidden');
            }
        });

        function renderResults(data) {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('results-container').classList.remove('hidden');

            document.getElementById('active-case-text').textContent = `"${data.case_description}"`;

            const grid = document.getElementById('team-grid');
            grid.innerHTML = '';

            data.team_actions.forEach(char => {
                const card = document.createElement('div');
                card.className = 'glass-panel p-5 rounded-xl transition duration-300 card-hover border border-gray-700/50';

                card.innerHTML = `
                    <div class="flex justify-between items-start mb-3">
                        <h3 class="text-lg font-bold text-white">${char.name}</h3>
                        <span class="text-xs font-bold uppercase tracking-wider role-badge fira bg-black/50 px-2 py-1 rounded border border-gray-700">${char.role}</span>
                    </div>
                    <div class="mb-4">
                        <p class="text-xs text-gray-400 uppercase tracking-wider mb-1 fira">Action Plan</p>
                        <p class="text-sm text-gray-200 leading-relaxed">${char.action}</p>
                    </div>
                    <div class="pt-3 border-t border-gray-700/50">
                        <p class="text-xs text-gray-500 fira"><span class="text-violet-400">Core:</span> ${char.core_emotion}</p>
                    </div>
                `;
                grid.appendChild(card);
            });
        }
    </script>
</body>
</html>
