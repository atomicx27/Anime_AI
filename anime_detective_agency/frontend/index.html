<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Detective Agency AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
        }
        .terminal-font {
            font-family: 'Fira Code', monospace;
        }
        .glassmorphism {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .shadow-glow {
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.5);
        }
        .gradient-bg {
            background: radial-gradient(circle at top, #1e3a8a, #0f172a);
        }

        /* Loading Animation */
        .loader {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top: 4px solid #3b82f6;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="gradient-bg min-h-screen flex flex-col items-center justify-start p-8">

    <div class="max-w-5xl w-full flex flex-col gap-8">
        <!-- Header -->
        <header class="text-center">
            <h1 class="text-5xl font-bold mb-4 text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500 shadow-glow rounded-lg inline-block p-4">Anime Detective Agency AI</h1>
            <p class="text-slate-400 text-lg">Describe a mystery, and our elite council of anime agents will investigate it using their unique traits.</p>
        </header>

        <!-- Input Section -->
        <div class="glassmorphism rounded-2xl p-6 shadow-glow">
            <label for="mystery-input" class="block text-sm font-medium text-blue-300 mb-2">The Mystery / Case Description</label>
            <textarea id="mystery-input" rows="4" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-4 text-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all placeholder-slate-500" placeholder="e.g., A powerful artifact has been stolen from the hidden village vault. There are signs of a struggle, but no clear forced entry..."></textarea>
            <button id="solve-btn" class="mt-4 w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-6 rounded-lg transition-all duration-300 flex justify-center items-center gap-2">
                Initiate Investigation
                <div id="loading-spinner" class="loader hidden"></div>
            </button>
        </div>

        <!-- Results Section -->
        <div id="results-container" class="hidden flex-col gap-8 w-full">

            <!-- Agent Terminal Logs -->
            <div class="glassmorphism rounded-2xl p-6">
                <h2 class="text-xl font-bold text-blue-400 mb-4 border-b border-slate-700 pb-2">Chief Inspector Terminal Logs</h2>
                <div id="terminal-logs" class="terminal-font text-sm text-green-400 bg-slate-900 p-4 rounded-lg h-48 overflow-y-auto whitespace-pre-wrap"></div>
            </div>

            <!-- Investigation Results Grid -->
            <div>
                <h2 class="text-2xl font-bold text-blue-400 mb-6 text-center">Investigation Findings</h2>
                <div id="investigations-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <!-- Cards will be dynamically injected here -->
                </div>
            </div>

        </div>
    </div>

    <script>
        const solveBtn = document.getElementById('solve-btn');
        const mysteryInput = document.getElementById('mystery-input');
        const loadingSpinner = document.getElementById('loading-spinner');
        const resultsContainer = document.getElementById('results-container');
        const terminalLogs = document.getElementById('terminal-logs');
        const investigationsGrid = document.getElementById('investigations-grid');

        solveBtn.addEventListener('click', async () => {
            const mystery = mysteryInput.value.trim();
            if (!mystery) {
                alert("Please describe a mystery first.");
                return;
            }

            // UI Loading State
            solveBtn.disabled = true;
            solveBtn.classList.add('opacity-75', 'cursor-not-allowed');
            loadingSpinner.classList.remove('hidden');
            resultsContainer.classList.add('hidden');
            terminalLogs.innerHTML = '';
            investigationsGrid.innerHTML = '';

            try {
                // Fetch data from backend
                const response = await fetch('http://localhost:8007/api/solve', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ mystery })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();

                // Display Logs (Simulating typing effect)
                resultsContainer.classList.remove('hidden');
                await simulateTyping(data.logs, terminalLogs);

                // Display Investigation Cards
                renderInvestigationCards(data.investigations);

            } catch (error) {
                console.error("Error solving mystery:", error);
                alert("An error occurred while communicating with the agency backend.");
            } finally {
                // Reset UI Loading State
                solveBtn.disabled = false;
                solveBtn.classList.remove('opacity-75', 'cursor-not-allowed');
                loadingSpinner.classList.add('hidden');
            }
        });

        async function simulateTyping(logs, element) {
            element.innerHTML = '';
            for (const log of logs) {
                element.innerHTML += `> ${log}\n`;
                // Scroll to bottom
                element.scrollTop = element.scrollHeight;
                // Small delay to simulate processing
                await new Promise(r => setTimeout(r, 100));
            }
        }

        function renderInvestigationCards(investigations) {
            investigations.forEach((inv, index) => {
                const card = document.createElement('div');
                card.className = `glassmorphism rounded-xl p-5 hover:scale-105 transition-transform duration-300 opacity-0 transform translate-y-4`;
                card.style.animation = `fadeInUp 0.5s ease forwards ${index * 0.1}s`;

                // Role colors based on typical detective roles
                let roleColor = 'text-blue-300';
                if(inv.role.includes('Enforcer')) roleColor = 'text-red-400';
                if(inv.role.includes('Psychological')) roleColor = 'text-purple-400';
                if(inv.role.includes('Forensic')) roleColor = 'text-green-400';
                if(inv.role.includes('Interrogator')) roleColor = 'text-yellow-400';
                if(inv.role.includes('Cold Case')) roleColor = 'text-slate-400';

                card.innerHTML = `
                    <div class="flex justify-between items-start mb-3">
                        <h3 class="text-lg font-bold text-white">${inv.name}</h3>
                        <span class="text-xs font-semibold px-2 py-1 rounded bg-slate-800 text-slate-300 border border-slate-600">${inv.archetype}</span>
                    </div>
                    <div class="mb-4">
                        <span class="text-sm font-semibold ${roleColor} block mb-1">Assigned Role:</span>
                        <span class="text-md font-medium text-slate-200">${inv.role}</span>
                    </div>
                    <div class="bg-slate-900/50 p-3 rounded-lg border border-slate-700/50">
                        <span class="text-xs font-semibold text-slate-400 block mb-2 uppercase tracking-wider">Agent Deduction</span>
                        <p class="text-sm text-slate-300 italic">"${inv.deduction}"</p>
                    </div>
                `;
                investigationsGrid.appendChild(card);
            });
        }
    </script>
    <style>
        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</body>
</html>
