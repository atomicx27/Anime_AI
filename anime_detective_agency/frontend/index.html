<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Detective Agency AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            background-image: radial-gradient(circle at top right, #1e1b4b, #0f172a 60%);
            min-height: 100vh;
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06), 0 0 20px rgba(99, 102, 241, 0.15);
            border-radius: 1rem;
        }

        .glow-effect {
            transition: all 0.3s ease;
        }

        .glow-effect:hover {
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.5);
            transform: translateY(-2px);
        }

        .loading-dots::after {
            content: '';
            animation: dots 1.5s steps(4, end) infinite;
        }

        @keyframes dots {
            0%, 20% { content: ''; }
            40% { content: '.'; }
            60% { content: '..'; }
            80%, 100% { content: '...'; }
        }

        .role-badge {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 600;
        }
    </style>
</head>
<body class="p-8">
    <div class="max-w-5xl mx-auto">
        <header class="text-center mb-12">
            <h1 class="text-5xl font-extrabold mb-4 bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 to-purple-500 drop-shadow-[0_0_10px_rgba(99,102,241,0.5)]">Anime Detective Agency AI</h1>
            <p class="text-xl text-slate-300">Submit a mystery and let our AI agents investigate</p>
        </header>

        <main class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Input Section -->
            <div class="lg:col-span-1 space-y-6">
                <div class="glass-panel p-6">
                    <h2 class="text-2xl font-bold mb-4 flex items-center">
                        <svg class="w-6 h-6 mr-2 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                        Report a Case
                    </h2>
                    <textarea id="mysteryInput" rows="5" class="w-full bg-slate-800/50 border border-slate-600 rounded-lg p-4 text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all" placeholder="Describe the mystery or crime..."></textarea>
                    <button id="investigateBtn" class="w-full mt-4 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-lg glow-effect flex justify-center items-center">
                        Assign Team & Investigate
                    </button>
                </div>
            </div>

            <!-- Results Section -->
            <div class="lg:col-span-2 space-y-6" id="resultsSection" style="display: none;">
                <!-- Team Section -->
                <div class="glass-panel p-6">
                    <h2 class="text-2xl font-bold mb-6">Assigned Investigation Team</h2>
                    <div id="teamContainer" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <!-- Team members will be inserted here -->
                    </div>
                </div>

                <!-- Investigation Log -->
                <div class="glass-panel p-6">
                    <h2 class="text-2xl font-bold mb-6">Investigation Log</h2>
                    <div id="logContainer" class="space-y-4 max-h-96 overflow-y-auto pr-2">
                        <!-- Logs will be inserted here -->
                    </div>
                </div>
            </div>

            <!-- Loading State -->
            <div id="loadingSection" class="lg:col-span-2 glass-panel p-12 text-center" style="display: none;">
                <svg class="animate-spin h-12 w-12 text-indigo-500 mx-auto mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <p class="text-xl text-indigo-300">Agents are analyzing the scene<span class="loading-dots"></span></p>
            </div>
        </main>
    </div>

    <script>
        document.getElementById('investigateBtn').addEventListener('click', async () => {
            const mystery = document.getElementById('mysteryInput').value.trim();
            if (!mystery) {
                alert('Please describe a mystery first!');
                return;
            }

            // UI updates for loading
            document.getElementById('resultsSection').style.display = 'none';
            document.getElementById('loadingSection').style.display = 'block';
            document.getElementById('investigateBtn').disabled = true;
            document.getElementById('investigateBtn').classList.add('opacity-50', 'cursor-not-allowed');

            try {
                const response = await fetch('/api/investigate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mystery })
                });

                if (!response.ok) throw new Error('API request failed');
                const data = await response.json();

                renderResults(data);
            } catch (error) {
                console.error('Error:', error);
                alert('Failed to investigate. Check console for details.');
            } finally {
                document.getElementById('loadingSection').style.display = 'none';
                document.getElementById('investigateBtn').disabled = false;
                document.getElementById('investigateBtn').classList.remove('opacity-50', 'cursor-not-allowed');
            }
        });

        function renderResults(data) {
            document.getElementById('resultsSection').style.display = 'block';

            // Render Team
            const teamContainer = document.getElementById('teamContainer');
            teamContainer.innerHTML = '';
            data.team.forEach(member => {
                teamContainer.innerHTML += `
                    <div class="bg-slate-800/80 rounded-lg p-4 text-center border border-slate-700 glow-effect">
                        <img src="${member.character.avatar}" alt="${member.character.name}" class="w-20 h-20 mx-auto rounded-full mb-3 bg-slate-700">
                        <h3 class="font-bold text-lg text-white mb-1">${member.character.name}</h3>
                        <span class="role-badge mb-2 inline-block">${member.role}</span>
                        <p class="text-xs text-slate-400 mt-2 line-clamp-2">${member.character.unique_quality}</p>
                    </div>
                `;
            });

            // Render Logs
            const logContainer = document.getElementById('logContainer');
            logContainer.innerHTML = '';

            // Simulate typing effect by adding logs sequentially
            let delay = 0;
            data.logs.forEach((log, index) => {
                setTimeout(() => {
                    const logElement = document.createElement('div');
                    logElement.className = 'bg-slate-800/60 rounded-lg p-4 border-l-4 border-indigo-500 animate-[fadeIn_0.5s_ease-out]';
                    logElement.innerHTML = `
                        <div class="flex items-start">
                            <img src="${log.character.avatar}" alt="${log.character.name}" class="w-10 h-10 rounded-full mr-4 bg-slate-700">
                            <div>
                                <div class="flex items-baseline space-x-2">
                                    <h4 class="font-bold text-indigo-300">${log.character.name}</h4>
                                    <span class="text-xs text-slate-500">[${log.action}]</span>
                                </div>
                                <p class="text-slate-200 mt-1">${log.message}</p>
                            </div>
                        </div>
                    `;
                    logContainer.appendChild(logElement);
                    logContainer.scrollTop = logContainer.scrollHeight;
                }, delay);
                delay += 1000; // 1 second delay between each log
            });
        }
    </script>
</body>
</html>
