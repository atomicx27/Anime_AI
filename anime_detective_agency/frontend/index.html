<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Detective Agency AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['Fira Code', 'monospace'],
                    },
                    colors: {
                        'neon-blue': '#00f3ff',
                        'neon-purple': '#bc13fe',
                        'dark-bg': '#0a0a0f',
                        'panel-bg': 'rgba(20, 20, 30, 0.7)',
                    },
                    animation: {
                        'pulse-glow': 'pulse-glow 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'fade-in': 'fadeIn 0.5s ease-out forwards',
                    },
                    keyframes: {
                        'pulse-glow': {
                            '0%, 100%': { opacity: 1, textShadow: '0 0 10px #00f3ff, 0 0 20px #00f3ff' },
                            '50%': { opacity: .7, textShadow: '0 0 5px #00f3ff' },
                        },
                        fadeIn: {
                            '0%': { opacity: '0', transform: 'translateY(10px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0a0a0f;
            background-image:
                radial-gradient(circle at 15% 50%, rgba(0, 243, 255, 0.05), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(188, 19, 254, 0.05), transparent 25%);
            color: #e2e8f0;
        }
        .glass-panel {
            background: rgba(20, 20, 30, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(0, 243, 255, 0.3);
            border-radius: 3px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 243, 255, 0.5);
        }
        .role-badge {
            text-shadow: 0 0 5px currentColor;
        }
    </style>
</head>
<body class="h-screen w-screen overflow-hidden flex flex-col font-sans">

    <!-- Header -->
    <header class="glass-panel border-b border-gray-800 p-4 flex justify-between items-center z-20 shadow-[0_0_15px_rgba(0,243,255,0.1)]">
        <div class="flex items-center space-x-3">
            <div class="w-10 h-10 rounded-full bg-gradient-to-br from-neon-blue to-neon-purple flex items-center justify-center shadow-[0_0_10px_rgba(0,243,255,0.5)]">
                <i class="fas fa-search text-white text-xl"></i>
            </div>
            <div>
                <h1 class="text-xl font-bold tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-neon-blue to-neon-purple">ANIME DETECTIVE AGENCY</h1>
                <p class="text-xs text-gray-400 font-mono">Agentic Investigation Orchestrator v1.0</p>
            </div>
        </div>
        <div class="flex items-center space-x-2 text-sm font-mono">
            <span class="relative flex h-3 w-3">
              <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-neon-blue opacity-75"></span>
              <span class="relative inline-flex rounded-full h-3 w-3 bg-neon-blue shadow-[0_0_8px_#00f3ff]"></span>
            </span>
            <span class="text-neon-blue animate-pulse-glow">SYSTEM ONLINE</span>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col lg:flex-row overflow-hidden">

        <!-- Left Panel: Input & Terminal -->
        <div class="w-full lg:w-1/3 glass-panel border-r border-gray-800 p-6 flex flex-col z-10 shadow-[5px_0_15px_rgba(0,0,0,0.3)]">

            <!-- Input Section -->
            <div class="mb-6">
                <h2 class="text-lg font-semibold mb-3 flex items-center text-gray-200">
                    <i class="fas fa-file-signature mr-2 text-neon-blue"></i> Open a New Case
                </h2>
                <div class="relative">
                    <textarea id="caseInput" rows="5" class="w-full bg-black/50 border border-gray-700 rounded-xl p-4 text-gray-200 focus:outline-none focus:border-neon-blue focus:ring-1 focus:ring-neon-blue transition-all resize-none font-mono text-sm shadow-inner" placeholder="Describe the mystery, crime, or situation you need the agency to investigate..."></textarea>
                </div>
                <button id="investigateBtn" class="mt-4 w-full bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-500 hover:to-purple-500 text-white font-bold py-3 px-4 rounded-xl transition-all duration-300 transform hover:scale-[1.02] shadow-[0_0_15px_rgba(188,19,254,0.4)] flex justify-center items-center">
                    <i class="fas fa-search-location mr-2"></i> Deploy Operatives
                </button>
            </div>

            <!-- Agent Terminal/Logs -->
            <div class="mt-2 bg-black/80 rounded-xl p-4 border border-gray-800 flex-1 flex flex-col min-h-[250px] shadow-inner relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-neon-blue to-neon-purple opacity-50"></div>
                <div class="flex items-center mb-3 pb-2 border-b border-gray-800">
                    <i class="fas fa-terminal text-neon-blue mr-2 text-sm"></i>
                    <h3 class="text-xs font-mono text-gray-400 uppercase tracking-wider">Director AI Terminal</h3>
                </div>
                <div id="terminal" class="flex-1 overflow-y-auto custom-scrollbar font-mono text-xs text-gray-300 space-y-1 pr-2">
                    <div class="text-gray-500 italic">Awaiting case brief...</div>
                </div>
            </div>
        </div>

        <!-- Right Panel: Results Area -->
        <div class="w-full lg:w-2/3 p-6 flex flex-col z-10 overflow-y-auto custom-scrollbar relative">

            <h2 class="text-2xl font-bold mb-6 flex items-center text-gray-100 drop-shadow-md">
                <i class="fas fa-users-cog mr-3 text-neon-purple"></i> Assigned Task Force
            </h2>

            <div id="resultsContainer" class="flex-1 flex flex-col space-y-8">
                <div class="flex-1 flex items-center justify-center text-gray-500 h-full">
                    <div class="text-center opacity-50">
                        <i class="fas fa-folder-open text-6xl mb-4 text-gray-600"></i>
                        <p class="font-mono">No active investigation.</p>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <script>
        const API_BASE_URL = 'http://localhost:8007';

        const elements = {
            input: document.getElementById('caseInput'),
            btn: document.getElementById('investigateBtn'),
            terminal: document.getElementById('terminal'),
            results: document.getElementById('resultsContainer')
        };

        function getRoleStyle(role) {
            if (role.includes('Lead Detective')) return { icon: 'fa-user-tie', color: 'text-blue-400', border: 'border-blue-500/50', bg: 'bg-blue-500/10' };
            if (role.includes('Forensics')) return { icon: 'fa-microscope', color: 'text-purple-400', border: 'border-purple-500/50', bg: 'bg-purple-500/10' };
            if (role.includes('Interrogator')) return { icon: 'fa-comments', color: 'text-emerald-400', border: 'border-emerald-500/50', bg: 'bg-emerald-500/10' };
            if (role.includes('Enforcer')) return { icon: 'fa-shield-alt', color: 'text-red-400', border: 'border-red-500/50', bg: 'bg-red-500/10' };
            return { icon: 'fa-question-circle', color: 'text-yellow-400', border: 'border-yellow-500/50', bg: 'bg-yellow-500/10' };
        }

        function createRoleCard(assignment, index) {
            const style = getRoleStyle(assignment.role);

            return `
                <div class="glass-panel rounded-xl border ${style.border} overflow-hidden hover:bg-gray-800/50 transition-colors duration-300 animate-fade-in" style="animation-delay: ${index * 0.1}s; opacity: 0;">
                    <div class="${style.bg} p-3 flex justify-between items-center border-b border-gray-800/50">
                        <span class="font-bold ${style.color} role-badge text-sm uppercase tracking-wider flex items-center">
                            <i class="fas ${style.icon} mr-2"></i> ${assignment.role}
                        </span>
                    </div>
                    <div class="p-4">
                        <div class="flex justify-between items-start mb-2">
                            <div>
                                <h3 class="text-lg font-bold text-white drop-shadow-md">${assignment.name}</h3>
                                <span class="text-[10px] uppercase font-mono text-gray-400 tracking-wider">${assignment.archetype}</span>
                            </div>
                        </div>
                        <div class="mt-3 text-sm text-gray-300 leading-relaxed font-sans">
                            <span class="text-gray-500 font-semibold mb-1 block text-xs uppercase tracking-wider font-mono">Agent Insight</span>
                            <p class="border-l-2 ${style.border.replace('border-', 'border-l-')} pl-3 py-1 bg-black/20 rounded-r-md">
                                ${assignment.insight}
                            </p>
                        </div>
                    </div>
                </div>
            `;
        }

        function groupAssignmentsByRole(assignments) {
            const groups = {};
            assignments.forEach(a => {
                if (!groups[a.role]) groups[a.role] = [];
                groups[a.role].push(a);
            });
            return groups;
        }

        async function performInvestigation() {
            const caseDesc = elements.input.value.trim();
            if (!caseDesc) {
                alert("Please describe the case first.");
                return;
            }

            elements.btn.disabled = true;
            elements.btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Processing...';
            elements.terminal.innerHTML = '<div class="text-neon-blue">> Connecting to Agency Mainframe...</div>';
            elements.results.innerHTML = '';

            try {
                const response = await fetch(`${API_BASE_URL}/api/investigate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ case_description: caseDesc })
                });

                if (!response.ok) throw new Error('Network response was not ok');

                const data = await response.json();

                // Simulate streaming logs
                elements.terminal.innerHTML = '';
                for (let i = 0; i < data.logs.length; i++) {
                    setTimeout(() => {
                        let logColor = 'text-gray-400';
                        if (data.logs[i].includes('Result:')) logColor = 'text-neon-purple';
                        if (data.logs[i].includes('initialized')) logColor = 'text-neon-blue font-bold';

                        elements.terminal.innerHTML += `<div class="mb-1 ${logColor}">> ${data.logs[i]}</div>`;
                        elements.terminal.scrollTop = elements.terminal.scrollHeight;
                    }, i * 40); // Fast log typing effect
                }

                // Render Results
                setTimeout(() => {
                    elements.results.innerHTML = '';
                    const grouped = groupAssignmentsByRole(data.assignments);

                    const roleOrder = [
                        "Lead Detective",
                        "Forensics / Profiler (Dark Ops)",
                        "Interrogator (Good Cop)",
                        "Enforcer / Field Agent",
                        "Wildcard / Consultant"
                    ];

                    roleOrder.forEach(role => {
                        if (grouped[role] && grouped[role].length > 0) {
                            const style = getRoleStyle(role);
                            elements.results.innerHTML += `
                                <div class="mb-6">
                                    <h3 class="text-sm font-bold text-gray-400 uppercase tracking-widest mb-4 border-b border-gray-700/50 pb-2 flex items-center">
                                        <i class="fas ${style.icon} ${style.color} mr-2 opacity-70"></i>
                                        Division: ${role}
                                    </h3>
                                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        ${grouped[role].map((a, i) => createRoleCard(a, i)).join('')}
                                    </div>
                                </div>
                            `;
                        }
                    });

                }, data.logs.length * 40 + 300);

            } catch (error) {
                console.error("Error:", error);
                elements.terminal.innerHTML += `<div class="text-red-500 mt-2">> ERR: Connection failed. Check backend on port 8007.</div>`;
                elements.results.innerHTML = `
                    <div class="flex items-center justify-center h-full">
                        <div class="text-red-400 p-6 glass-panel rounded-xl border border-red-500/30 text-center max-w-md">
                            <i class="fas fa-exclamation-triangle text-3xl mb-3"></i>
                            <p class="font-mono text-sm">Communication with Director AI lost. Ensure backend server is active.</p>
                        </div>
                    </div>`;
            } finally {
                elements.btn.disabled = false;
                elements.btn.innerHTML = '<i class="fas fa-search-location mr-2"></i> Deploy Operatives';
            }
        }

        elements.btn.addEventListener('click', performInvestigation);

        elements.input.addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 'Enter') {
                performInvestigation();
            }
        });
    </script>
</body>
</html>
