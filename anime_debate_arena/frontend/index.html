<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Debate Arena AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }

        .typing-indicator::after {
            content: '...';
            animation: typing 1s infinite;
        }
        @keyframes typing {
            0% { content: '.'; }
            33% { content: '..'; }
            66% { content: '...'; }
        }
        .fade-in {
            animation: fadeIn 0.5s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .terminal-log {
            font-family: monospace;
            color: #10b981;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-900 text-white min-h-screen font-sans bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-gray-800 via-gray-900 to-black">

    <div class="container mx-auto px-4 py-8 max-w-5xl relative">
        <!-- Ambient Glows -->
        <div class="absolute top-0 left-1/4 w-96 h-96 bg-red-900/20 rounded-full blur-[100px] pointer-events-none"></div>
        <div class="absolute bottom-0 right-1/4 w-96 h-96 bg-purple-900/20 rounded-full blur-[100px] pointer-events-none"></div>

        <header class="text-center mb-12 relative z-10">
            <h1 class="text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-red-500 to-purple-600 mb-4 drop-shadow-[0_0_15px_rgba(239,68,68,0.5)]">
                Anime Debate Arena
            </h1>
            <p class="text-gray-400 text-lg">Propose a topic and watch two opposing minds clash.</p>
        </header>

        <!-- Input Section -->
        <div class="bg-gray-800/60 backdrop-blur-md rounded-xl p-6 shadow-[0_0_25px_rgba(0,0,0,0.5)] mb-8 border border-gray-700/50 relative z-10 hover:shadow-[0_0_30px_rgba(168,85,247,0.2)] transition-shadow duration-300">
            <h2 class="text-xl font-bold mb-4 text-purple-400">Propose a Debate Topic</h2>
            <div class="flex space-x-4">
                <input type="text" id="topicInput" placeholder="e.g., Is true peace achievable without sacrifice?"
                       class="flex-1 bg-gray-700 text-white px-4 py-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500">
                <button id="debateBtn" class="bg-purple-600 hover:bg-purple-700 text-white px-8 py-3 rounded-lg font-bold transition duration-200">
                    Host Debate
                </button>
            </div>
        </div>

        <!-- Main Arena (Hidden initially) -->
        <div id="arenaContainer" class="hidden space-y-8">

            <!-- Agent Terminal -->
            <div class="bg-black rounded-lg p-4 border border-green-900 shadow-inner h-48 overflow-y-auto">
                <h3 class="text-xs text-green-500 mb-2 uppercase tracking-wider">>> Agent Terminal Logs</h3>
                <div id="terminalOutput" class="terminal-log text-sm space-y-1"></div>
            </div>

            <!-- VS Screen -->
            <div id="vsScreen" class="hidden">
                <div class="flex items-center justify-between bg-gray-800/60 backdrop-blur-md rounded-xl p-8 border border-gray-700/50 shadow-[0_0_30px_rgba(0,0,0,0.6)] hover:scale-[1.01] transition-transform duration-300">
                    <!-- Character 1 -->
                    <div class="w-2/5 text-center fade-in">
                        <div class="text-3xl font-bold text-blue-400 mb-2" id="char1Name"></div>
                        <div class="text-sm text-gray-400 italic" id="char1Core"></div>
                    </div>

                    <!-- VS Logo -->
                    <div class="w-1/5 text-center">
                        <div class="text-5xl font-black text-red-500 italic transform -skew-x-12">VS</div>
                    </div>

                    <!-- Character 2 -->
                    <div class="w-2/5 text-center fade-in">
                        <div class="text-3xl font-bold text-red-400 mb-2" id="char2Name"></div>
                        <div class="text-sm text-gray-400 italic" id="char2Core"></div>
                    </div>
                </div>
            </div>

            <!-- Debate Transcript -->
            <div id="transcriptContainer" class="hidden bg-gray-800/60 backdrop-blur-md rounded-xl p-6 border border-gray-700/50 shadow-2xl relative z-10">
                <h3 class="text-xl font-bold mb-6 border-b border-gray-700/50 pb-2">Debate Transcript</h3>
                <div id="transcript" class="space-y-6"></div>
            </div>

        </div>
    </div>

    <script>
        const debateBtn = document.getElementById('debateBtn');
        const topicInput = document.getElementById('topicInput');
        const arenaContainer = document.getElementById('arenaContainer');
        const terminalOutput = document.getElementById('terminalOutput');
        const vsScreen = document.getElementById('vsScreen');
        const transcriptContainer = document.getElementById('transcriptContainer');
        const transcript = document.getElementById('transcript');

        debateBtn.addEventListener('click', async () => {
            const topic = topicInput.value.trim();
            if (!topic) return;

            // Reset UI
            arenaContainer.classList.remove('hidden');
            vsScreen.classList.add('hidden');
            transcriptContainer.classList.add('hidden');
            terminalOutput.innerHTML = '';
            transcript.innerHTML = '';
            debateBtn.disabled = true;
            debateBtn.innerHTML = '<span class="typing-indicator">Processing</span>';

            try {
                const response = await fetch('/api/debate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ topic })
                });

                const data = await response.json();

                // 1. Simulate Terminal Logs
                for (let i = 0; i < data.logs.length; i++) {
                    await new Promise(r => setTimeout(r, 600)); // Delay between logs
                    const logEl = document.createElement('div');
                    logEl.textContent = `> ${data.logs[i]}`;
                    terminalOutput.appendChild(logEl);
                    terminalOutput.scrollTop = terminalOutput.scrollHeight;
                }

                // 2. Show VS Screen
                await new Promise(r => setTimeout(r, 1000));
                document.getElementById('char1Name').textContent = data.debater1.name;
                document.getElementById('char1Core').textContent = data.debater1.core_emotion;
                document.getElementById('char2Name').textContent = data.debater2.name;
                document.getElementById('char2Core').textContent = data.debater2.core_emotion;
                vsScreen.classList.remove('hidden');

                // 3. Show Transcript gradually
                await new Promise(r => setTimeout(r, 1500));
                transcriptContainer.classList.remove('hidden');

                for (let i = 0; i < data.transcript.length; i++) {
                    await new Promise(r => setTimeout(r, 1500)); // Delay between messages

                    const msg = data.transcript[i];
                    const msgEl = document.createElement('div');
                    msgEl.className = 'fade-in p-4 rounded-lg bg-gray-700/50 border-l-4 ' +
                                      (msg.speaker === data.debater1.name ? 'border-blue-500' : 'border-red-500 ml-8');

                    msgEl.innerHTML = `
                        <div class="font-bold mb-1 ${msg.speaker === data.debater1.name ? 'text-blue-400' : 'text-red-400'}">
                            ${msg.speaker}
                        </div>
                        <div class="text-gray-300">${msg.message}</div>
                    `;
                    transcript.appendChild(msgEl);
                }

            } catch (error) {
                console.error("Error hosting debate:", error);
                terminalOutput.innerHTML += `<div class="text-red-500">> Error: Connection failed.</div>`;
            } finally {
                debateBtn.disabled = false;
                debateBtn.textContent = 'Host Another Debate';
            }
        });

        // Allow pressing Enter to submit
        topicInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') debateBtn.click();
        });
    </script>
</body>
</html>
