<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Debate Arena</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
        }
        .fade-in {
            animation: fadeIn 0.5s ease-in-out forwards;
            opacity: 0;
            transform: translateY(10px);
        }
        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }
        /* Custom scrollbar for column containers */
        .column-container::-webkit-scrollbar {
            width: 6px;
        }
        .column-container::-webkit-scrollbar-track {
            background: #1e293b;
            border-radius: 4px;
        }
        .column-container::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 4px;
        }
        .column-container::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col font-sans">

    <header class="bg-slate-900 border-b border-slate-800 p-6 shadow-md z-10">
        <div class="max-w-6xl mx-auto text-center">
            <h1 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500 mb-2">Anime Debate Arena AI</h1>
            <p class="text-slate-400">Present a topic and watch the council divide and debate.</p>
        </div>
    </header>

    <main class="flex-1 flex flex-col max-w-7xl mx-auto w-full p-4 overflow-hidden relative">
        <!-- Topic Input Area -->
        <div class="bg-slate-800 p-6 rounded-xl shadow-lg mb-6 shrink-0 relative z-10">
            <form id="debate-form" class="flex flex-col md:flex-row gap-4">
                <input
                    type="text"
                    id="topic-input"
                    placeholder="Enter a controversial topic or philosophy (e.g., 'Is true peace achieved through absolute control?')"
                    class="flex-1 bg-slate-900 border border-slate-700 text-white px-4 py-3 rounded-lg focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-colors"
                    required
                >
                <button
                    type="submit"
                    id="submit-btn"
                    class="bg-blue-600 hover:bg-blue-500 text-white font-semibold py-3 px-8 rounded-lg transition-colors shadow-md disabled:opacity-50 disabled:cursor-not-allowed"
                >
                    Start Debate
                </button>
            </form>
            <div id="loading" class="hidden text-center mt-4 text-blue-400 animate-pulse">
                Analyzing characters and generating stances...
            </div>

            <div id="stats-container" class="hidden mt-4 pt-4 border-t border-slate-700 flex justify-center gap-8">
                <div class="text-center">
                    <div class="text-2xl font-bold text-green-400" id="stat-pro">0</div>
                    <div class="text-xs text-slate-400 uppercase tracking-wide">Pro</div>
                </div>
                <div class="text-center">
                    <div class="text-2xl font-bold text-slate-400" id="stat-neutral">0</div>
                    <div class="text-xs text-slate-500 uppercase tracking-wide">Neutral</div>
                </div>
                <div class="text-center">
                    <div class="text-2xl font-bold text-red-400" id="stat-con">0</div>
                    <div class="text-xs text-slate-400 uppercase tracking-wide">Con</div>
                </div>
            </div>
        </div>

        <!-- Debate Columns Area -->
        <div class="flex-1 flex flex-col md:flex-row gap-6 overflow-hidden min-h-0">

            <!-- Pro Column -->
            <div class="flex-1 flex flex-col bg-slate-800/50 rounded-xl border border-green-900/50 overflow-hidden">
                <div class="bg-green-900/30 p-3 border-b border-green-900/50 text-center font-bold text-green-400 uppercase tracking-wider shrink-0">
                    Pro
                </div>
                <div id="col-pro" class="flex-1 overflow-y-auto p-4 space-y-4 column-container">
                    <div class="text-slate-500 text-center italic mt-4 text-sm">Awaiting debate topic...</div>
                </div>
            </div>

            <!-- Neutral Column -->
            <div class="flex-1 flex flex-col bg-slate-800/50 rounded-xl border border-slate-700 overflow-hidden">
                <div class="bg-slate-700/50 p-3 border-b border-slate-700 text-center font-bold text-slate-300 uppercase tracking-wider shrink-0">
                    Neutral
                </div>
                <div id="col-neutral" class="flex-1 overflow-y-auto p-4 space-y-4 column-container">
                    <div class="text-slate-500 text-center italic mt-4 text-sm">Awaiting debate topic...</div>
                </div>
            </div>

            <!-- Con Column -->
            <div class="flex-1 flex flex-col bg-slate-800/50 rounded-xl border border-red-900/50 overflow-hidden">
                <div class="bg-red-900/30 p-3 border-b border-red-900/50 text-center font-bold text-red-400 uppercase tracking-wider shrink-0">
                    Con
                </div>
                <div id="col-con" class="flex-1 overflow-y-auto p-4 space-y-4 column-container">
                    <div class="text-slate-500 text-center italic mt-4 text-sm">Awaiting debate topic...</div>
                </div>
            </div>

        </div>
    </main>

    <script>
        const DOM = {
            form: document.getElementById('debate-form'),
            input: document.getElementById('topic-input'),
            btn: document.getElementById('submit-btn'),
            loading: document.getElementById('loading'),
            statsContainer: document.getElementById('stats-container'),
            statPro: document.getElementById('stat-pro'),
            statNeutral: document.getElementById('stat-neutral'),
            statCon: document.getElementById('stat-con'),
            colPro: document.getElementById('col-pro'),
            colNeutral: document.getElementById('col-neutral'),
            colCon: document.getElementById('col-con')
        };

        function createCharacterCard(evaluation, index) {
            let borderClass, textClass, bgClass;

            if (evaluation.stance === 'Pro') {
                borderClass = 'border-green-500/30';
                textClass = 'text-green-300';
                bgClass = 'bg-slate-800';
            } else if (evaluation.stance === 'Con') {
                borderClass = 'border-red-500/30';
                textClass = 'text-red-300';
                bgClass = 'bg-slate-800';
            } else {
                borderClass = 'border-slate-600';
                textClass = 'text-slate-300';
                bgClass = 'bg-slate-800';
            }

            const avatarUrl = `https://ui-avatars.com/api/?name=${encodeURIComponent(evaluation.name)}&background=random&color=fff`;

            return `
                <div class="${bgClass} border ${borderClass} rounded-lg p-4 shadow-sm fade-in" style="animation-delay: ${index * 0.1}s">
                    <div class="flex items-center mb-3">
                        <img src="${avatarUrl}" alt="${evaluation.name}" class="w-10 h-10 rounded-full mr-3 border border-slate-600">
                        <div>
                            <h3 class="font-bold text-white text-sm leading-tight">${evaluation.name}</h3>
                            <p class="text-xs text-slate-400">${evaluation.archetype}</p>
                        </div>
                    </div>
                    <p class="text-sm text-slate-300 italic mb-2">"${evaluation.argument}"</p>
                    <div class="text-[10px] text-slate-500 uppercase tracking-wide mt-2 pt-2 border-t border-slate-700/50">
                        Driven by: <span class="${textClass}">${evaluation.core_emotion}</span>
                    </div>
                </div>
            `;
        }

        function clearColumns() {
            DOM.colPro.innerHTML = '';
            DOM.colNeutral.innerHTML = '';
            DOM.colCon.innerHTML = '';
        }

        DOM.form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const topic = DOM.input.value.trim();
            if (!topic) return;

            // UI State updates
            DOM.btn.disabled = true;
            DOM.loading.classList.remove('hidden');
            DOM.statsContainer.classList.add('hidden');

            clearColumns();

            DOM.colPro.innerHTML = '<div class="text-slate-500 text-center italic mt-4 text-sm animate-pulse">Evaluating...</div>';
            DOM.colNeutral.innerHTML = '<div class="text-slate-500 text-center italic mt-4 text-sm animate-pulse">Evaluating...</div>';
            DOM.colCon.innerHTML = '<div class="text-slate-500 text-center italic mt-4 text-sm animate-pulse">Evaluating...</div>';

            try {
                const response = await fetch('/api/debate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ topic: topic })
                });

                if (!response.ok) throw new Error('Network response was not ok');

                const data = await response.json();

                clearColumns();

                let proCount = 0, conCount = 0, neutralCount = 0;

                data.evaluations.forEach((eval, index) => {
                    const cardHtml = createCharacterCard(eval, index);

                    if (eval.stance === 'Pro') {
                        DOM.colPro.insertAdjacentHTML('beforeend', cardHtml);
                        proCount++;
                    } else if (eval.stance === 'Con') {
                        DOM.colCon.insertAdjacentHTML('beforeend', cardHtml);
                        conCount++;
                    } else {
                        DOM.colNeutral.insertAdjacentHTML('beforeend', cardHtml);
                        neutralCount++;
                    }
                });

                // Update stats
                DOM.statPro.textContent = proCount;
                DOM.statNeutral.textContent = neutralCount;
                DOM.statCon.textContent = conCount;
                DOM.statsContainer.classList.remove('hidden');

                // Handle empty columns
                if (proCount === 0) DOM.colPro.innerHTML = '<div class="text-slate-600 text-center italic mt-4 text-sm">No supporters.</div>';
                if (neutralCount === 0) DOM.colNeutral.innerHTML = '<div class="text-slate-600 text-center italic mt-4 text-sm">No neutral parties.</div>';
                if (conCount === 0) DOM.colCon.innerHTML = '<div class="text-slate-600 text-center italic mt-4 text-sm">No opposition.</div>';

            } catch (error) {
                console.error('Error fetching debate data:', error);
                clearColumns();
                DOM.colNeutral.innerHTML = `<div class="text-red-400 text-center mt-4">Error generating debate. Please check the console and try again.</div>`;
            } finally {
                DOM.btn.disabled = false;
                DOM.loading.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
