<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Debate Arena AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #e2e8f0;
            font-family: 'Inter', sans-serif;
            background-image: radial-gradient(circle at 50% 0%, #1e293b 0%, #0f172a 100%);
            min-height: 100vh;
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06), 0 0 20px rgba(59, 130, 246, 0.15);
            border-radius: 1rem;
        }

        .glow-hover:hover {
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
            transform: translateY(-2px);
            transition: all 0.3s ease;
        }

        .stance-In.Favor { color: #4ade80; border-color: #4ade80; }
        .stance-Against { color: #f87171; border-color: #f87171; }
        .stance-Nuanced { color: #fbbf24; border-color: #fbbf24; }

        .argument-card {
            animation: fadeIn 0.5s ease-out forwards;
            opacity: 0;
            transform: translateY(10px);
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body class="p-8">

    <div class="max-w-5xl mx-auto space-y-8">
        <!-- Header -->
        <div class="text-center space-y-4">
            <h1 class="text-5xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500 drop-shadow-lg">
                Anime Debate Arena AI
            </h1>
            <p class="text-gray-400 text-lg">Propose a topic and watch the characters debate based on their core philosophies.</p>
        </div>

        <!-- Input Section -->
        <div class="glass-panel p-6 flex flex-col items-center space-y-4">
            <input type="text" id="topicInput" placeholder="Enter a debate topic (e.g., 'Should we forgive our enemies?')"
                   class="w-full md:w-2/3 p-4 rounded-lg bg-slate-800/50 border border-slate-600 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all">
            <button onclick="startDebate()" id="debateBtn"
                    class="px-8 py-3 bg-gradient-to-r from-blue-600 to-purple-600 rounded-lg font-semibold text-white glow-hover shadow-lg">
                Start Debate
            </button>
        </div>

        <!-- Terminal Logs -->
        <div class="glass-panel p-6">
            <h2 class="text-xl font-semibold mb-4 text-blue-300">Orchestrator Terminal</h2>
            <div id="terminal" class="bg-black/50 p-4 rounded-lg h-40 overflow-y-auto font-mono text-sm text-green-400 space-y-1">
                > System initialized. Waiting for topic...
            </div>
        </div>

        <!-- Debate Area -->
        <div id="debateArea" class="grid grid-cols-1 md:grid-cols-2 gap-6 hidden">
            <!-- Arguments will be injected here -->
        </div>
    </div>

    <script>
        function logToTerminal(message) {
            const terminal = document.getElementById('terminal');
            const div = document.createElement('div');
            div.textContent = `> ${message}`;
            terminal.appendChild(div);
            terminal.scrollTop = terminal.scrollHeight;
        }

        async function startDebate() {
            const topicInput = document.getElementById('topicInput');
            const debateBtn = document.getElementById('debateBtn');
            const debateArea = document.getElementById('debateArea');
            const terminal = document.getElementById('terminal');

            const topic = topicInput.value.trim();
            if (!topic) {
                alert('Please enter a debate topic.');
                return;
            }

            debateBtn.disabled = true;
            debateBtn.classList.add('opacity-50', 'cursor-not-allowed');
            debateArea.innerHTML = '';
            debateArea.classList.remove('hidden');
            terminal.innerHTML = '';

            logToTerminal(`Initializing debate on: "${topic}"...`);

            try {
                const response = await fetch('/api/debate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ topic: topic })
                });

                if (!response.ok) throw new Error('Failed to fetch debate results');

                const data = await response.json();

                // Process logs with slight delay
                for (let i = 0; i < data.logs.length; i++) {
                    setTimeout(() => {
                        logToTerminal(data.logs[i]);
                    }, i * 300);
                }

                // Render arguments after logs finish
                setTimeout(() => {
                    renderArguments(data.arguments);
                    debateBtn.disabled = false;
                    debateBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                }, data.logs.length * 300 + 500);

            } catch (error) {
                logToTerminal(`Error: ${error.message}`);
                debateBtn.disabled = false;
                debateBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            }
        }

        function renderArguments(argumentsList) {
            const debateArea = document.getElementById('debateArea');

            argumentsList.forEach((arg, index) => {
                const delay = index * 200; // stagger animation
                const stanceClass = `stance-${arg.stance.replace(' ', '')}`;

                const card = document.createElement('div');
                card.className = `glass-panel p-6 argument-card flex flex-col border-t-4 border-t-transparent`;
                card.style.animationDelay = `${delay}ms`;
                // Apply dynamic top border based on stance
                if(arg.stance === "In Favor") card.style.borderTopColor = "#4ade80";
                if(arg.stance === "Against") card.style.borderTopColor = "#f87171";
                if(arg.stance === "Nuanced") card.style.borderTopColor = "#fbbf24";


                card.innerHTML = `
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-2xl font-bold text-white">${arg.name}</h3>
                        <span class="px-3 py-1 rounded-full text-sm font-semibold border ${stanceClass}">
                            ${arg.stance}
                        </span>
                    </div>
                    <div class="text-gray-300 italic mb-4">
                        "${arg.argument}"
                    </div>
                `;
                debateArea.appendChild(card);
            });
            logToTerminal('Debate concluded.');
        }
    </script>
</body>
</html>
