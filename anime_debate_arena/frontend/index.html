<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Debate Arena AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a; /* slate-900 */
            color: #f8fafc; /* slate-50 */
            background-image: radial-gradient(circle at 10% 20%, rgba(139, 92, 246, 0.15), transparent 30%),
                              radial-gradient(circle at 90% 80%, rgba(239, 68, 68, 0.15), transparent 30%);
            background-attachment: fixed;
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.6); /* slate-800 with opacity */
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        .typing-indicator::after {
            content: '...';
            animation: typing 1s infinite;
        }
        @keyframes typing {
            0% { content: '.'; }
            33% { content: '..'; }
            66% { content: '...'; }
        }
        .fade-in {
            animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .terminal-log {
            font-family: 'Fira Code', monospace;
            color: #4ade80;
        }
    </style>
</head>
<body class="min-h-screen">

    <div class="container mx-auto px-4 py-12 max-w-5xl">
        <header class="text-center mb-16">
            <h1 class="text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-red-500 to-purple-500 mb-4 drop-shadow-sm tracking-tight">
                Anime Debate Arena
            </h1>
            <p class="text-slate-400 text-lg font-light">Propose a topic and watch two opposing minds clash.</p>
        </header>

        <!-- Input Section -->
        <div class="glass-panel rounded-2xl p-8 mb-10 transition-transform duration-300 hover:shadow-purple-500/20 hover:shadow-2xl">
            <h2 class="text-xl font-semibold mb-6 text-purple-400 flex items-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path></svg>
                Propose a Debate Topic
            </h2>
            <div class="flex flex-col md:flex-row space-y-4 md:space-y-0 md:space-x-4">
                <input type="text" id="topicInput" placeholder="e.g., Is true peace achievable without sacrifice?"
                       class="flex-1 bg-slate-800/60 border border-slate-600/50 text-white px-5 py-4 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-500 transition-all placeholder-slate-500 shadow-inner hover:bg-slate-800/80">
                <button id="debateBtn" class="bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-500 hover:to-indigo-500 text-white px-8 py-4 rounded-xl font-bold transition-all duration-300 shadow-lg shadow-purple-500/30 transform hover:-translate-y-1">
                    Host Debate
                </button>
            </div>
        </div>

        <!-- Main Arena (Hidden initially) -->
        <div id="arenaContainer" class="hidden space-y-10">

            <!-- Agent Terminal -->
            <div class="bg-slate-950/80 rounded-xl p-5 border border-green-500/20 shadow-inner h-56 overflow-y-auto backdrop-blur-sm relative">
                <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-green-500/50 to-transparent"></div>
                <h3 class="text-xs text-green-500/70 mb-3 uppercase tracking-widest flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                    Agent Terminal Logs
                </h3>
                <div id="terminalOutput" class="terminal-log text-sm space-y-2 leading-relaxed"></div>
            </div>

            <!-- VS Screen -->
            <div id="vsScreen" class="hidden">
                <div class="flex items-center justify-between glass-panel rounded-2xl p-10 border-t-4 border-t-purple-500/50 relative overflow-hidden">
                    <div class="absolute -top-10 -left-10 w-40 h-40 bg-blue-500 rounded-full opacity-10 blur-3xl"></div>
                    <div class="absolute -bottom-10 -right-10 w-40 h-40 bg-red-500 rounded-full opacity-10 blur-3xl"></div>

                    <!-- Character 1 -->
                    <div class="w-2/5 text-center fade-in" style="animation-delay: 0.1s;">
                        <div class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-br from-blue-400 to-cyan-400 mb-2" id="char1Name"></div>
                        <div class="text-sm text-slate-400 font-medium tracking-wide" id="char1Core"></div>
                    </div>

                    <!-- VS Logo -->
                    <div class="w-1/5 text-center fade-in" style="animation-delay: 0.3s;">
                        <div class="text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-red-500 to-orange-500 italic transform -skew-x-12 drop-shadow-[0_0_15px_rgba(239,68,68,0.5)]">VS</div>
                    </div>

                    <!-- Character 2 -->
                    <div class="w-2/5 text-center fade-in" style="animation-delay: 0.2s;">
                        <div class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-br from-red-400 to-rose-400 mb-2" id="char2Name"></div>
                        <div class="text-sm text-slate-400 font-medium tracking-wide" id="char2Core"></div>
                    </div>
                </div>
            </div>

            <!-- Debate Transcript -->
            <div id="transcriptContainer" class="hidden glass-panel rounded-2xl p-8">
                <h3 class="text-2xl font-bold mb-8 border-b border-slate-700/50 pb-4 text-white flex items-center gap-3">
                    <svg class="w-6 h-6 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z"></path></svg>
                    Debate Transcript
                </h3>
                <div id="transcript" class="space-y-6"></div>
            </div>

        </div>
    </div>

    <script>
        const debateBtn = document.getElementById('debateBtn');
        const topicInput = document.getElementById('topicInput');
        const arenaContainer = document.getElementById('arenaContainer');
        const terminalOutput = document.getElementById('terminalOutput');
        const vsScreen = document.getElementById('vsScreen');
        const transcriptContainer = document.getElementById('transcriptContainer');
        const transcript = document.getElementById('transcript');

        debateBtn.addEventListener('click', async () => {
            const topic = topicInput.value.trim();
            if (!topic) return;

            // Reset UI
            arenaContainer.classList.remove('hidden');
            vsScreen.classList.add('hidden');
            transcriptContainer.classList.add('hidden');
            terminalOutput.innerHTML = '';
            transcript.innerHTML = '';
            debateBtn.disabled = true;
            debateBtn.innerHTML = '<span class="typing-indicator">Processing</span>';

            try {
                const response = await fetch('/api/debate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ topic })
                });

                const data = await response.json();

                // 1. Simulate Terminal Logs
                for (let i = 0; i < data.logs.length; i++) {
                    await new Promise(r => setTimeout(r, 600)); // Delay between logs
                    const logEl = document.createElement('div');
                    logEl.textContent = `> ${data.logs[i]}`;
                    terminalOutput.appendChild(logEl);
                    terminalOutput.scrollTop = terminalOutput.scrollHeight;
                }

                // 2. Show VS Screen
                await new Promise(r => setTimeout(r, 1000));
                document.getElementById('char1Name').textContent = data.debater1.name;
                document.getElementById('char1Core').textContent = data.debater1.core_emotion;
                document.getElementById('char2Name').textContent = data.debater2.name;
                document.getElementById('char2Core').textContent = data.debater2.core_emotion;
                vsScreen.classList.remove('hidden');

                // 3. Show Transcript gradually
                await new Promise(r => setTimeout(r, 1500));
                transcriptContainer.classList.remove('hidden');

                for (let i = 0; i < data.transcript.length; i++) {
                    await new Promise(r => setTimeout(r, 1500)); // Delay between messages

                    const msg = data.transcript[i];
                    const msgEl = document.createElement('div');
                    msgEl.className = 'fade-in p-4 rounded-lg bg-gray-700/50 border-l-4 ' +
                                      (msg.speaker === data.debater1.name ? 'border-blue-500' : 'border-red-500 ml-8');

                    msgEl.innerHTML = `
                        <div class="font-bold mb-1 ${msg.speaker === data.debater1.name ? 'text-blue-400' : 'text-red-400'}">
                            ${msg.speaker}
                        </div>
                        <div class="text-gray-300">${msg.message}</div>
                    `;
                    transcript.appendChild(msgEl);
                }

            } catch (error) {
                console.error("Error hosting debate:", error);
                terminalOutput.innerHTML += `<div class="text-red-500">> Error: Connection failed.</div>`;
            } finally {
                debateBtn.disabled = false;
                debateBtn.textContent = 'Host Another Debate';
            }
        });

        // Allow pressing Enter to submit
        topicInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') debateBtn.click();
        });
    </script>
</body>
</html>
