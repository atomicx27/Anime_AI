<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Debate Arena AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['Fira Code', 'monospace'],
                    }
                }
            }
        }
    </script>
    <style>
        .typing-indicator::after {
            content: '...';
            animation: typing 1s infinite;
        }
        @keyframes typing {
            0% { content: '.'; }
            33% { content: '..'; }
            66% { content: '...'; }
        }
        .fade-in {
            animation: fadeIn 0.5s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .terminal-log {
            font-family: monospace;
            color: #10b981;
        }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen font-sans relative overflow-x-hidden">
    <!-- Radial Background Gradient -->
    <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-purple-900/20 via-gray-900 to-gray-900 -z-10"></div>
    <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_bottom_left,_var(--tw-gradient-stops))] from-red-900/10 via-transparent to-transparent -z-10"></div>

    <div class="container mx-auto px-4 py-8 max-w-5xl relative z-10">
        <header class="text-center mb-12">
            <h1 class="text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-red-400 via-purple-500 to-indigo-500 mb-4 drop-shadow-[0_0_15px_rgba(168,85,247,0.4)]">
                Anime Debate Arena
            </h1>
            <p class="text-gray-400 text-lg">Propose a topic and watch two opposing minds clash.</p>
        </header>

        <!-- Input Section -->
        <div class="bg-white/5 backdrop-blur-md rounded-xl p-6 shadow-[0_8px_32px_rgba(0,0,0,0.3)] mb-8 border border-white/10 relative overflow-hidden">
            <div class="absolute inset-0 bg-gradient-to-br from-purple-500/5 to-transparent pointer-events-none"></div>
            <h2 class="text-xl font-bold mb-4 text-purple-300 relative z-10 flex items-center"><span class="bg-purple-500/20 p-2 rounded-lg mr-3 shadow-[0_0_10px_rgba(168,85,247,0.3)]">⚔️</span> Propose a Debate Topic</h2>
            <div class="flex flex-col sm:flex-row space-y-4 sm:space-y-0 sm:space-x-4 relative z-10">
                <input type="text" id="topicInput" placeholder="e.g., Is true peace achievable without sacrifice?"
                       class="flex-1 bg-black/40 border border-white/10 text-white px-5 py-4 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-500/80 focus:border-purple-500/50 transition-all placeholder-gray-500 shadow-inner">
                <button id="debateBtn" class="bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-500 hover:to-indigo-500 text-white px-8 py-4 rounded-xl font-bold transition-all duration-300 shadow-[0_0_15px_rgba(168,85,247,0.4)] hover:shadow-[0_0_25px_rgba(168,85,247,0.6)] transform hover:-translate-y-0.5">
                    Host Debate
                </button>
            </div>
        </div>

        <!-- Main Arena (Hidden initially) -->
        <div id="arenaContainer" class="hidden space-y-8">

            <!-- Agent Terminal -->
            <div class="bg-black/80 backdrop-blur-md rounded-xl p-5 border border-green-900/50 shadow-[inset_0_0_20px_rgba(0,0,0,0.8),0_0_15px_rgba(16,185,129,0.1)] h-48 overflow-y-auto custom-scrollbar">
                <div class="flex items-center mb-3 pb-2 border-b border-green-900/30">
                    <div class="w-2.5 h-2.5 rounded-full bg-red-500 mr-2"></div>
                    <div class="w-2.5 h-2.5 rounded-full bg-yellow-500 mr-2"></div>
                    <div class="w-2.5 h-2.5 rounded-full bg-green-500 mr-3"></div>
                    <h3 class="text-xs text-green-500/80 uppercase tracking-wider font-mono">Terminal Logs</h3>
                </div>
                <div id="terminalOutput" class="terminal-log text-sm space-y-1.5 opacity-90 font-mono"></div>
            </div>

            <!-- VS Screen -->
            <div id="vsScreen" class="hidden">
                <div class="flex items-center justify-between bg-white/5 backdrop-blur-lg rounded-2xl p-8 lg:p-12 border border-white/10 shadow-[0_8px_32px_rgba(0,0,0,0.4)] relative overflow-hidden">
                    <div class="absolute inset-0 bg-gradient-to-r from-blue-500/5 via-transparent to-red-500/5 pointer-events-none"></div>

                    <!-- Character 1 -->
                    <div class="w-2/5 text-center fade-in relative z-10">
                        <div class="inline-block p-4 rounded-2xl bg-blue-500/10 border border-blue-500/20 shadow-[0_0_30px_rgba(59,130,246,0.15)] backdrop-blur-sm mb-4">
                            <div class="text-3xl lg:text-4xl font-black text-transparent bg-clip-text bg-gradient-to-br from-blue-300 to-blue-500 drop-shadow-[0_0_10px_rgba(59,130,246,0.5)]" id="char1Name"></div>
                        </div>
                        <div class="text-sm font-medium text-blue-200/80 bg-blue-900/40 px-3 py-1.5 rounded-full inline-block border border-blue-500/30" id="char1Core"></div>
                    </div>

                    <!-- VS Logo -->
                    <div class="w-1/5 text-center relative z-10 flex flex-col items-center justify-center">
                        <div class="text-6xl lg:text-7xl font-black text-transparent bg-clip-text bg-gradient-to-br from-red-500 to-orange-500 italic transform -skew-x-12 drop-shadow-[0_0_20px_rgba(239,68,68,0.6)] animate-pulse">VS</div>
                    </div>

                    <!-- Character 2 -->
                    <div class="w-2/5 text-center fade-in relative z-10">
                        <div class="inline-block p-4 rounded-2xl bg-red-500/10 border border-red-500/20 shadow-[0_0_30px_rgba(239,68,68,0.15)] backdrop-blur-sm mb-4">
                            <div class="text-3xl lg:text-4xl font-black text-transparent bg-clip-text bg-gradient-to-br from-red-300 to-red-500 drop-shadow-[0_0_10px_rgba(239,68,68,0.5)]" id="char2Name"></div>
                        </div>
                        <div class="text-sm font-medium text-red-200/80 bg-red-900/40 px-3 py-1.5 rounded-full inline-block border border-red-500/30" id="char2Core"></div>
                    </div>
                </div>
            </div>

            <!-- Debate Transcript -->
            <div id="transcriptContainer" class="hidden bg-white/5 backdrop-blur-md rounded-2xl p-6 lg:p-8 border border-white/10 shadow-[0_8px_32px_rgba(0,0,0,0.3)]">
                <div class="flex items-center mb-6 border-b border-white/10 pb-4">
                    <div class="w-3 h-3 rounded-full bg-purple-500 mr-3 shadow-[0_0_10px_rgba(168,85,247,0.8)]"></div>
                    <h3 class="text-2xl font-bold text-gray-100">Debate Transcript</h3>
                </div>
                <div id="transcript" class="space-y-6"></div>
            </div>

        </div>
    </div>

    <script>
        const debateBtn = document.getElementById('debateBtn');
        const topicInput = document.getElementById('topicInput');
        const arenaContainer = document.getElementById('arenaContainer');
        const terminalOutput = document.getElementById('terminalOutput');
        const vsScreen = document.getElementById('vsScreen');
        const transcriptContainer = document.getElementById('transcriptContainer');
        const transcript = document.getElementById('transcript');

        debateBtn.addEventListener('click', async () => {
            const topic = topicInput.value.trim();
            if (!topic) return;

            // Reset UI
            arenaContainer.classList.remove('hidden');
            vsScreen.classList.add('hidden');
            transcriptContainer.classList.add('hidden');
            terminalOutput.innerHTML = '';
            transcript.innerHTML = '';
            debateBtn.disabled = true;
            debateBtn.innerHTML = '<span class="typing-indicator">Processing</span>';

            try {
                const response = await fetch('/api/debate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ topic })
                });

                const data = await response.json();

                // 1. Simulate Terminal Logs
                for (let i = 0; i < data.logs.length; i++) {
                    await new Promise(r => setTimeout(r, 600)); // Delay between logs
                    const logEl = document.createElement('div');
                    logEl.textContent = `> ${data.logs[i]}`;
                    terminalOutput.appendChild(logEl);
                    terminalOutput.scrollTop = terminalOutput.scrollHeight;
                }

                // 2. Show VS Screen
                await new Promise(r => setTimeout(r, 1000));
                document.getElementById('char1Name').textContent = data.debater1.name;
                document.getElementById('char1Core').textContent = data.debater1.core_emotion;
                document.getElementById('char2Name').textContent = data.debater2.name;
                document.getElementById('char2Core').textContent = data.debater2.core_emotion;
                vsScreen.classList.remove('hidden');

                // 3. Show Transcript gradually
                await new Promise(r => setTimeout(r, 1500));
                transcriptContainer.classList.remove('hidden');

                for (let i = 0; i < data.transcript.length; i++) {
                    await new Promise(r => setTimeout(r, 1500)); // Delay between messages

                    const msg = data.transcript[i];
                    const msgEl = document.createElement('div');
                    const isDebater1 = msg.speaker === data.debater1.name;
                    msgEl.className = `fade-in p-5 rounded-2xl bg-white/5 backdrop-blur-sm border shadow-sm transition-all hover:shadow-md ${isDebater1 ? 'border-blue-500/30 hover:border-blue-500/50 ml-0 mr-8 lg:mr-24' : 'border-red-500/30 hover:border-red-500/50 ml-8 lg:ml-24 mr-0'}`;

                    msgEl.innerHTML = `
                        <div class="flex items-center mb-2">
                            <div class="w-2 h-2 rounded-full ${isDebater1 ? 'bg-blue-400 shadow-[0_0_8px_rgba(96,165,250,0.8)]' : 'bg-red-400 shadow-[0_0_8px_rgba(248,113,113,0.8)]'} mr-2"></div>
                            <div class="font-bold text-sm tracking-wide ${isDebater1 ? 'text-blue-300' : 'text-red-300'}">
                                ${msg.speaker}
                            </div>
                        </div>
                        <div class="text-gray-200 leading-relaxed text-[15px] pl-4 border-l-2 ${isDebater1 ? 'border-blue-500/20' : 'border-red-500/20'}">${msg.message}</div>
                    `;
                    transcript.appendChild(msgEl);
                }

            } catch (error) {
                console.error("Error hosting debate:", error);
                terminalOutput.innerHTML += `<div class="text-red-500">> Error: Connection failed.</div>`;
            } finally {
                debateBtn.disabled = false;
                debateBtn.textContent = 'Host Another Debate';
            }
        });

        // Allow pressing Enter to submit
        topicInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') debateBtn.click();
        });
    </script>
</body>
</html>
