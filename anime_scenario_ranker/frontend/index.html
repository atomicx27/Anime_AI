<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Scenario Ranker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        tier: {
                            s: '#ff7f7f',
                            a: '#ffbf7f',
                            b: '#ffff7f',
                            c: '#7fff7f',
                            d: '#7fbfff'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: rgba(75, 85, 99, 0.4); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background-color: rgba(75, 85, 99, 0.6); }

        .typing-effect {
            overflow: hidden;
            border-right: .15em solid orange;
            white-space: nowrap;
            margin: 0 auto;
            letter-spacing: .15em;
            animation: typing 3.5s steps(40, end), blink-caret .75s step-end infinite;
        }

        @keyframes typing { from { width: 0 } to { width: 100% } }
        @keyframes blink-caret { from, to { border-color: transparent } 50% { border-color: orange; } }



        .tier-card {
            transition: all 0.3s ease;
        }

        .animate-pop-in {
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            opacity: 0;
            transform: scale(0.8);
        }
        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }

        .tier-card:hover {
            transform: scale(1.05) translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3), 0 4px 6px -2px rgba(0, 0, 0, 0.1);
            border-color: rgba(167, 139, 250, 0.5); /* Purple-400 */
        }

        .terminal-log-enter {
            animation: slideInRight 0.3s ease-out forwards;
            opacity: 0;
            transform: translateX(20px);
        }

        @keyframes slideInRight {
            to { opacity: 1; transform: translateX(0); }
        }

        .card-enter {
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            opacity: 0;
            transform: scale(0.8) translateY(20px);
        }

        @keyframes popIn {
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .tooltip .tooltip-text {
            visibility: hidden;
            width: 250px;
            background-color: #1f2937;
            color: #fff;
            text-align: center;
            border-radius: 6px;
            padding: 8px;
            position: absolute;
            z-index: 50;
            bottom: 125%;
            left: 50%;
            margin-left: -125px;
            opacity: 0;
            transition: opacity 0.3s;
            border: 1px solid #374151;
            font-size: 0.875rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
        }

        .tooltip:hover .tooltip-text {
            visibility: visible;
            opacity: 1;
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 h-screen flex flex-col font-sans overflow-hidden">

    <!-- Header -->
    <header class="bg-gray-800 border-b border-gray-700 p-4 shadow-lg z-10 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-gradient-to-br from-purple-500 to-indigo-600 rounded-lg flex items-center justify-center shadow-lg shadow-purple-500/20">
                <i class="fa-solid fa-ranking-star text-white"></i>
            </div>
            <h1 class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-purple-400 to-indigo-400">Anime Scenario Ranker AI</h1>
        </div>
    </header>

    <div class="flex-1 flex overflow-hidden">

        <!-- Sidebar: Agent Terminal -->
        <div class="w-1/3 bg-gray-950 border-r border-gray-800 flex flex-col shadow-2xl z-20">
            <div class="p-4 border-b border-gray-800 bg-gray-900/50">
                <h2 class="font-semibold text-purple-400 flex items-center gap-2">
                    <i class="fa-solid fa-terminal"></i> Agent Thoughts
                </h2>
            </div>
            <div id="terminal-content" class="flex-1 p-4 overflow-y-auto custom-scrollbar text-sm font-mono text-green-400 space-y-2">
                <div>System initialized. Waiting for scenario input...</div>
            </div>
            <div class="p-4 bg-gray-900 border-t border-gray-800">
                <form id="scenario-form" class="flex flex-col gap-3">
                    <label class="text-xs text-gray-400 font-semibold uppercase tracking-wider">Enter Scenario for Evaluation</label>
                    <textarea id="scenario-input" rows="3" class="w-full bg-gray-800 border border-gray-700 rounded-lg p-3 text-sm focus:ring-2 focus:ring-purple-500 focus:border-purple-500 outline-none resize-none transition-all placeholder-gray-500" placeholder="e.g. A high-stakes diplomatic negotiation to prevent a galactic war..."></textarea>
                    <button type="submit" id="submit-btn" class="bg-purple-600 hover:bg-purple-500 text-white font-medium py-2 px-4 rounded-lg transition-colors flex items-center justify-center gap-2">
                        <i class="fa-solid fa-bolt"></i> Evaluate & Rank
                    </button>
                </form>
            </div>
        </div>

        <!-- Main Content: Tier List -->
        <div class="flex-1 bg-gray-900 p-8 overflow-y-auto custom-scrollbar flex flex-col gap-4 relative" id="tier-list-container">
            <!-- Background Decoration -->
            <div class="absolute inset-0 flex items-center justify-center pointer-events-none opacity-5">
                <i class="fa-solid fa-ranking-star text-[20rem]"></i>
            </div>

            <!-- Tier Rows will be generated here -->
            <div id="tier-S" class="flex border border-gray-700 rounded-lg overflow-hidden bg-gray-800/50 shadow-lg min-h-[100px]">
                <div class="w-24 bg-tier-s flex items-center justify-center border-r border-gray-700 shrink-0">
                    <span class="text-3xl font-black text-gray-900 drop-shadow-sm">S</span>
                </div>
                <div class="flex-1 p-3 flex flex-wrap gap-3 items-center" id="row-S"></div>
            </div>

            <div id="tier-A" class="flex border border-gray-700 rounded-lg overflow-hidden bg-gray-800/50 shadow-lg min-h-[100px]">
                <div class="w-24 bg-tier-a flex items-center justify-center border-r border-gray-700 shrink-0">
                    <span class="text-3xl font-black text-gray-900 drop-shadow-sm">A</span>
                </div>
                <div class="flex-1 p-3 flex flex-wrap gap-3 items-center" id="row-A"></div>
            </div>

            <div id="tier-B" class="flex border border-gray-700 rounded-lg overflow-hidden bg-gray-800/50 shadow-lg min-h-[100px]">
                <div class="w-24 bg-tier-b flex items-center justify-center border-r border-gray-700 shrink-0">
                    <span class="text-3xl font-black text-gray-900 drop-shadow-sm">B</span>
                </div>
                <div class="flex-1 p-3 flex flex-wrap gap-3 items-center" id="row-B"></div>
            </div>

            <div id="tier-C" class="flex border border-gray-700 rounded-lg overflow-hidden bg-gray-800/50 shadow-lg min-h-[100px]">
                <div class="w-24 bg-tier-c flex items-center justify-center border-r border-gray-700 shrink-0">
                    <span class="text-3xl font-black text-gray-900 drop-shadow-sm">C</span>
                </div>
                <div class="flex-1 p-3 flex flex-wrap gap-3 items-center" id="row-C"></div>
            </div>

            <div id="tier-D" class="flex border border-gray-700 rounded-lg overflow-hidden bg-gray-800/50 shadow-lg min-h-[100px]">
                <div class="w-24 bg-tier-d flex items-center justify-center border-r border-gray-700 shrink-0">
                    <span class="text-3xl font-black text-gray-900 drop-shadow-sm">D</span>
                </div>
                <div class="flex-1 p-3 flex flex-wrap gap-3 items-center" id="row-D"></div>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('scenario-form');
        const input = document.getElementById('scenario-input');
        const btn = document.getElementById('submit-btn');
        const terminal = document.getElementById('terminal-content');

        const tierRows = {
            'S': document.getElementById('row-S'),
            'A': document.getElementById('row-A'),
            'B': document.getElementById('row-B'),
            'C': document.getElementById('row-C'),
            'D': document.getElementById('row-D')
        };

        function addLog(message, isThinking = false) {
            const div = document.createElement('div');
            div.className = 'terminal-log-enter';
            if(isThinking) {
                 div.innerHTML = `<span class="text-purple-400">❯</span> <span class="animate-pulse">${message}</span>`;
            } else {
                 div.innerHTML = `<span class="text-purple-400">❯</span> ${message}`;
            }

            terminal.appendChild(div);

            // Trigger reflow
            void div.offsetWidth;
            div.classList.remove('opacity-0');

            terminal.scrollTop = terminal.scrollHeight;
            return div;
        }

        function clearTiers() {
            Object.values(tierRows).forEach(row => {
                row.innerHTML = '';
            });
        }

        function getInitials(name) {
            return name.split(' ').map(n => n[0]).join('').substring(0, 2);
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const scenario = input.value.trim();
            if (!scenario) return;

            // Reset UI
            input.disabled = true;
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Evaluating...';
            terminal.innerHTML = '';
            clearTiers();

            addLog(`Received scenario: "${scenario}"`);
            addLog("Initializing agent reasoning protocol...", true);

            try {
                const response = await fetch('/api/rank', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ scenario })
                });

                if (!response.ok) throw new Error('Network response was not ok');

                const data = await response.json();

                // Simulate agent streaming logs
                let logIndex = 0;

                function processNext() {
                    if (logIndex < data.logs.length) {
                        const logMsg = data.logs[logIndex];
                        addLog(logMsg);

                        // If log indicates a decision, add character to tier
                        const match = logMsg.match(/Evaluating (.*)\.\.\./);
                        if (match) {
                           // Find the character in rankings
                           const charName = match[1];
                           const ranking = data.rankings.find(r => r.name === charName);

                           if(ranking) {
                               setTimeout(() => {
                                    const charHtml = `
                                        <div class="tooltip relative cursor-help card-enter tier-card animate-pop-in" style="animation-delay: 0.1s">
                                            <div class="bg-gray-700 border border-gray-600 rounded px-3 py-2 flex items-center gap-2 hover:bg-gray-600 transition-colors shadow-sm">
                                                <div class="w-6 h-6 rounded-full bg-gray-800 flex items-center justify-center text-xs font-bold text-gray-300">
                                                    ${getInitials(ranking.name)}
                                                </div>
                                                <span class="text-sm font-medium text-gray-200">${ranking.name}</span>
                                            </div>
                                            <span class="tooltip-text">${ranking.reasoning}</span>
                                        </div>
                                    `;
                                    // Append to correct tier row
                                    tierRows[ranking.rank].insertAdjacentHTML('beforeend', charHtml);
                               }, 200); // Slight delay for visual effect
                           }
                        }

                        logIndex++;
                        // Speed up logging artificially
                        setTimeout(processNext, 100);
                    } else {
                        addLog("Evaluation complete.", false);
                        input.disabled = false;
                        btn.disabled = false;
                        btn.innerHTML = '<i class="fa-solid fa-bolt"></i> Evaluate & Rank';
                    }
                }

                processNext();

            } catch (error) {
                addLog(`<span class="text-red-500">Error: ${error.message}</span>`);
                input.disabled = false;
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-bolt"></i> Evaluate & Rank';
            }
        });
    </script>
</body>
</html>
