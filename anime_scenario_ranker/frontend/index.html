<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Scenario Ranker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        tier: {
                            s: '#ff7f7f',
                            a: '#ffbf7f',
                            b: '#ffff7f',
                            c: '#7fff7f',
                            d: '#7fbfff'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-image: radial-gradient(circle at top right, rgba(139, 92, 246, 0.1) 0%, transparent 40%),
                              radial-gradient(circle at bottom left, rgba(59, 130, 246, 0.1) 0%, transparent 40%);
            background-color: #111827;
        }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: rgba(75, 85, 99, 0.4); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background-color: rgba(75, 85, 99, 0.6); }

        .typing-effect {
            overflow: hidden;
            border-right: .15em solid orange;
            white-space: nowrap;
            margin: 0 auto;
            letter-spacing: .15em;
            animation: typing 3.5s steps(40, end), blink-caret .75s step-end infinite;
        }

        @keyframes typing { from { width: 0 } to { width: 100% } }
        @keyframes blink-caret { from, to { border-color: transparent } 50% { border-color: orange; } }

        .tier-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .animate-pop-in {
            animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            opacity: 0;
            transform: scale(0.8);
        }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.8) translateY(10px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .tier-card:hover {
            transform: scale(1.05) translateY(-2px);
            box-shadow: 0 0 15px rgba(167, 139, 250, 0.6), 0 4px 6px -2px rgba(0, 0, 0, 0.1);
            border-color: rgba(167, 139, 250, 0.8);
            z-index: 10;
        }

        .tier-row {
            transition: background-color 0.3s ease, box-shadow 0.3s ease;
        }

        .tier-row.active-tier {
            background-color: rgba(31, 41, 55, 0.8);
            box-shadow: 0 0 15px rgba(167, 139, 250, 0.2) inset;
        }

        .terminal-log-enter {
            animation: slideInRight 0.3s ease-out forwards;
            opacity: 0;
            transform: translateX(20px);
        }

        @keyframes slideInRight {
            to { opacity: 1; transform: translateX(0); }
        }

        .card-enter {
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            opacity: 0;
            transform: scale(0.8) translateY(20px);
        }

        .tooltip .tooltip-text {
            visibility: hidden;
            width: 280px;
            background: rgba(31, 41, 55, 0.95);
            backdrop-filter: blur(8px);
            color: #fff;
            text-align: center;
            border-radius: 8px;
            padding: 10px;
            position: absolute;
            z-index: 50;
            bottom: 135%;
            left: 50%;
            transform: translateX(-50%) translateY(10px);
            opacity: 0;
            transform: translateY(10px) scale(0.95);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid #4b5563;
            font-size: 0.875rem;
            box-shadow: 0 15px 25px -5px rgba(0, 0, 0, 0.6), 0 0 10px rgba(167, 139, 250, 0.2);
            pointer-events: none;
        }

        .tooltip:hover .tooltip-text {
            visibility: visible;
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        /* Tier gradients */
        .tier-s-bg { background: linear-gradient(135deg, #ff7f7f, #ff4b4b); }
        .tier-a-bg { background: linear-gradient(135deg, #ffbf7f, #ff9b4b); }
        .tier-b-bg { background: linear-gradient(135deg, #ffff7f, #dfdf4b); }
        .tier-c-bg { background: linear-gradient(135deg, #7fff7f, #4bff4b); }
        .tier-d-bg { background: linear-gradient(135deg, #7fbfff, #4b9bff); }
    </style>
</head>
<body class="text-gray-100 h-screen flex flex-col font-sans overflow-hidden">

    <!-- Header -->
    <header class="bg-gray-800/80 backdrop-blur-md border-b border-gray-700 p-4 shadow-lg z-10 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-gradient-to-br from-purple-500 to-indigo-600 rounded-lg flex items-center justify-center shadow-lg shadow-purple-500/40 relative overflow-hidden group">
                <div class="absolute inset-0 bg-white/20 translate-y-full group-hover:translate-y-0 transition-transform duration-300"></div>
                <i class="fa-solid fa-ranking-star text-white relative z-10 group-hover:scale-110 transition-transform"></i>
            </div>
            <h1 class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-purple-400 to-indigo-400 tracking-wide">Anime Scenario Ranker AI</h1>
        </div>
    </header>

    <div class="flex-1 flex overflow-hidden relative">
        <!-- Background Decoration -->
        <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-purple-900/10 via-transparent to-transparent pointer-events-none"></div>

        <!-- Sidebar: Agent Terminal -->
        <div class="w-1/3 bg-gray-950/80 backdrop-blur-xl border-r border-gray-800/50 flex flex-col shadow-[10px_0_30px_rgba(0,0,0,0.5)] z-20">
            <div class="p-4 border-b border-gray-800/50 bg-gray-900/50 backdrop-blur-md">
                <h2 class="font-semibold text-purple-400 flex items-center gap-2">
                    <i class="fa-solid fa-terminal"></i> Agent Thoughts
                </h2>
            </div>
            <div id="terminal-content" class="flex-1 p-4 overflow-y-auto custom-scrollbar text-sm font-mono text-green-400 space-y-2 drop-shadow-[0_0_2px_rgba(74,222,128,0.3)]">
                <div>System initialized. Waiting for scenario input...</div>
            </div>
            <div class="p-4 bg-gray-900/80 backdrop-blur-md border-t border-gray-800/50 shadow-inner">
                <form id="scenario-form" class="flex flex-col gap-3">
                    <label class="text-xs text-gray-400 font-semibold uppercase tracking-wider flex items-center gap-2"><i class="fa-solid fa-pen-nib text-purple-400"></i> Enter Scenario for Evaluation</label>
                    <textarea id="scenario-input" rows="3" class="w-full bg-gray-950/50 border border-gray-700 rounded-lg p-3 text-sm focus:ring-2 focus:ring-purple-500/50 focus:border-purple-500 outline-none resize-none transition-all placeholder-gray-600 shadow-inner" placeholder="e.g. A high-stakes diplomatic negotiation to prevent a galactic war..."></textarea>
                    <button type="submit" id="submit-btn" class="bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-500 hover:to-indigo-500 text-white font-medium py-2.5 px-4 rounded-lg transition-all flex items-center justify-center gap-2 shadow-lg shadow-purple-900/20 active:scale-[0.98]">
                        <i class="fa-solid fa-bolt"></i> Evaluate & Rank
                    </button>
                </form>
            </div>
        </div>

        <!-- Main Content: Tier List -->
        <div class="flex-1 bg-gray-900 p-8 overflow-y-auto custom-scrollbar flex flex-col gap-4 relative" id="tier-list-container">
            <!-- Background Grid -->
            <div class="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNDAiIGhlaWdodD0iNDAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+CjxwYXRoIGQ9Ik00MCAwSDBWNDBIMHoiIGZpbGw9Im5vbmUiLz4KPHBhdGggZD0iTTQwIDBoLTF2NDBoMVYwek0wIDQwaDQwdi0xSDB2MXoiIGZpbGw9InJnYmEoMjU1LDI1NSwyNTUsMC4wNSkiLz4KPC9zdmc+')] pointer-events-none opacity-50"></div>

            <!-- Background Decoration -->
            <div class="absolute inset-0 flex items-center justify-center pointer-events-none opacity-[0.03]">
                <i class="fa-solid fa-ranking-star text-[25rem] text-purple-300"></i>
            </div>

            <!-- Tier Rows will be generated here -->
            <div id="tier-S" class="flex border border-gray-700 rounded-lg overflow-hidden bg-gray-800/50 shadow-[0_0_15px_rgba(255,127,127,0.5)] min-h-[100px]">
                <div class="w-24 bg-tier-s flex items-center justify-center border-r border-gray-700 shrink-0">
                    <span class="text-3xl font-black text-gray-900 drop-shadow-sm">S</span>
                </div>
                <div class="flex-1 p-4 flex flex-wrap gap-4 items-center" id="row-S"></div>
            </div>

            <div id="tier-A" class="tier-row flex border border-gray-700 rounded-lg overflow-hidden bg-gray-800/50 shadow-lg min-h-[100px] z-10 relative">
                <div class="w-24 bg-tier-a flex items-center justify-center border-r border-gray-700 shrink-0">
                    <span class="text-3xl font-black text-gray-900 drop-shadow-sm">A</span>
                </div>
                <div class="flex-1 p-4 flex flex-wrap gap-4 items-center" id="row-A"></div>
            </div>

            <div id="tier-B" class="tier-row flex border border-gray-700 rounded-lg overflow-hidden bg-gray-800/50 shadow-lg min-h-[100px] z-10 relative">
                <div class="w-24 bg-tier-b flex items-center justify-center border-r border-gray-700 shrink-0">
                    <span class="text-3xl font-black text-gray-900 drop-shadow-sm">B</span>
                </div>
                <div class="flex-1 p-4 flex flex-wrap gap-4 items-center" id="row-B"></div>
            </div>

            <div id="tier-C" class="tier-row flex border border-gray-700 rounded-lg overflow-hidden bg-gray-800/50 shadow-lg min-h-[100px] z-10 relative">
                <div class="w-24 bg-tier-c flex items-center justify-center border-r border-gray-700 shrink-0">
                    <span class="text-3xl font-black text-gray-900 drop-shadow-sm">C</span>
                </div>
                <div class="flex-1 p-4 flex flex-wrap gap-4 items-center" id="row-C"></div>
            </div>

            <div id="tier-D" class="tier-row flex border border-gray-700 rounded-lg overflow-hidden bg-gray-800/50 shadow-lg min-h-[100px] z-10 relative">
                <div class="w-24 bg-tier-d flex items-center justify-center border-r border-gray-700 shrink-0">
                    <span class="text-3xl font-black text-gray-900 drop-shadow-sm">D</span>
                </div>
                <div class="flex-1 p-4 flex flex-wrap gap-4 items-center" id="row-D"></div>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('scenario-form');
        const input = document.getElementById('scenario-input');
        const btn = document.getElementById('submit-btn');
        const terminal = document.getElementById('terminal-content');

        const tierRows = {
            'S': document.getElementById('row-S'),
            'A': document.getElementById('row-A'),
            'B': document.getElementById('row-B'),
            'C': document.getElementById('row-C'),
            'D': document.getElementById('row-D')
        };

        function addLog(message, isThinking = false) {
            const div = document.createElement('div');
            div.className = 'terminal-log-enter';
            if(isThinking) {
                 div.innerHTML = `<span class="text-purple-400">❯</span> <span class="animate-pulse">${message}</span>`;
            } else {
                 div.innerHTML = `<span class="text-purple-400">❯</span> ${message}`;
            }

            terminal.appendChild(div);

            // Trigger reflow
            void div.offsetWidth;
            div.classList.remove('opacity-0');

            terminal.scrollTop = terminal.scrollHeight;
            return div;
        }

        function clearTiers() {
            Object.values(tierRows).forEach(row => {
                row.innerHTML = '';
            });
        }

        function getInitials(name) {
            return name.split(' ').map(n => n[0]).join('').substring(0, 2);
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const scenario = input.value.trim();
            if (!scenario) return;

            // Reset UI
            input.disabled = true;
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Evaluating...';
            terminal.innerHTML = '';
            clearTiers();

            addLog(`Received scenario: "${scenario}"`);
            addLog("Initializing agent reasoning protocol...", true);

            try {
                const response = await fetch('/api/rank', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ scenario })
                });

                if (!response.ok) throw new Error('Network response was not ok');

                const data = await response.json();

                // Simulate agent streaming logs
                let logIndex = 0;

                function processNext() {
                    if (logIndex < data.logs.length) {
                        const logMsg = data.logs[logIndex];
                        addLog(logMsg);

                        // If log indicates a decision, add character to tier
                        const match = logMsg.match(/Evaluating (.*)\.\.\./);
                        if (match) {
                           // Find the character in rankings
                           const charName = match[1];
                           const ranking = data.rankings.find(r => r.name === charName);

                           if(ranking) {
                               setTimeout(() => {
                                    const rowChildCount = tierRows[ranking.rank].children.length;
                                    const delay = (rowChildCount * 0.1).toFixed(1);
                                    const charHtml = `
                                        <div class="tooltip relative cursor-help card-enter tier-card animate-pop-in" style="animation-delay: ${delay}s">
                                            <div class="bg-gray-700 border border-gray-600 rounded px-3 py-2 flex items-center gap-2 hover:bg-gray-600 transition-colors shadow-sm">
                                                <div class="w-6 h-6 rounded-full bg-gray-800 flex items-center justify-center text-xs font-bold text-gray-300">
                                                    ${getInitials(ranking.name)}
                                                </div>
                                                <span class="text-sm font-semibold text-gray-100 tracking-wide">${ranking.name}</span>
                                            </div>
                                            <div class="tooltip-text">
                                                <div class="font-bold text-purple-400 mb-1 border-b border-gray-700 pb-1">${ranking.name}</div>
                                                <div class="text-gray-300 leading-relaxed">${ranking.reasoning}</div>
                                            </div>
                                        </div>
                                    `;
                                    // Append to correct tier row
                                    tierRows[ranking.rank].insertAdjacentHTML('beforeend', charHtml);
                               }, 200); // Slight delay for visual effect
                           }
                        }

                        logIndex++;
                        // Speed up logging artificially
                        setTimeout(processNext, 100);
                    } else {
                        addLog("Evaluation complete.", false);
                        input.disabled = false;
                        btn.disabled = false;
                        btn.innerHTML = '<i class="fa-solid fa-bolt"></i> Evaluate & Rank';
                    }
                }

                processNext();

            } catch (error) {
                addLog(`<span class="text-red-500">Error: ${error.message}</span>`);
                input.disabled = false;
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-bolt"></i> Evaluate & Rank';
            }
        });
    </script>
</body>
</html>
