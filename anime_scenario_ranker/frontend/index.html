<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Scenario Ranker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['Fira Code', 'monospace'],
                    },
                    colors: {
                        tier: {
                            s: '#ef4444', // Red-500
                            a: '#f97316', // Orange-500
                            b: '#eab308', // Yellow-500
                            c: '#22c55e', // Green-500
                            d: '#3b82f6'  // Blue-500
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }

        body {
            background-image: radial-gradient(circle at top right, rgba(139, 92, 246, 0.2) 0%, transparent 50%),
                              radial-gradient(circle at bottom left, rgba(59, 130, 246, 0.2) 0%, transparent 50%),
                              radial-gradient(circle at center, rgba(16, 185, 129, 0.05) 0%, transparent 60%);
            background-color: #111827;
        }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: rgba(75, 85, 99, 0.4); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background-color: rgba(75, 85, 99, 0.6); }

        .typing-effect {
            overflow: hidden;
            border-right: .15em solid orange;
            white-space: nowrap;
            margin: 0 auto;
            letter-spacing: .15em;
            animation: typing 3.5s steps(40, end), blink-caret .75s step-end infinite;
        }

        @keyframes typing { from { width: 0 } to { width: 100% } }
        @keyframes blink-caret { from, to { border-color: transparent } 50% { border-color: orange; } }

        .tier-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .animate-pop-in {
            animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            opacity: 0;
            transform: scale(0.8);
        }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.8) translateY(10px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .tier-card:hover {
            transform: scale(1.08) translateY(-4px);
            box-shadow: 0 0 20px rgba(167, 139, 250, 0.8), 0 6px 10px -2px rgba(0, 0, 0, 0.2);
            border-color: rgba(167, 139, 250, 1);
            z-index: 10;
            background-color: rgba(75, 85, 99, 0.9);
        }

        .tier-row {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
            transform: translateY(20px);
            animation: staggerFadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        #tier-S { animation-delay: 0.1s; }
        #tier-A { animation-delay: 0.2s; }
        #tier-B { animation-delay: 0.3s; }
        #tier-C { animation-delay: 0.4s; }
        #tier-D { animation-delay: 0.5s; }

        @keyframes staggerFadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        .tier-row:hover {
            box-shadow: 0 0 15px rgba(167, 139, 250, 0.6);
            background-color: rgba(31, 41, 55, 0.6);
        }

        .tier-row.active-tier {
            background-color: rgba(31, 41, 55, 0.8);
            box-shadow: 0 0 15px rgba(167, 139, 250, 0.2) inset;
        }

        .terminal-log-enter {
            animation: slideInRight 0.3s ease-out forwards;
            opacity: 0;
            transform: translateX(20px);
        }

        @keyframes slideInRight {
            to { opacity: 1; transform: translateX(0); }
        }

        .card-enter {
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            opacity: 0;
            transform: scale(0.8) translateY(20px);
        }

        .tooltip .tooltip-text {
            visibility: hidden;
            width: 280px;
            background: rgba(31, 41, 55, 0.95);
            backdrop-filter: blur(8px);
            color: #fff;
            text-align: center;
            border-radius: 8px;
            padding: 10px;
            position: absolute;
            z-index: 50;
            bottom: 135%;
            left: 50%;
            transform: translateX(-50%) translateY(10px);
            opacity: 0;
            transform: translateY(10px) scale(0.95);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid #4b5563;
            font-size: 0.875rem;
            box-shadow: 0 15px 25px -5px rgba(0, 0, 0, 0.6), 0 0 10px rgba(167, 139, 250, 0.2);
            pointer-events: none;
        }

        .tooltip:hover .tooltip-text {
            visibility: visible;
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        /* Tier gradients */
        .tier-s-bg { background: linear-gradient(135deg, #ef4444, #991b1b); }
        .tier-a-bg { background: linear-gradient(135deg, #f97316, #9a3412); }
        .tier-b-bg { background: linear-gradient(135deg, #eab308, #854d0e); }
        .tier-c-bg { background: linear-gradient(135deg, #22c55e, #166534); }
        .tier-d-bg { background: linear-gradient(135deg, #3b82f6, #1e40af); }

        .loading-dots {
            display: inline-flex;
            align-items: center;
        }
        .loading-dots span {
            width: 4px;
            height: 4px;
            margin: 0 2px;
            background-color: #a78bfa;
            border-radius: 50%;
            animation: dotsBounce 1.4s infinite ease-in-out both;
        }
        .loading-dots span:nth-child(1) { animation-delay: -0.32s; }
        .loading-dots span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes dotsBounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="text-slate-100 h-screen flex flex-col font-sans overflow-hidden relative">

    <!-- Ambient Background -->
    <div class="absolute inset-0 bg-[radial-gradient(circle_at_top_right,_var(--tw-gradient-stops))] from-indigo-900/20 via-slate-900 to-slate-900 -z-10"></div>
    <div class="absolute inset-0 bg-[radial-gradient(circle_at_bottom_left,_var(--tw-gradient-stops))] from-purple-900/20 via-transparent to-transparent -z-10"></div>

    <!-- Header -->
    <header class="bg-gray-800/60 backdrop-blur-xl border-b border-gray-700 p-4 shadow-lg z-10 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-lg flex items-center justify-center shadow-lg shadow-indigo-500/30 relative overflow-hidden group border border-white/20">
                <div class="absolute inset-0 bg-white/20 translate-y-full group-hover:translate-y-0 transition-transform duration-300"></div>
                <i class="fa-solid fa-ranking-star text-white relative z-10 group-hover:scale-110 transition-transform"></i>
            </div>
            <h1 class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 via-purple-400 to-pink-400 tracking-wide drop-shadow-[0_0_8px_rgba(168,85,247,0.3)]">Anime Scenario Ranker AI</h1>
        </div>
        <div class="text-xs font-mono text-slate-300 border border-white/10 px-3 py-1.5 rounded-full bg-black/40 shadow-inner flex items-center">
            <span class="w-2 h-2 rounded-full bg-emerald-500 mr-2 shadow-[0_0_8px_rgba(16,185,129,0.8)] animate-pulse"></span>
            Agent Online
        </div>
    </header>

    <div class="flex-1 flex overflow-hidden relative">
        <!-- Background Decoration -->
        <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-purple-900/10 via-transparent to-transparent pointer-events-none"></div>

        <!-- Sidebar: Agent Terminal -->
        <div class="w-1/3 bg-gray-950/80 backdrop-blur-xl border-r border-gray-800/50 flex flex-col shadow-[10px_0_30px_rgba(0,0,0,0.5)] z-20">
            <div class="p-4 border-b border-gray-800/50 bg-gray-900/50 backdrop-blur-md">
                <h2 class="font-semibold text-purple-400 flex items-center gap-2">
                    <i class="fa-solid fa-terminal"></i> Agent Thoughts
                </h2>
            </div>
            <div id="terminal-content" class="flex-1 p-4 overflow-y-auto custom-scrollbar text-sm font-mono text-green-400 space-y-2 drop-shadow-[0_0_2px_rgba(74,222,128,0.3)]">
                <div>System initialized. Waiting for scenario input...</div>
            </div>
            <div class="p-4 bg-gray-900/80 backdrop-blur-md border-t border-gray-800/50 shadow-inner">
                <form id="scenario-form" class="flex flex-col gap-3">
                    <label class="text-xs text-gray-400 font-semibold uppercase tracking-wider flex items-center gap-2"><i class="fa-solid fa-pen-nib text-purple-400"></i> Enter Scenario for Evaluation</label>
                    <textarea id="scenario-input" rows="3" class="w-full bg-gray-950/50 border border-gray-700 rounded-lg p-3 text-sm focus:ring-2 focus:ring-purple-500/50 focus:border-purple-500 outline-none resize-none transition-all placeholder-gray-600 shadow-inner" placeholder="e.g. A high-stakes diplomatic negotiation to prevent a galactic war..."></textarea>
                    <button type="submit" id="submit-btn" class="bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-500 hover:to-indigo-500 text-white font-medium py-2.5 px-4 rounded-lg transition-all flex items-center justify-center gap-2 shadow-lg shadow-purple-900/30 hover:shadow-[0_0_15px_rgba(168,85,247,0.5)] active:scale-[0.98]">
                        <i class="fa-solid fa-bolt"></i> <span id="btn-text">Evaluate & Rank</span>
                    </button>
                </form>
            </div>
        </div>

        <!-- Main Content: Tier List -->
        <div class="flex-1 bg-slate-900/40 backdrop-blur-sm p-8 overflow-y-auto custom-scrollbar flex flex-col gap-4 relative" id="tier-list-container">
            <!-- Background Grid -->
            <div class="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNDAiIGhlaWdodD0iNDAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+CjxwYXRoIGQ9Ik00MCAwSDBWNDBIMHoiIGZpbGw9Im5vbmUiLz4KPHBhdGggZD0iTTQwIDBoLTF2NDBoMVYwek0wIDQwaDQwdi0xSDB2MXoiIGZpbGw9InJnYmEoMjU1LDI1NSwyNTUsMC4wNSkiLz4KPC9zdmc+')] pointer-events-none opacity-40"></div>

            <!-- Background Decoration -->
            <div class="absolute inset-0 flex items-center justify-center pointer-events-none opacity-[0.02]">
                <i class="fa-solid fa-ranking-star text-[30rem] text-indigo-300"></i>
            </div>

            <!-- Tier Rows will be generated here -->
            <div id="tier-S" class="tier-row flex border border-white/10 rounded-2xl overflow-hidden bg-white/5 backdrop-blur-sm shadow-[0_0_20px_rgba(239,68,68,0.2)] hover:shadow-[0_0_25px_rgba(239,68,68,0.3)] transition-all duration-300 min-h-[120px] relative z-10">
                <div class="w-28 tier-s-bg flex items-center justify-center border-r border-white/20 shrink-0 shadow-inner">
                    <span class="text-4xl font-black text-white drop-shadow-md">S</span>
                </div>
                <div class="flex-1 p-5 flex flex-wrap gap-4 items-center relative z-10" id="row-S"></div>
            </div>

            <div id="tier-A" class="tier-row flex border border-white/10 rounded-2xl overflow-hidden bg-white/5 backdrop-blur-sm shadow-[0_0_20px_rgba(249,115,22,0.1)] hover:shadow-[0_0_25px_rgba(249,115,22,0.2)] transition-all duration-300 min-h-[120px] relative z-10">
                <div class="w-28 tier-a-bg flex items-center justify-center border-r border-white/20 shrink-0 shadow-inner">
                    <span class="text-4xl font-black text-white drop-shadow-md">A</span>
                </div>
                <div class="flex-1 p-5 flex flex-wrap gap-4 items-center relative z-10" id="row-A"></div>
            </div>

            <div id="tier-B" class="tier-row flex border border-white/10 rounded-2xl overflow-hidden bg-white/5 backdrop-blur-sm shadow-[0_0_20px_rgba(234,179,8,0.1)] hover:shadow-[0_0_25px_rgba(234,179,8,0.2)] transition-all duration-300 min-h-[120px] relative z-10">
                <div class="w-28 tier-b-bg flex items-center justify-center border-r border-white/20 shrink-0 shadow-inner">
                    <span class="text-4xl font-black text-white drop-shadow-md">B</span>
                </div>
                <div class="flex-1 p-5 flex flex-wrap gap-4 items-center relative z-10" id="row-B"></div>
            </div>

            <div id="tier-C" class="tier-row flex border border-white/10 rounded-2xl overflow-hidden bg-white/5 backdrop-blur-sm shadow-[0_0_20px_rgba(34,197,94,0.1)] hover:shadow-[0_0_25px_rgba(34,197,94,0.2)] transition-all duration-300 min-h-[120px] relative z-10">
                <div class="w-28 tier-c-bg flex items-center justify-center border-r border-white/20 shrink-0 shadow-inner">
                    <span class="text-4xl font-black text-white drop-shadow-md">C</span>
                </div>
                <div class="flex-1 p-5 flex flex-wrap gap-4 items-center relative z-10" id="row-C"></div>
            </div>

            <div id="tier-D" class="tier-row flex border border-white/10 rounded-2xl overflow-hidden bg-white/5 backdrop-blur-sm shadow-[0_0_20px_rgba(59,130,246,0.1)] hover:shadow-[0_0_25px_rgba(59,130,246,0.2)] transition-all duration-300 min-h-[120px] relative z-10">
                <div class="w-28 tier-d-bg flex items-center justify-center border-r border-white/20 shrink-0 shadow-inner">
                    <span class="text-4xl font-black text-white drop-shadow-md">D</span>
                </div>
                <div class="flex-1 p-5 flex flex-wrap gap-4 items-center relative z-10" id="row-D"></div>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('scenario-form');
        const input = document.getElementById('scenario-input');
        const btn = document.getElementById('submit-btn');
        const terminal = document.getElementById('terminal-content');

        const tierRows = {
            'S': document.getElementById('row-S'),
            'A': document.getElementById('row-A'),
            'B': document.getElementById('row-B'),
            'C': document.getElementById('row-C'),
            'D': document.getElementById('row-D')
        };

        function addLog(message, isThinking = false) {
            const div = document.createElement('div');
            div.className = 'terminal-log-enter';
            if(isThinking) {
                 div.innerHTML = `<span class="text-purple-400">❯</span> <span class="animate-pulse">${message}</span> <div class="loading-dots"><span></span><span></span><span></span></div>`;
            } else {
                 div.innerHTML = `<span class="text-purple-400">❯</span> ${message}`;
            }

            terminal.appendChild(div);

            // Trigger reflow
            void div.offsetWidth;
            div.classList.remove('opacity-0');

            terminal.scrollTop = terminal.scrollHeight;
            return div;
        }

        function clearTiers() {
            Object.values(tierRows).forEach(row => {
                row.innerHTML = '';
            });
        }

        function getInitials(name) {
            return name.split(' ').map(n => n[0]).join('').substring(0, 2);
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const scenario = input.value.trim();
            if (!scenario) return;

            // Reset UI
            input.disabled = true;
            btn.disabled = true;
            document.getElementById('btn-text').textContent = 'Evaluating...';
            btn.querySelector('i').className = 'fa-solid fa-spinner fa-spin';
            terminal.innerHTML = '';
            clearTiers();

            addLog(`Received scenario: "${scenario}"`);
            addLog("Initializing agent reasoning protocol...", true);

            try {
                const response = await fetch('/api/rank', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ scenario })
                });

                if (!response.ok) throw new Error('Network response was not ok');

                const data = await response.json();

                // Simulate agent streaming logs
                let logIndex = 0;

                function processNext() {
                    if (logIndex < data.logs.length) {
                        const logMsg = data.logs[logIndex];
                        addLog(logMsg);

                        // If log indicates a decision, add character to tier
                        const match = logMsg.match(/Evaluating (.*)\.\.\./);
                        if (match) {
                           // Find the character in rankings
                           const charName = match[1];
                           const ranking = data.rankings.find(r => r.name === charName);

                           if(ranking) {
                               setTimeout(() => {
                                    const rowChildCount = tierRows[ranking.rank].children.length;
                                    const delay = (rowChildCount * 0.1).toFixed(1);
                                    const charHtml = `
                                        <div class="tooltip relative cursor-help card-enter tier-card animate-pop-in" style="animation-delay: ${delay}s">
                                            <div class="bg-gray-700/60 backdrop-blur-sm border border-gray-500/30 rounded px-3 py-2 flex items-center gap-2 hover:bg-gray-600/80 transition-all shadow-[0_0_10px_rgba(0,0,0,0.3)]">
                                                <div class="w-6 h-6 rounded-full bg-gray-800 flex items-center justify-center text-xs font-bold text-gray-300">
                                                    ${getInitials(ranking.name)}
                                                </div>
                                                <span class="text-sm font-bold text-white tracking-wide">${ranking.name}</span>
                                            </div>
                                            <div class="tooltip-text">
                                                <div class="font-bold text-indigo-300 mb-2 border-b border-white/10 pb-2 flex items-center gap-2"><i class="fa-solid fa-brain text-xs opacity-70"></i> ${ranking.name}</div>
                                                <div class="text-slate-300 leading-relaxed text-left text-sm font-medium opacity-90">${ranking.reasoning}</div>
                                            </div>
                                        </div>
                                    `;
                                    // Append to correct tier row
                                    tierRows[ranking.rank].insertAdjacentHTML('beforeend', charHtml);
                               }, 200); // Slight delay for visual effect
                           }
                        }

                        logIndex++;
                        // Speed up logging artificially
                        setTimeout(processNext, 100);
                    } else {
                        addLog("Evaluation complete.", false);
                        input.disabled = false;
                        btn.disabled = false;
                        document.getElementById('btn-text').textContent = 'Evaluate & Rank';
                        btn.querySelector('i').className = 'fa-solid fa-bolt';
                    }
                }

                processNext();

            } catch (error) {
                addLog(`<span class="text-red-500">Error: ${error.message}</span>`);
                input.disabled = false;
                btn.disabled = false;
                document.getElementById('btn-text').textContent = 'Evaluate & Rank';
                btn.querySelector('i').className = 'fa-solid fa-bolt';
            }
        });
    </script>
</body>
</html>
