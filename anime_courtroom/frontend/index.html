<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Courtroom AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            background-image: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
            min-height: 100vh;
        }
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5), 0 0 15px rgba(59, 130, 246, 0.2);
        }
        .glow-btn {
            transition: all 0.3s ease;
        }
        .glow-btn:hover {
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
            transform: translateY(-2px);
        }
        .chat-bubble {
            animation: fadeIn 0.5s ease-out forwards;
            opacity: 0;
            transform: translateY(10px);
        }
        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="p-8 flex flex-col items-center">
    <div class="max-w-4xl w-full">
        <header class="mb-10 text-center">
            <h1 class="text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500 drop-shadow-lg mb-4">Anime Courtroom AI</h1>
            <p class="text-slate-400 text-lg">Present your case to the AI anime council.</p>
        </header>

        <div class="glass-panel rounded-2xl p-6 mb-8">
            <h2 class="text-2xl font-bold mb-4 text-blue-300">File a Case</h2>
            <textarea id="caseInput" class="w-full bg-slate-800/50 border border-slate-600 rounded-lg p-4 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all" rows="3" placeholder="Describe the crime or scenario (e.g., 'Did Naruto steal the ramen recipe?')..."></textarea>
            <button id="submitBtn" class="mt-4 w-full bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-bold py-3 px-6 rounded-lg glow-btn" onclick="startTrial()">Start Trial</button>
        </div>

        <div id="trialContainer" class="hidden space-y-6">
            <div class="glass-panel rounded-2xl p-6">
                <h3 class="text-xl font-bold mb-4 border-b border-slate-600 pb-2 flex justify-between">
                    <span>Court Roles</span>
                    <span id="verdictBadge" class="hidden px-3 py-1 rounded-full text-sm font-bold"></span>
                </h3>
                <div id="rolesList" class="grid grid-cols-2 md:grid-cols-4 gap-4 text-sm">
                    <!-- Roles injected here -->
                </div>
            </div>

            <div class="glass-panel rounded-2xl p-6">
                <h3 class="text-xl font-bold mb-4 border-b border-slate-600 pb-2">Trial Transcript</h3>
                <div id="transcriptBox" class="space-y-4 max-h-96 overflow-y-auto pr-2">
                    <!-- Transcript injected here -->
                </div>
            </div>
        </div>

        <div id="loading" class="hidden text-center my-10">
            <div class="inline-block animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-blue-500"></div>
            <p class="mt-4 text-blue-400">Court is convening...</p>
        </div>
    </div>

    <script>
        async function startTrial() {
            const caseInput = document.getElementById('caseInput').value;
            if (!caseInput) return alert('Please enter a case description.');

            document.getElementById('trialContainer').classList.add('hidden');
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('submitBtn').disabled = true;

            try {
                const response = await fetch('/api/trial', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ case_description: caseInput })
                });

                const data = await response.json();
                displayTrial(data);
            } catch (error) {
                alert('Error connecting to the courtroom server.');
                console.error(error);
            } finally {
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('submitBtn').disabled = false;
            }
        }

        function displayTrial(data) {
            const container = document.getElementById('trialContainer');
            const rolesList = document.getElementById('rolesList');
            const transcriptBox = document.getElementById('transcriptBox');
            const verdictBadge = document.getElementById('verdictBadge');

            // Set Roles
            rolesList.innerHTML = `
                <div class="bg-slate-800/80 p-3 rounded-lg border border-yellow-500/30 shadow-[0_0_10px_rgba(234,179,8,0.1)]">
                    <span class="text-yellow-500 block text-xs uppercase font-bold mb-1">Judge</span>
                    <span class="font-semibold">${data.roles.Judge}</span>
                </div>
                <div class="bg-slate-800/80 p-3 rounded-lg border border-red-500/30 shadow-[0_0_10px_rgba(239,68,68,0.1)]">
                    <span class="text-red-500 block text-xs uppercase font-bold mb-1">Prosecutor</span>
                    <span class="font-semibold">${data.roles.Prosecutor}</span>
                </div>
                <div class="bg-slate-800/80 p-3 rounded-lg border border-blue-500/30 shadow-[0_0_10px_rgba(59,130,246,0.1)]">
                    <span class="text-blue-500 block text-xs uppercase font-bold mb-1">Defense</span>
                    <span class="font-semibold">${data.roles.Defense}</span>
                </div>
                <div class="bg-slate-800/80 p-3 rounded-lg border border-purple-500/30 shadow-[0_0_10px_rgba(168,85,247,0.1)]">
                    <span class="text-purple-500 block text-xs uppercase font-bold mb-1">Jury</span>
                    <span class="font-semibold truncate block" title="${data.roles.Jury.join(', ')}">${data.roles.Jury.join(', ')}</span>
                </div>
            `;

            // Set Transcript
            transcriptBox.innerHTML = '';
            data.transcript.forEach((entry, index) => {
                const isJudge = entry.speaker.startsWith('Judge');
                const isPros = entry.speaker.startsWith('Prosecutor');
                const isDef = entry.speaker.startsWith('Defense');

                let colorClass = 'text-slate-300';
                if(isJudge) colorClass = 'text-yellow-400';
                if(isPros) colorClass = 'text-red-400';
                if(isDef) colorClass = 'text-blue-400';

                const div = document.createElement('div');
                div.className = `chat-bubble bg-slate-800/60 p-4 rounded-lg border-l-4 ${isJudge ? 'border-yellow-500' : isPros ? 'border-red-500' : isDef ? 'border-blue-500' : 'border-purple-500'}`;
                div.style.animationDelay = `${index * 0.5}s`;
                div.innerHTML = `
                    <span class="font-bold ${colorClass} block mb-1 text-sm">${entry.speaker}</span>
                    <p class="text-slate-200 leading-relaxed">${entry.text}</p>
                `;
                transcriptBox.appendChild(div);
            });

            // Set Verdict
            verdictBadge.textContent = data.verdict;
            verdictBadge.classList.remove('hidden', 'bg-red-500', 'bg-green-500');
            if(data.verdict === 'GUILTY') {
                verdictBadge.classList.add('bg-red-500', 'text-white');
            } else {
                verdictBadge.classList.add('bg-green-500', 'text-white');
            }

            container.classList.remove('hidden');
        }
    </script>
</body>
</html>
