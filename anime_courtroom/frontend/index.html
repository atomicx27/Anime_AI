<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Courtroom AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            background-image: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            border-radius: 1rem;
        }

        .glow-text {
            text-shadow: 0 0 10px rgba(96, 165, 250, 0.5);
        }

        .input-glow:focus {
            box-shadow: 0 0 15px rgba(96, 165, 250, 0.3);
            border-color: #60a5fa;
            outline: none;
        }

        .role-judge { color: #facc15; }
        .role-prosecutor { color: #f87171; }
        .role-defense { color: #60a5fa; }

        .message-card {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.5s ease forwards;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .typing-indicator span {
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: #94a3b8;
            border-radius: 50%;
            margin: 0 2px;
            animation: typing 1.4s infinite ease-in-out both;
        }

        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes typing {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* Scrollbar styles */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(30, 41, 59, 0.5);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }
    </style>
</head>
<body class="p-6 md:p-12 flex flex-col items-center">

    <div class="max-w-4xl w-full">
        <header class="text-center mb-10">
            <h1 class="text-5xl font-bold mb-4 glow-text bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-500">Anime Courtroom AI</h1>
            <p class="text-slate-400 text-lg">Submit a crime, and watch the Anime Council hold trial.</p>
        </header>

        <!-- Input Section -->
        <div class="glass-panel p-6 mb-8 flex flex-col md:flex-row gap-4 items-center">
            <input type="text" id="crimeInput" placeholder="Enter a crime or action (e.g., 'Destroyed a moon')"
                   class="flex-1 bg-slate-800 border border-slate-600 rounded-lg px-4 py-3 text-white placeholder-slate-400 input-glow transition-all duration-300 w-full md:w-auto">
            <button id="submitBtn" onclick="startTrial()"
                    class="bg-blue-600 hover:bg-blue-500 text-white font-semibold py-3 px-8 rounded-lg transition-colors duration-300 shadow-[0_0_15px_rgba(37,99,235,0.5)] hover:shadow-[0_0_25px_rgba(59,130,246,0.6)] w-full md:w-auto whitespace-nowrap">
                <i class="fas fa-gavel mr-2"></i> Hold Trial
            </button>
        </div>

        <!-- Loading Indicator -->
        <div id="loading" class="hidden text-center my-8">
            <div class="typing-indicator">
                <span></span><span></span><span></span>
            </div>
            <p class="text-slate-400 mt-2 text-sm uppercase tracking-widest">Court is convening...</p>
        </div>

        <!-- Trial Container -->
        <div id="trialContainer" class="hidden space-y-6">

            <!-- Court Officials Info -->
            <div class="glass-panel p-6 mb-6 flex flex-wrap justify-between items-center text-sm border-l-4 border-l-blue-500">
                <div class="text-center w-full md:w-1/3 mb-4 md:mb-0">
                    <p class="text-slate-400 uppercase tracking-wider text-xs">Judge</p>
                    <p id="judgeName" class="font-bold text-yellow-400 text-lg"></p>
                </div>
                <div class="text-center w-full md:w-1/3 mb-4 md:mb-0">
                    <p class="text-slate-400 uppercase tracking-wider text-xs">Prosecutor</p>
                    <p id="prosecutorName" class="font-bold text-red-400 text-lg"></p>
                </div>
                <div class="text-center w-full md:w-1/3">
                    <p class="text-slate-400 uppercase tracking-wider text-xs">Defense</p>
                    <p id="defenseName" class="font-bold text-blue-400 text-lg"></p>
                </div>
            </div>

            <!-- Transcript -->
            <div id="transcript" class="space-y-4">
                <!-- Messages will be injected here -->
            </div>

            <div id="logsContainer" class="glass-panel p-4 mt-8 hidden">
                 <h3 class="text-xs text-slate-500 uppercase tracking-widest mb-2 font-semibold">Agent Terminal Logs</h3>
                 <div id="logsList" class="font-mono text-xs text-slate-400 space-y-1"></div>
            </div>
        </div>

    </div>

    <script>
        async function startTrial() {
            const crime = document.getElementById('crimeInput').value.trim();
            if (!crime) return;

            const btn = document.getElementById('submitBtn');
            const loading = document.getElementById('loading');
            const container = document.getElementById('trialContainer');
            const transcriptDiv = document.getElementById('transcript');
            const logsContainer = document.getElementById('logsContainer');
            const logsList = document.getElementById('logsList');

            // Reset UI
            btn.disabled = true;
            btn.classList.add('opacity-50', 'cursor-not-allowed');
            loading.classList.remove('hidden');
            container.classList.add('hidden');
            transcriptDiv.innerHTML = '';
            logsList.innerHTML = '';
            logsContainer.classList.add('hidden');

            try {
                // Determine API URL based on environment
                let apiUrl = 'http://localhost:8007/api/trial';
                if (window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1') {
                    apiUrl = '/api/trial'; // Use relative path if running served by FastAPI directly
                }

                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ crime: crime })
                });

                if (!response.ok) throw new Error('Network response was not ok');

                const data = await response.json();

                // Populate Officials
                document.getElementById('judgeName').textContent = data.judge.name;
                document.getElementById('prosecutorName').textContent = data.prosecutor.name;
                document.getElementById('defenseName').textContent = data.defense.name;

                loading.classList.add('hidden');
                container.classList.remove('hidden');

                // Animate Transcript
                for (let i = 0; i < data.transcript.length; i++) {
                    const msg = data.transcript[i];
                    await new Promise(r => setTimeout(r, 800)); // Delay between messages

                    const div = document.createElement('div');
                    div.className = 'glass-panel p-5 message-card border-l-4';

                    let roleColor = '';
                    let alignClass = 'text-left';
                    let icon = '';

                    if (msg.role === 'Prosecutor') {
                        roleColor = 'text-red-400';
                        div.classList.add('border-l-red-500', 'mr-8');
                        icon = '<i class="fas fa-balance-scale-right mr-2"></i>';
                    } else if (msg.role === 'Defense Attorney') {
                        roleColor = 'text-blue-400';
                        div.classList.add('border-l-blue-500', 'ml-8');
                        icon = '<i class="fas fa-shield-alt mr-2"></i>';
                    } else { // Judge
                        roleColor = 'text-yellow-400 text-center';
                        div.classList.add('border-l-yellow-500', 'mx-auto', 'w-3/4', 'border-r-4', 'border-r-yellow-500');
                        alignClass = 'text-center';
                        icon = '<i class="fas fa-gavel mr-2"></i>';
                    }

                    div.innerHTML = `
                        <div class="mb-2 ${alignClass}">
                            <span class="text-xs uppercase tracking-wider text-slate-500 mr-2">${msg.role}</span>
                            <span class="font-bold ${roleColor} text-lg">${icon}${msg.speaker}</span>
                        </div>
                        <p class="text-slate-200 leading-relaxed ${alignClass}">${msg.message}</p>
                    `;
                    transcriptDiv.appendChild(div);
                    div.scrollIntoView({ behavior: 'smooth', block: 'end' });
                }

                // Show Logs
                logsContainer.classList.remove('hidden');
                data.logs.forEach(log => {
                    const logEl = document.createElement('div');
                    logEl.textContent = `> ${log}`;
                    logsList.appendChild(logEl);
                });

            } catch (error) {
                console.error("Error:", error);
                alert("Failed to connect to the Courtroom AI backend.");
                loading.classList.add('hidden');
            } finally {
                btn.disabled = false;
                btn.classList.remove('opacity-50', 'cursor-not-allowed');
            }
        }
    </script>
</body>
</html>
