<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Venture Capital AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Fira+Code&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="min-h-screen text-slate-200 p-8">
    <div class="max-w-6xl mx-auto space-y-8">

        <header class="text-center space-y-4">
            <h1 class="text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500 tracking-tight text-glow">
                Anime Venture Capital AI
            </h1>
            <p class="text-slate-400 text-lg max-w-2xl mx-auto">
                Pitch your startup idea to a panel of legendary anime characters.
            </p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1 space-y-6">
                <div class="glass-panel p-6">
                    <h2 class="text-xl font-bold mb-4 text-blue-400">The Pitch Deck</h2>
                    <form id="pitch-form" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-400 mb-2">Startup Pitch</label>
                            <textarea id="pitch-input" rows="5" class="w-full bg-slate-900/50 border border-slate-700 rounded-lg p-3 text-slate-200 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-colors" placeholder="e.g., A subscription box service for enchanted swords..." required></textarea>
                        </div>
                        <button type="submit" id="pitch-btn" class="w-full py-3 px-4 bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-500 hover:to-purple-500 text-white font-bold rounded-lg shadow-lg shadow-blue-500/30 smooth-hover flex items-center justify-center gap-2">
                            <span>Pitch to Investors</span>
                            <svg class="w-5 h-5 hidden" id="loading-spinner" fill="none" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                            </svg>
                        </button>
                    </form>
                </div>

                <div class="glass-panel p-6">
                    <h2 class="text-xl font-bold mb-4 text-purple-400 flex items-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                        Agent Terminal
                    </h2>
                    <div class="bg-slate-900 rounded-lg p-4 font-mono text-xs text-green-400 h-64 overflow-y-auto" id="terminal-log">
                        > System Ready. Waiting for pitch...
                    </div>
                </div>
            </div>

            <div class="lg:col-span-2 hidden" id="results-container">
                <div class="glass-panel p-8">
                    <div class="flex items-center justify-between mb-8 border-b border-slate-700/50 pb-4">
                        <h2 class="text-2xl font-bold text-slate-100">Boardroom Feedback</h2>
                        <div id="final-verdict" class="px-4 py-2 rounded-full font-bold text-sm bg-slate-800 border">
                            <!-- Verdict injected here -->
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6" id="evaluations-grid">
                        <!-- Role Cards Injected Here -->
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
