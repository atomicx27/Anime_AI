<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Therapy AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            background-image: radial-gradient(circle at 50% -20%, #1e293b 0%, #0f172a 100%);
            min-height: 100vh;
        }
        .code-font { font-family: 'Fira Code', monospace; }
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        .smooth-hover { transition: all 0.3s ease; }
        .glass-hover:hover {
            background: rgba(30, 41, 59, 0.9);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.2);
            border-color: rgba(99, 102, 241, 0.5);
            transform: translateY(-2px);
        }
        .text-glow { text-shadow: 0 0 10px rgba(99, 102, 241, 0.5); }
        .typing-cursor::after {
            content: '|';
            animation: blink 1s step-end infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="p-8">

<div class="max-w-4xl mx-auto">
    <header class="text-center mb-12">
        <h1 class="text-5xl font-bold mb-4 text-glow bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 to-purple-400">Anime Therapy AI</h1>
        <p class="text-slate-400 text-lg">Confide your struggles, and let an AI-selected anime council guide you.</p>
    </header>

    <div class="glass-panel rounded-2xl p-6 mb-8">
        <h2 class="text-xl font-semibold mb-4 text-indigo-300">Share Your Struggle</h2>
        <div class="flex flex-col md:flex-row gap-4">
            <input type="text" id="struggleInput"
                   class="flex-1 bg-slate-800/50 border border-slate-700 rounded-xl px-4 py-3 text-slate-200 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all"
                   placeholder="E.g., I'm feeling overwhelmed by my new job responsibilities...">
            <button id="seekTherapyBtn"
                    class="bg-indigo-600 hover:bg-indigo-500 text-white font-medium py-3 px-8 rounded-xl smooth-hover shadow-lg shadow-indigo-500/20 flex-shrink-0">
                Seek Guidance
            </button>
        </div>
    </div>

    <!-- Loading Terminal -->
    <div id="terminalSection" class="hidden mb-8">
        <div class="glass-panel rounded-xl p-4 border-l-4 border-l-indigo-500">
            <div class="flex items-center justify-between mb-2">
                <span class="text-xs text-indigo-400 font-semibold tracking-wider uppercase code-font">Therapy Protocol Initiated</span>
                <div class="flex space-x-1.5">
                    <div class="w-2.5 h-2.5 rounded-full bg-slate-600"></div>
                    <div class="w-2.5 h-2.5 rounded-full bg-slate-600"></div>
                    <div class="w-2.5 h-2.5 rounded-full bg-indigo-500 animate-pulse"></div>
                </div>
            </div>
            <div id="terminalLogs" class="code-font text-sm text-slate-300 space-y-1 h-32 overflow-y-auto"></div>
        </div>
    </div>

    <!-- Results Section -->
    <div id="resultsSection" class="hidden space-y-6">
        <h2 class="text-2xl font-bold text-center text-slate-200 mb-6">Your Personalized Council</h2>
        <div id="adviceContainer" class="grid gap-6"></div>
    </div>
</div>

<script>
    document.getElementById('seekTherapyBtn').addEventListener('click', async () => {
        const struggle = document.getElementById('struggleInput').value.trim();
        if (!struggle) return;

        // UI Reset
        document.getElementById('terminalSection').classList.remove('hidden');
        document.getElementById('resultsSection').classList.add('hidden');
        document.getElementById('adviceContainer').innerHTML = '';
        const terminalLogs = document.getElementById('terminalLogs');
        terminalLogs.innerHTML = `<div class="typing-cursor">Initializing neural link...</div>`;

        try {
            const baseUrl = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
                ? 'http://localhost:8009' : '';

            const response = await fetch(`${baseUrl}/api/therapy`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ struggle })
            });

            if (!response.ok) throw new Error('API Error');
            const data = await response.json();

            // Simulate Terminal Logs
            terminalLogs.innerHTML = '';
            for (let i = 0; i < data.logs.length; i++) {
                await new Promise(r => setTimeout(r, 400));
                terminalLogs.innerHTML += `<div>> ${data.logs[i]}</div>`;
                terminalLogs.scrollTop = terminalLogs.scrollHeight;
            }

            await new Promise(r => setTimeout(r, 600));
            document.getElementById('terminalSection').classList.add('hidden');
            document.getElementById('resultsSection').classList.remove('hidden');

            // Render Advice Cards
            const container = document.getElementById('adviceContainer');

            const roleColors = {
                "Empathetic Listener": "from-pink-500/20 to-rose-500/5 border-pink-500/30",
                "Tough Love Challenger": "from-orange-500/20 to-red-500/5 border-orange-500/30",
                "Pragmatic Analyst": "from-cyan-500/20 to-blue-500/5 border-cyan-500/30"
            };

            const roleBadges = {
                "Empathetic Listener": "bg-pink-500/20 text-pink-300 border-pink-500/30",
                "Tough Love Challenger": "bg-orange-500/20 text-orange-300 border-orange-500/30",
                "Pragmatic Analyst": "bg-cyan-500/20 text-cyan-300 border-cyan-500/30"
            };

            data.advice.forEach((item, index) => {
                const colors = roleColors[item.role] || "from-slate-500/20 to-slate-500/5 border-slate-500/30";
                const badge = roleBadges[item.role] || "bg-slate-500/20 text-slate-300 border-slate-500/30";

                const card = document.createElement('div');
                card.className = `glass-panel glass-hover rounded-xl p-6 fade-in border-l-4 bg-gradient-to-r ${colors}`;
                card.style.animationDelay = `${index * 0.15}s`;

                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <h3 class="text-xl font-bold text-slate-100">${item.character.name}</h3>
                            <p class="text-sm text-slate-400 mt-1">${item.character.core_emotion}</p>
                        </div>
                        <span class="px-3 py-1 text-xs font-semibold rounded-full border ${badge}">
                            ${item.role}
                        </span>
                    </div>
                    <div class="bg-slate-900/40 rounded-lg p-4 code-font text-sm text-slate-200 border border-slate-800/50 leading-relaxed relative">
                        <span class="absolute top-2 left-2 text-indigo-500/30 text-2xl font-serif">"</span>
                        <p class="relative z-10 px-4">${item.message}</p>
                        <span class="absolute bottom-[-10px] right-2 text-indigo-500/30 text-2xl font-serif">"</span>
                    </div>
                `;
                container.appendChild(card);
            });

        } catch (error) {
            terminalLogs.innerHTML += `<div class="text-red-400">> Error: Connection to council lost.</div>`;
        }
    });
</script>
</body>
</html>
