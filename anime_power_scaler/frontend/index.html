<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Power Scaler AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['Fira Code', 'monospace'],
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@300;400;500;600;700&display=swap');

        body {
            background-color: #0f172a; /* slate-900 */
            color: #f8fafc; /* slate-50 */
            overflow-x: hidden;
        }

        .terminal {
            background-color: rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(239, 68, 68, 0.3); /* red border */
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8), 0 0 15px rgba(239, 68, 68, 0.1);
        }

        .log-entry {
            opacity: 0;
            animation: fadeIn 0.5s forwards;
            padding-left: 1rem;
            text-indent: -1rem;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .typing-cursor::after {
            content: '█';
            animation: blink 1s step-end infinite;
            color: #ef4444; /* red cursor */
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        /* Custom scrollbar for terminal */
        .terminal::-webkit-scrollbar { width: 6px; }
        .terminal::-webkit-scrollbar-track { background: rgba(0,0,0,0.5); }
        .terminal::-webkit-scrollbar-thumb { background: rgba(239, 68, 68, 0.5); border-radius: 4px; }
        .terminal::-webkit-scrollbar-thumb:hover { background: rgba(239, 68, 68, 0.8); }

    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-6 lg:p-10 relative font-sans">

    <!-- Ambient Background -->
    <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-orange-900/20 via-slate-900 to-slate-900 -z-10"></div>
    <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_bottom_left,_var(--tw-gradient-stops))] from-red-900/20 via-transparent to-transparent -z-10"></div>

    <header class="w-full max-w-5xl mb-10 text-center relative z-10">
        <h1 class="text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-red-500 via-orange-500 to-yellow-500 mb-4 drop-shadow-[0_0_15px_rgba(239,68,68,0.4)]">Anime Power Scaler AI</h1>
        <p class="text-slate-300 text-lg font-medium max-w-2xl mx-auto">Simulate dynamic 1v1 battles between legends based on their core traits and philosophies.</p>
    </header>

    <main class="w-full max-w-5xl flex flex-col lg:flex-row gap-8 flex-grow relative z-10">

        <!-- Sidebar: Setup Battle -->
        <aside class="w-full lg:w-1/3 bg-white/5 backdrop-blur-md border border-white/10 rounded-2xl p-6 lg:p-8 h-fit shadow-[0_8px_32px_rgba(0,0,0,0.3)] relative overflow-hidden">
            <div class="absolute inset-0 bg-gradient-to-b from-red-500/5 to-transparent pointer-events-none"></div>

            <h2 class="text-xl font-bold mb-6 text-orange-400 flex items-center relative z-10">
                <i class="fas fa-bolt mr-2 drop-shadow-[0_0_8px_rgba(249,115,22,0.6)]"></i> Setup Match
            </h2>

            <div class="mb-5 relative z-10">
                <label class="block text-sm font-semibold text-slate-300 mb-2" for="char1-select">Fighter 1</label>
                <select id="char1-select" class="w-full bg-black/40 border border-white/10 text-white rounded-xl py-3 px-4 focus:outline-none focus:ring-2 focus:ring-orange-500/50 focus:border-orange-500/50 transition-all shadow-inner appearance-none">
                    <option value="">Select Character...</option>
                </select>
            </div>

            <div class="flex justify-center my-6 relative z-10">
                <div class="bg-red-500/20 px-4 py-2 rounded-lg border border-red-500/30 shadow-[0_0_15px_rgba(239,68,68,0.3)]">
                    <span class="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-br from-red-400 to-orange-500 italic drop-shadow-sm">VS</span>
                </div>
            </div>

            <div class="mb-6 relative z-10">
                <label class="block text-sm font-semibold text-slate-300 mb-2" for="char2-select">Fighter 2</label>
                <select id="char2-select" class="w-full bg-black/40 border border-white/10 text-white rounded-xl py-3 px-4 focus:outline-none focus:ring-2 focus:ring-orange-500/50 focus:border-orange-500/50 transition-all shadow-inner appearance-none">
                    <option value="">Select Character...</option>
                </select>
            </div>

            <div class="mb-8 relative z-10">
                <label class="block text-sm font-semibold text-slate-300 mb-2" for="context-input">Battle Context / Arena</label>
                <input type="text" id="context-input" value="Final Valley" class="w-full bg-black/40 border border-white/10 text-white rounded-xl py-3 px-4 focus:outline-none focus:ring-2 focus:ring-orange-500/50 focus:border-orange-500/50 placeholder-slate-600 transition-all shadow-[inset_0_2px_10px_rgba(0,0,0,0.3)]">
            </div>

            <button id="simulate-btn" class="w-full bg-gradient-to-r from-red-600 to-orange-600 hover:from-red-500 hover:to-orange-500 text-white font-bold py-3.5 px-4 rounded-xl transition-all duration-300 shadow-[0_0_15px_rgba(239,68,68,0.4)] hover:shadow-[0_0_25px_rgba(239,68,68,0.6)] transform hover:-translate-y-0.5 relative z-10 disabled:opacity-50 disabled:cursor-not-allowed disabled:transform-none">
                Simulate Battle
            </button>
        </aside>

        <!-- Main Content: Terminal & Results -->
        <section class="w-full lg:w-2/3 flex flex-col gap-8">

            <!-- Terminal -->
            <div class="terminal rounded-2xl p-5 h-80 overflow-y-auto flex flex-col relative">
                <div class="flex items-center justify-between mb-4 border-b border-red-900/30 pb-3">
                    <div class="flex items-center gap-2">
                        <div class="w-3 h-3 rounded-full bg-red-500 shadow-[0_0_8px_rgba(239,68,68,0.8)] animate-pulse"></div>
                        <span class="text-xs text-red-400 font-mono tracking-wider uppercase">Agent Terminal // Power_Scaler.exe</span>
                    </div>
                    <div class="flex space-x-1.5 opacity-50">
                        <div class="w-2.5 h-2.5 rounded-full bg-slate-600"></div>
                        <div class="w-2.5 h-2.5 rounded-full bg-slate-600"></div>
                        <div class="w-2.5 h-2.5 rounded-full bg-slate-600"></div>
                    </div>
                </div>

                <div id="terminal-content" class="text-[13px] text-orange-200 flex-grow whitespace-pre-wrap font-mono leading-relaxed opacity-90">
                    <span class="text-slate-600">Awaiting input...</span>
                </div>
            </div>

            <!-- Results Card -->
            <div id="results-card" class="bg-white/5 backdrop-blur-lg border border-white/10 rounded-2xl p-8 shadow-[0_8px_32px_rgba(0,0,0,0.3)] hidden relative overflow-hidden">
                <!-- Decorative background elements -->
                <div class="absolute top-1/2 right-0 -translate-y-1/2 translate-x-1/4 w-64 h-64 bg-orange-500/20 rounded-full blur-[60px] pointer-events-none"></div>
                <div class="absolute top-1/2 left-0 -translate-y-1/2 -translate-x-1/4 w-64 h-64 bg-red-500/20 rounded-full blur-[60px] pointer-events-none"></div>

                <h3 class="text-3xl font-black text-center mb-8 border-b border-white/10 pb-4 text-transparent bg-clip-text bg-gradient-to-r from-red-400 to-orange-400 relative z-10">Battle Result</h3>

                <div class="flex flex-col md:flex-row items-center justify-center gap-8 mb-8 relative z-10">
                    <div class="text-center w-full md:w-2/5 bg-black/20 p-4 rounded-xl border border-white/5 shadow-inner">
                        <div id="res-char1-name" class="text-2xl font-bold text-slate-100">Char 1</div>
                        <div id="res-char1-trait" class="text-xs font-medium text-slate-400 mt-2 bg-white/5 inline-block px-3 py-1 rounded-full border border-white/10">Trait</div>
                    </div>

                    <div class="w-full md:w-1/5 text-center flex justify-center">
                        <div id="winner-badge" class="inline-block px-6 py-2.5 bg-gradient-to-r from-yellow-500 to-orange-500 text-white font-black rounded-full shadow-[0_0_20px_rgba(245,158,11,0.6)] transform scale-110 text-sm tracking-wider uppercase border border-yellow-300/50">
                            WINNER
                        </div>
                    </div>

                    <div class="text-center w-full md:w-2/5 bg-black/20 p-4 rounded-xl border border-white/5 shadow-inner">
                        <div id="res-char2-name" class="text-2xl font-bold text-slate-100">Char 2</div>
                        <div id="res-char2-trait" class="text-xs font-medium text-slate-400 mt-2 bg-white/5 inline-block px-3 py-1 rounded-full border border-white/10">Trait</div>
                    </div>
                </div>

                <div class="bg-black/40 border border-white/10 rounded-xl p-6 relative z-10 shadow-inner">
                    <h4 class="text-xs font-bold text-orange-400 mb-3 uppercase tracking-wider flex items-center"><i class="fas fa-clipboard-list mr-2 opacity-80"></i> Post-Match Summary</h4>
                    <p id="match-summary" class="text-slate-300 text-sm leading-relaxed"></p>
                </div>
            </div>

        </section>
    </main>

    <script>
        const char1Select = document.getElementById('char1-select');
        const char2Select = document.getElementById('char2-select');
        const contextInput = document.getElementById('context-input');
        const simulateBtn = document.getElementById('simulate-btn');
        const terminalContent = document.getElementById('terminal-content');
        const resultsCard = document.getElementById('results-card');

        let charactersData = [];

        // Load characters
        async function loadCharacters() {
            try {
                const response = await fetch('/api/characters');
                const data = await response.json();
                charactersData = data.characters;

                charactersData.forEach(char => {
                    const opt1 = document.createElement('option');
                    opt1.value = char.name;
                    opt1.textContent = char.name;
                    char1Select.appendChild(opt1);

                    const opt2 = document.createElement('option');
                    opt2.value = char.name;
                    opt2.textContent = char.name;
                    char2Select.appendChild(opt2);
                });
            } catch (error) {
                console.error("Failed to load characters", error);
                terminalContent.innerHTML = `<span class="text-red-500">Error: Could not connect to backend API to load characters.</span>`;
            }
        }

        function typeLine(text, delay, isLast = false) {
            return new Promise(resolve => {
                setTimeout(() => {
                    const line = document.createElement('div');
                    line.className = 'log-entry mb-1';
                    if (text.includes('Error') || text.includes('failed')) {
                        line.classList.add('text-red-400');
                    } else if (text.includes('Winner') || text.includes('wins!')) {
                        line.classList.add('text-yellow-400', 'font-bold');
                    } else if (text.startsWith('>')) {
                         line.classList.add('text-blue-400');
                    }

                    line.innerHTML = `> ${text}`;
                    terminalContent.appendChild(line);

                    // Auto scroll to bottom
                    terminalContent.parentElement.scrollTop = terminalContent.parentElement.scrollHeight;
                    resolve();
                }, delay);
            });
        }

        async function handleSimulation() {
            const char1 = char1Select.value;
            const char2 = char2Select.value;
            const context = contextInput.value || "Neutral Arena";

            if (!char1 || !char2) {
                alert("Please select two fighters.");
                return;
            }

            if (char1 === char2) {
                alert("Please select different characters for a battle.");
                return;
            }

            // Reset UI
            resultsCard.classList.add('hidden');
            terminalContent.innerHTML = '';
            simulateBtn.disabled = true;
            simulateBtn.classList.add('opacity-50', 'cursor-not-allowed');

            try {
                const initMsg = document.createElement('div');
                initMsg.className = 'text-blue-400 mb-2 typing-cursor';
                initMsg.textContent = 'Initializing Simulation Protocol...';
                terminalContent.appendChild(initMsg);

                const response = await fetch('/api/battle', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ char1, char2, context })
                });

                if (!response.ok) {
                    throw new Error("Server returned " + response.status);
                }

                const data = await response.json();

                // Remove init message
                initMsg.remove();

                // Play animation logs
                for (let i = 0; i < data.logs.length; i++) {
                    await typeLine(data.logs[i], 800 + Math.random() * 500); // Random delay for realism
                }

                await typeLine(`SIMULATION COMPLETE. Analyzing results...`, 1000);

                // Show Results Card
                document.getElementById('res-char1-name').textContent = data.char1.name;
                document.getElementById('res-char1-trait').textContent = data.char1.archetype;

                document.getElementById('res-char2-name').textContent = data.char2.name;
                document.getElementById('res-char2-trait').textContent = data.char2.archetype;

                const winnerBadge = document.getElementById('winner-badge');
                if (data.winner === "Draw") {
                    winnerBadge.textContent = "DRAW";
                    winnerBadge.className = "inline-block px-4 py-2 bg-gradient-to-r from-slate-600 to-slate-400 text-white font-bold rounded-full shadow-lg transform scale-110";
                } else {
                    winnerBadge.textContent = data.winner + " WINS";
                    winnerBadge.className = "inline-block px-4 py-2 bg-gradient-to-r from-yellow-600 to-yellow-400 text-white font-bold rounded-full shadow-lg transform scale-110 text-xs sm:text-sm";
                }

                document.getElementById('match-summary').textContent = data.summary;

                resultsCard.classList.remove('hidden');

            } catch (error) {
                console.error("Simulation error", error);
                await typeLine(`FATAL ERROR: ${error.message}`, 100);
            } finally {
                simulateBtn.disabled = false;
                simulateBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            }
        }

        simulateBtn.addEventListener('click', handleSimulation);

        // Init
        loadCharacters();
    </script>
</body>
</html>
