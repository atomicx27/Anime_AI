<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Escape Room AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            background-image:
                radial-gradient(circle at 15% 50%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(168, 85, 247, 0.15) 0%, transparent 50%);
            background-attachment: fixed;
            min-height: 100vh;
        }
        .font-mono {
            font-family: 'Fira Code', monospace;
        }
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }
        .smooth-hover {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-hover:hover {
            background: rgba(51, 65, 85, 0.8);
            border-color: rgba(99, 102, 241, 0.4);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.2);
            transform: translateY(-2px);
        }
        .text-glow {
            text-shadow: 0 0 10px rgba(168, 85, 247, 0.5);
        }
        .loading-dots::after {
            content: '';
            animation: dots 1.5s steps(4, end) infinite;
        }
        @keyframes dots {
            0%, 20% { content: ''; }
            40% { content: '.'; }
            60% { content: '..'; }
            80%, 100% { content: '...'; }
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .animate-fade-in {
            animation: fadeInUp 0.6s ease-out forwards;
        }
        .stagger-1 { animation-delay: 0.1s; }
        .stagger-2 { animation-delay: 0.2s; }
        .stagger-3 { animation-delay: 0.3s; }
    </style>
</head>
<body class="p-6 md:p-12">
    <div class="max-w-5xl mx-auto space-y-8">

        <!-- Header -->
        <header class="text-center space-y-4 animate-fade-in">
            <h1 class="text-4xl md:text-5xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 to-purple-400 text-glow">
                Anime Escape Room AI
            </h1>
            <p class="text-slate-400 text-lg max-w-2xl mx-auto">
                Submit an escape room scenario. The Orchestrator AI will evaluate characters' traits and philosophies to assign them roles (Puzzle Solver, Scout, Leader, Muscle) to break out.
            </p>
        </header>

        <!-- Input Section -->
        <section class="glass-panel rounded-2xl p-6 md:p-8 animate-fade-in stagger-1">
            <form id="escapeForm" class="space-y-6">
                <div>
                    <label for="scenarioInput" class="block text-sm font-medium text-indigo-300 mb-2">Escape Room Scenario</label>
                    <textarea
                        id="scenarioInput"
                        rows="4"
                        class="w-full bg-slate-900/50 border border-slate-700 rounded-xl p-4 text-slate-200 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent smooth-hover"
                        placeholder="e.g., A haunted Victorian mansion with hidden pressure plates, a collapsing ceiling in the main hall, and a cryptic cipher locked in a grandfather clock..."></textarea>
                </div>
                <button
                    type="submit"
                    id="submitBtn"
                    class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 text-white font-semibold py-3 px-6 rounded-xl shadow-lg shadow-indigo-500/25 smooth-hover transform hover:-translate-y-0.5">
                    Initiate Escape
                </button>
            </form>
        </section>

        <!-- Loading State -->
        <div id="loadingState" class="hidden text-center py-12 animate-fade-in">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-indigo-900/50 mb-4">
                <svg class="w-8 h-8 text-indigo-400 animate-spin" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            </div>
            <p class="text-xl font-mono text-indigo-300">Orchestrator assigning roles<span class="loading-dots"></span></p>
        </div>

        <!-- Results Section -->
        <section id="resultsSection" class="hidden space-y-6">
            <div class="glass-panel rounded-2xl p-6 border-l-4 border-indigo-500">
                <h2 class="text-xl font-bold text-white mb-2">Scenario Analysis</h2>
                <p id="scenarioText" class="text-slate-300 italic"></p>
            </div>

            <h3 class="text-2xl font-bold text-purple-300 text-center mt-8 mb-6">The Escape Team</h3>

            <div id="teamGrid" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Team cards will be injected here -->
            </div>
        </section>

    </div>

    <script>
        document.getElementById('escapeForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const scenarioInput = document.getElementById('scenarioInput').value.trim();
            if (!scenarioInput) return;

            const submitBtn = document.getElementById('submitBtn');
            const loadingState = document.getElementById('loadingState');
            const resultsSection = document.getElementById('resultsSection');
            const scenarioText = document.getElementById('scenarioText');
            const teamGrid = document.getElementById('teamGrid');

            // Reset UI
            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-50', 'cursor-not-allowed');
            resultsSection.classList.add('hidden');
            loadingState.classList.remove('hidden');
            teamGrid.innerHTML = '';

            try {
                // We use relative path for production, but full localhost url handles both direct file:// and server setups if needed.
                // However, since it's served by FastAPI, relative is best.
                const response = await fetch('/api/escape', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ scenario: scenarioInput })
                });

                if (!response.ok) throw new Error('Failed to process scenario');

                const data = await response.json();

                scenarioText.textContent = `"${data.scenario}"`;

                data.team.forEach((member, index) => {
                    const delay = index * 0.1;

                    let roleColor = 'text-indigo-400';
                    let roleBg = 'bg-indigo-900/30';
                    let border = 'border-indigo-500/30';

                    if(member.role === 'Muscle') {
                        roleColor = 'text-red-400';
                        roleBg = 'bg-red-900/30';
                        border = 'border-red-500/30';
                    } else if (member.role === 'Leader') {
                        roleColor = 'text-yellow-400';
                        roleBg = 'bg-yellow-900/30';
                        border = 'border-yellow-500/30';
                    } else if (member.role === 'Scout') {
                        roleColor = 'text-green-400';
                        roleBg = 'bg-green-900/30';
                        border = 'border-green-500/30';
                    } else if (member.role === 'Puzzle Solver') {
                        roleColor = 'text-blue-400';
                        roleBg = 'bg-blue-900/30';
                        border = 'border-blue-500/30';
                    }

                    const card = `
                        <div class="glass-panel rounded-2xl p-6 glass-hover animate-fade-in flex flex-col h-full border ${border}" style="animation-delay: ${delay}s">
                            <div class="flex items-start space-x-4 mb-4">
                                <img src="${member.avatar}" alt="${member.name}" class="w-16 h-16 rounded-full bg-slate-800 border-2 border-slate-600 p-1">
                                <div>
                                    <h4 class="text-xl font-bold text-white">${member.name}</h4>
                                    <span class="inline-block mt-1 px-3 py-1 rounded-full text-xs font-semibold ${roleBg} ${roleColor} border ${border}">
                                        Role: ${member.role}
                                    </span>
                                </div>
                            </div>
                            <div class="flex-grow space-y-4">
                                <div>
                                    <h5 class="text-sm font-semibold text-slate-400 mb-1 uppercase tracking-wider">Action</h5>
                                    <p class="text-slate-200 text-sm leading-relaxed">${member.action}</p>
                                </div>
                                <div>
                                    <h5 class="text-sm font-semibold text-slate-400 mb-1 uppercase tracking-wider">Philosophy/Quality</h5>
                                    <p class="text-slate-300 text-sm italic">"${member.philosophy}"</p>
                                </div>
                            </div>
                        </div>
                    `;
                    teamGrid.insertAdjacentHTML('beforeend', card);
                });

                loadingState.classList.add('hidden');
                resultsSection.classList.remove('hidden');

            } catch (error) {
                console.error('Error:', error);
                alert('An error occurred while evaluating the escape room. Please ensure the backend is running.');
                loadingState.classList.add('hidden');
            } finally {
                submitBtn.disabled = false;
                submitBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            }
        });
    </script>
</body>
</html>
