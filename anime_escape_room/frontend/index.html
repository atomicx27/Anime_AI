<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Escape Room AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            background-image: radial-gradient(circle at top right, #1e293b, #0f172a);
            min-height: 100vh;
        }
        .mono { font-family: 'Fira Code', monospace; }

        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06), 0 0 15px rgba(56, 189, 248, 0.1);
        }

        .smooth-hover {
            transition: all 0.3s ease;
        }

        .smooth-hover:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05), 0 0 20px rgba(56, 189, 248, 0.3);
            border-color: rgba(56, 189, 248, 0.4);
        }

        .text-glow {
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
        }

        .typing-indicator {
            display: inline-block;
            width: 20px;
            text-align: left;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .cursor {
            animation: blink 1s step-end infinite;
            display: inline-block;
            width: 8px;
            height: 1.2em;
            background-color: #38bdf8;
            vertical-align: middle;
            margin-left: 2px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .role-card {
            animation: fadeIn 0.5s ease-out forwards;
            opacity: 0;
        }
    </style>
</head>
<body class="p-6 md:p-12">
    <div class="max-w-5xl mx-auto space-y-8">

        <header class="text-center space-y-4">
            <h1 class="text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-sky-400 to-indigo-500 text-glow">Anime Escape Room AI</h1>
            <p class="text-slate-400 text-lg">Submit an escape room scenario and watch the Orchestrator AI assemble a team to solve it.</p>
        </header>

        <section class="glass-panel p-6 rounded-2xl">
            <h2 class="text-xl font-semibold mb-4 text-sky-400">Describe the Scenario</h2>
            <div class="flex flex-col md:flex-row gap-4">
                <input type="text" id="scenarioInput" placeholder="e.g., A laser grid room filling with water..."
                    class="flex-1 bg-slate-800/50 border border-slate-600 rounded-xl px-4 py-3 text-slate-200 focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500 transition-colors">
                <button id="simulateBtn" onclick="runSimulation()" class="bg-gradient-to-r from-sky-500 to-indigo-600 hover:from-sky-400 hover:to-indigo-500 text-white font-semibold py-3 px-8 rounded-xl smooth-hover focus:outline-none focus:ring-2 focus:ring-sky-500 focus:ring-offset-2 focus:ring-offset-slate-900">
                    Run Simulation
                </button>
            </div>
        </section>

        <section id="terminalContainer" class="hidden glass-panel rounded-2xl overflow-hidden border border-slate-700">
            <div class="bg-slate-800/80 px-4 py-2 border-b border-slate-700 flex items-center gap-2">
                <div class="w-3 h-3 rounded-full bg-red-500"></div>
                <div class="w-3 h-3 rounded-full bg-yellow-500"></div>
                <div class="w-3 h-3 rounded-full bg-green-500"></div>
                <span class="ml-2 text-xs text-slate-400 mono">orchestrator_terminal.sh</span>
            </div>
            <div class="p-6 font-mono text-sm h-48 overflow-y-auto" id="terminalLog">
            </div>
        </section>

        <section id="resultsContainer" class="hidden">
            <h3 class="text-2xl font-bold mb-6 text-indigo-400 border-b border-slate-700 pb-2">The Escape Plan</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6" id="rolesGrid">
                <!-- Roles will be injected here -->
            </div>
        </section>

    </div>

    <script>
        const API_URL = 'http://localhost:8009/api/escape';

        async function typeLog(message, delay = 20) {
            const terminalLog = document.getElementById('terminalLog');
            const p = document.createElement('p');
            p.className = 'text-green-400 mb-2 flex items-center';
            const textSpan = document.createElement('span');
            p.innerHTML = '<span class="text-sky-400 mr-2">></span>';
            p.appendChild(textSpan);

            const cursor = document.createElement('span');
            cursor.className = 'cursor';
            p.appendChild(cursor);

            terminalLog.appendChild(p);

            for (let i = 0; i < message.length; i++) {
                textSpan.textContent += message.charAt(i);
                terminalLog.scrollTop = terminalLog.scrollHeight;
                await new Promise(r => setTimeout(r, delay));
            }
            cursor.remove();
        }

        async function runSimulation() {
            const scenario = document.getElementById('scenarioInput').value.trim();
            if (!scenario) return;

            const btn = document.getElementById('simulateBtn');
            const terminalContainer = document.getElementById('terminalContainer');
            const terminalLog = document.getElementById('terminalLog');
            const resultsContainer = document.getElementById('resultsContainer');
            const rolesGrid = document.getElementById('rolesGrid');

            btn.disabled = true;
            btn.innerHTML = '<span class="animate-pulse">Processing...</span>';

            terminalLog.innerHTML = '';
            terminalContainer.classList.remove('hidden');
            resultsContainer.classList.add('hidden');
            rolesGrid.innerHTML = '';

            try {
                await typeLog(`Initializing Orchestrator AI for scenario: "${scenario}"`);
                await typeLog("Accessing character database...");
                await typeLog("Analyzing core emotions and unique qualities...");
                await typeLog("Assigning optimal roles...");

                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ scenario: scenario })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();

                await typeLog("Simulation complete. Assembling escape plan...");
                setTimeout(() => {
                    displayResults(data.actions);
                    btn.disabled = false;
                    btn.innerText = 'Run Simulation';
                }, 1000);

            } catch (error) {
                await typeLog(`[ERROR] System failure: ${error.message}`, 10);
                btn.disabled = false;
                btn.innerText = 'Run Simulation';
            }
        }

        function displayResults(actions) {
            const resultsContainer = document.getElementById('resultsContainer');
            const rolesGrid = document.getElementById('rolesGrid');

            resultsContainer.classList.remove('hidden');

            actions.forEach((act, index) => {
                let roleColor = 'text-sky-400';
                if(act.role === 'The Muscle') roleColor = 'text-red-400';
                if(act.role === 'The Puzzle Solver') roleColor = 'text-yellow-400';
                if(act.role === 'The Wildcard') roleColor = 'text-purple-400';

                const card = document.createElement('div');
                card.className = 'glass-panel rounded-xl p-6 role-card smooth-hover flex flex-col h-full';
                card.style.animationDelay = `${index * 0.15}s`;

                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4 border-b border-slate-700/50 pb-3">
                        <div>
                            <h4 class="text-sm uppercase tracking-wider font-bold ${roleColor}">${act.role}</h4>
                            <h3 class="text-2xl font-bold text-slate-100">${act.character_name}</h3>
                        </div>
                    </div>
                    <div class="text-slate-300 leading-relaxed flex-grow">
                        ${act.action}
                    </div>
                `;
                rolesGrid.appendChild(card);
            });

            // Scroll to results
            setTimeout(() => {
                resultsContainer.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 100);
        }
    </script>
</body>
</html>
