<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Life Coach AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at center, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #e2e8f0;
            min-height: 100vh;
        }
        .fira-code { font-family: 'Fira Code', monospace; }

        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .glass-hover:hover {
            background: rgba(30, 41, 59, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2), 0 4px 6px -2px rgba(0, 0, 0, 0.1);
            transform: translateY(-2px);
        }

        .text-glow {
            text-shadow: 0 0 10px rgba(96, 165, 250, 0.5);
        }

        .smooth-hover {
            transition: all 0.3s ease;
        }

        .terminal-container {
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid rgba(56, 189, 248, 0.3);
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .typing-effect {
            overflow: hidden;
            white-space: pre-wrap;
            animation: typing 2s steps(40, end);
        }

        .hidden { display: none !important; }

        .role-Motivational { border-left: 4px solid #facc15; }
        .role-Strategic { border-left: 4px solid #60a5fa; }
        .role-Empathetic { border-left: 4px solid #f472b6; }
        .role-Tough-Love { border-left: 4px solid #ef4444; }

    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="text-center mb-12">
            <h1 class="text-5xl font-bold mb-4 text-glow text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500">Anime Life Coach AI</h1>
            <p class="text-xl text-gray-300">Submit your problem or goal, and let our diverse anime council guide you.</p>
        </header>

        <main class="grid grid-cols-1 lg:grid-cols-3 gap-8">

            <section class="lg:col-span-1">
                <div class="glass-panel rounded-2xl p-6">
                    <h2 class="text-2xl font-semibold mb-4 text-blue-300">Your Situation</h2>
                    <textarea id="problem-input" rows="6" class="w-full bg-slate-800/50 border border-slate-600 rounded-lg p-4 text-gray-200 placeholder-gray-400 focus:outline-none focus:border-blue-400 smooth-hover" placeholder="Describe your problem, goal, or feeling... (e.g., 'I feel lost in my career', 'I want to get stronger but lack motivation')"></textarea>
                    <button id="consult-btn" class="w-full mt-4 bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-500 hover:to-purple-500 text-white font-bold py-3 px-6 rounded-lg smooth-hover shadow-[0_0_15px_rgba(59,130,246,0.5)]">
                        Consult the Council
                    </button>
                </div>

                <div id="terminal-section" class="mt-8 terminal-container rounded-xl p-4 hidden">
                    <div class="flex items-center mb-2 border-b border-slate-700 pb-2">
                        <div class="w-3 h-3 rounded-full bg-red-500 mr-2"></div>
                        <div class="w-3 h-3 rounded-full bg-yellow-500 mr-2"></div>
                        <div class="w-3 h-3 rounded-full bg-green-500 mr-2"></div>
                        <span class="fira-code text-xs text-slate-400 ml-2">agent_system.log</span>
                    </div>
                    <div id="terminal-logs" class="fira-code text-sm text-green-400 space-y-1 h-48 overflow-y-auto">
                    </div>
                </div>
            </section>

            <section class="lg:col-span-2 relative min-h-[500px]">

                <div id="empty-state" class="absolute inset-0 flex flex-col items-center justify-center text-gray-500">
                    <svg class="w-24 h-24 mb-4 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8h2a2 2 0 012 2v6a2 2 0 01-2 2h-2v4l-4-4H9a1.994 1.994 0 01-1.414-.586m0 0L11 14h4a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2v4l.586-.586z"></path></svg>
                    <p class="text-xl">Waiting for consultation...</p>
                </div>

                <div id="loading-state" class="hidden absolute inset-0 flex flex-col items-center justify-center z-10 glass-panel rounded-2xl">
                    <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-blue-500 mb-4"></div>
                    <p class="text-lg text-blue-300 animate-pulse">Summoning coaches...</p>
                </div>

                <div id="results-container" class="hidden grid grid-cols-1 md:grid-cols-2 gap-4">
                    <!-- Cards will be injected here -->
                </div>

            </section>
        </main>
    </div>

    <script>
        const consultBtn = document.getElementById('consult-btn');
        const problemInput = document.getElementById('problem-input');
        const terminalSection = document.getElementById('terminal-section');
        const terminalLogs = document.getElementById('terminal-logs');
        const emptyState = document.getElementById('empty-state');
        const loadingState = document.getElementById('loading-state');
        const resultsContainer = document.getElementById('results-container');

        const delay = ms => new Promise(res => setTimeout(res, ms));

        consultBtn.addEventListener('click', async () => {
            const problem = problemInput.value.trim();
            if (!problem) return;

            // UI Reset
            emptyState.classList.add('hidden');
            resultsContainer.classList.add('hidden');
            resultsContainer.innerHTML = '';
            terminalLogs.innerHTML = '';

            terminalSection.classList.remove('hidden');
            loadingState.classList.remove('hidden');

            try {
                const response = await fetch('http://localhost:8010/api/coach', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ problem: problem })
                });

                if (!response.ok) throw new Error('API request failed');

                const data = await response.json();

                // Animate logs
                for (const log of data.logs) {
                    const logEl = document.createElement('div');
                    logEl.className = 'opacity-0 transition-opacity duration-300';
                    logEl.textContent = `> ${log}`;
                    terminalLogs.appendChild(logEl);
                    // Trigger reflow
                    void logEl.offsetWidth;
                    logEl.classList.remove('opacity-0');
                    terminalLogs.scrollTop = terminalLogs.scrollHeight;
                    await delay(400);
                }

                await delay(500);
                loadingState.classList.add('hidden');
                resultsContainer.classList.remove('hidden');

                // Render Cards
                data.coaches.forEach((coach, index) => {
                    setTimeout(() => {
                        const roleClass = coach.role.replace(' ', '-');
                        let badgeColor = '';
                        if(coach.role === 'Motivational') badgeColor = 'bg-yellow-500/20 text-yellow-300 border-yellow-500/50';
                        if(coach.role === 'Strategic') badgeColor = 'bg-blue-500/20 text-blue-300 border-blue-500/50';
                        if(coach.role === 'Empathetic') badgeColor = 'bg-pink-500/20 text-pink-300 border-pink-500/50';
                        if(coach.role === 'Tough Love') badgeColor = 'bg-red-500/20 text-red-300 border-red-500/50';

                        const card = document.createElement('div');
                        card.className = `glass-panel rounded-xl p-5 smooth-hover glass-hover flex flex-col h-full role-${roleClass} opacity-0 translate-y-4 transition-all duration-500`;

                        card.innerHTML = `
                            <div class="flex justify-between items-start mb-3">
                                <div>
                                    <h3 class="text-xl font-bold text-white">${coach.character.name}</h3>
                                    <p class="text-xs text-gray-400 mt-1">${coach.character.archetype}</p>
                                </div>
                                <span class="text-xs px-2 py-1 rounded-full border ${badgeColor}">${coach.role}</span>
                            </div>
                            <div class="mb-4">
                                <p class="text-xs text-purple-300 mb-1">Core Drive:</p>
                                <p class="text-sm text-gray-300 italic">"${coach.character.core_emotion}"</p>
                            </div>
                            <div class="bg-slate-800/60 p-4 rounded-lg mt-auto relative">
                                <span class="absolute top-2 left-2 text-3xl text-gray-500/30 font-serif">"</span>
                                <p class="text-sm text-gray-200 relative z-10 leading-relaxed">${coach.advice}</p>
                            </div>
                        `;
                        resultsContainer.appendChild(card);

                        // Animate in
                        requestAnimationFrame(() => {
                            card.classList.remove('opacity-0', 'translate-y-4');
                        });
                    }, index * 300);
                });


            } catch (error) {
                console.error(error);
                loadingState.classList.add('hidden');
                terminalLogs.innerHTML += `<div class="text-red-500">> Error: Connection to AI Agent failed.</div>`;
            }
        });
    </script>
</body>
</html>
