<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Team Builder AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #e2e8f0;
            font-family: 'Inter', sans-serif;
        }
        .glass {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }
        .card-enter {
            animation: slideUp 0.5s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
        }
        .card-enter:hover {
            transform: translateY(-5px) !important;
            box-shadow: 0 10px 30px rgba(168, 85, 247, 0.5);
            border-color: rgba(168, 85, 247, 0.5);
        }
        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .score-bar {
            width: 0%;
            transition: width 1.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .terminal {
            background-color: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            color: #4ade80;
            font-family: monospace;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body class="min-h-screen p-8 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-slate-900 via-purple-900 to-black relative overflow-x-hidden">
    <!-- Ambient Background Glows -->
    <div class="absolute top-[-10%] left-[-10%] w-[50vw] h-[50vw] bg-purple-600/20 rounded-full blur-[120px] pointer-events-none"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[50vw] h-[50vw] bg-blue-600/20 rounded-full blur-[120px] pointer-events-none"></div>

    <div class="max-w-6xl mx-auto relative z-10">
        <header class="text-center mb-12">
            <h1 class="text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-500 drop-shadow-sm mb-4">
                Anime Team Builder AI
            </h1>
            <p class="text-lg text-slate-300 drop-shadow-sm">Describe a complex mission, and our AI Commander will assemble the perfect anime squad.</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1">
                <div class="glass p-6 rounded-2xl shadow-2xl">
                    <h2 class="text-2xl font-bold mb-4 text-white drop-shadow-sm">Mission Briefing</h2>
                    <form id="mission-form" class="space-y-4">
                        <div>
                            <label for="mission" class="block text-sm font-medium text-slate-300 mb-2">Describe the mission objective:</label>
                            <textarea id="mission" name="mission" rows="5" class="w-full bg-slate-900/50 border border-slate-600/50 rounded-lg p-3 text-white focus:ring-2 focus:ring-purple-500/50 focus:border-purple-500/50 focus:outline-none transition-all shadow-inner placeholder-slate-500" placeholder="e.g., Infiltrate the enemy base, disable the magical barrier, and extract the hostage without raising any alarms." required></textarea>
                        </div>
                        <div>
                            <label for="team_size" class="block text-sm font-medium text-slate-300 mb-2">Team Size:</label>
                            <input type="number" id="team_size" name="team_size" value="3" min="1" max="5" class="w-full bg-slate-900/50 border border-slate-600/50 rounded-lg p-3 text-white focus:ring-2 focus:ring-purple-500/50 focus:border-purple-500/50 focus:outline-none transition-all shadow-inner">
                        </div>
                        <button type="submit" id="submit-btn" class="w-full bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-500 hover:to-pink-500 text-white font-bold py-3 px-4 rounded-lg transition-all duration-300 shadow-[0_0_15px_rgba(168,85,247,0.4)] transform hover:-translate-y-1">
                            Assemble Team
                        </button>
                    </form>
                </div>

                <div class="mt-8 terminal p-4 rounded-xl h-64 overflow-y-auto drop-shadow-lg" id="thought-terminal">
                    <div class="text-xs mb-2 opacity-50">/// COMMANDER TERMINAL ///</div>
                    <div id="logs-container" class="space-y-1 text-sm drop-shadow-[0_0_2px_rgba(74,222,128,0.5)]">
                        <div>Awaiting mission briefing...</div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div class="glass p-6 rounded-2xl shadow-2xl min-h-[600px]">
                    <h2 class="text-2xl font-bold mb-6 text-white border-b border-slate-600/50 pb-2 drop-shadow-sm">Selected Operatives</h2>

                    <div id="loading-state" class="hidden flex flex-col items-center justify-center h-full pt-32">
                        <div class="animate-spin rounded-full h-16 w-16 border-t-2 border-b-2 border-purple-500 mb-4 drop-shadow-[0_0_10px_rgba(168,85,247,0.5)]"></div>
                        <p class="text-purple-300 animate-pulse drop-shadow-sm">Commander is analyzing candidates...</p>
                    </div>

                    <div id="team-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <!-- Character cards will be injected here -->
                        <div class="text-slate-400 italic col-span-2 text-center mt-32">No team assembled yet. Submit a mission to begin.</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('mission-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const missionInput = document.getElementById('mission').value;
            const teamSizeInput = parseInt(document.getElementById('team_size').value);
            const submitBtn = document.getElementById('submit-btn');
            const loadingState = document.getElementById('loading-state');
            const teamGrid = document.getElementById('team-grid');
            const logsContainer = document.getElementById('logs-container');

            // UI Reset & Loading State
            submitBtn.disabled = true;
            submitBtn.innerHTML = 'Assembling...';
            submitBtn.classList.add('opacity-75', 'cursor-not-allowed');
            teamGrid.innerHTML = '';
            loadingState.classList.remove('hidden');
            logsContainer.innerHTML = '<div>> Initiating protocol...</div>';

            try {
                const response = await fetch('/api/build-team', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        mission: missionInput,
                        team_size: teamSizeInput
                    }),
                });

                if (!response.ok) {
                    throw new Error('Network response was not ok');
                }

                const data = await response.json();

                // Process Logs with artificial delay for effect
                logsContainer.innerHTML = '';
                for (let i = 0; i < data.logs.length; i++) {
                    setTimeout(() => {
                        const logEntry = document.createElement('div');
                        logEntry.textContent = `> ${data.logs[i]}`;
                        logsContainer.appendChild(logEntry);
                        logsContainer.parentElement.scrollTop = logsContainer.parentElement.scrollHeight;
                    }, i * 300);
                }

                // Render Team Cards after a short delay
                setTimeout(() => {
                    loadingState.classList.add('hidden');

                    data.team.forEach((member, index) => {
                        const card = document.createElement('div');
                        card.className = 'bg-slate-800/60 backdrop-blur-md rounded-xl p-5 border border-white/10 border-l-4 border-l-purple-500 shadow-[0_4px_15px_rgba(0,0,0,0.3)] card-enter';
                        card.style.animationDelay = `${index * 0.2}s`;

                        card.innerHTML = `
                            <div class="flex justify-between items-start mb-3">
                                <h3 class="text-xl font-bold text-white drop-shadow-md">${member.name}</h3>
                                <span class="bg-purple-900/80 border border-purple-500/30 text-purple-200 text-xs font-semibold px-2.5 py-0.5 rounded shadow-sm">${member.role}</span>
                            </div>
                            <p class="text-sm text-slate-400 mb-2 font-medium">Archetype: <span class="text-slate-300">${member.archetype}</span></p>
                            <p class="text-sm text-slate-200 italic mb-4 drop-shadow-sm">"${member.reasoning}"</p>
                            <div class="mt-auto">
                                <div class="w-full bg-slate-900/80 rounded-full h-2.5 border border-white/5 shadow-inner">
                                  <div class="bg-gradient-to-r from-purple-500 to-pink-500 h-2.5 rounded-full score-bar shadow-[0_0_10px_rgba(236,72,153,0.5)]" id="score-bar-${index}"></div>
                                </div>
                                <div class="text-xs text-right mt-1.5 text-slate-400 font-medium">Aptitude Score: <span class="text-pink-400 drop-shadow-sm">${member.score}</span></div>
                            </div>
                        `;
                        teamGrid.appendChild(card);

                        // Trigger transition after appending
                        setTimeout(() => {
                            const bar = document.getElementById(`score-bar-${index}`);
                            if (bar) {
                                bar.style.width = `${Math.min(100, Math.max(10, member.score))}%`;
                            }
                        }, 50);
                    });
                }, data.logs.length * 300 + 500);

            } catch (error) {
                loadingState.classList.add('hidden');
                logsContainer.innerHTML += `<div class="text-red-500">> Error: ${error.message}</div>`;
                teamGrid.innerHTML = `<div class="text-red-400 col-span-2 text-center mt-32">Failed to assemble team. Communication with Commander agent lost.</div>`;
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Assemble Team';
                submitBtn.classList.remove('opacity-75', 'cursor-not-allowed');
            }
        });
    </script>
</body>
</html>
