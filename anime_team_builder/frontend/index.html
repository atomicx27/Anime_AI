<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Team Builder AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #e2e8f0;
            font-family: 'Inter', sans-serif;
        }
        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .card-enter {
            animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(30px) scale(0.95);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease, border-color 0.4s ease;
        }
        .card-enter:hover {
            transform: translateY(-8px) scale(1.02) !important;
            box-shadow: 0 20px 30px -10px rgba(168, 85, 247, 0.5), 0 0 15px rgba(168, 85, 247, 0.2);
            border-color: rgba(168, 85, 247, 0.8);
            z-index: 10;
        }
        @keyframes slideUpFade {
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        .score-bar {
            width: 0%;
            transition: width 1.8s cubic-bezier(0.22, 1, 0.36, 1);
            position: relative;
            overflow: hidden;
        }
        .score-bar::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            animation: shimmer 2s infinite;
        }
        @keyframes shimmer {
            100% { left: 200%; }
        }
        .terminal {
            background-color: #000;
            color: #0f0;
            font-family: monospace;
        }
    </style>
</head>
<body class="min-h-screen p-8 bg-gradient-to-br from-slate-900 via-purple-900 to-slate-900">
    <div class="max-w-6xl mx-auto">
        <header class="text-center mb-12">
            <h1 class="text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-600 mb-4">
                Anime Team Builder AI
            </h1>
            <p class="text-lg text-slate-300">Describe a complex mission, and our AI Commander will assemble the perfect anime squad.</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1">
                <div class="glass p-6 rounded-2xl shadow-xl">
                    <h2 class="text-2xl font-bold mb-4 text-white">Mission Briefing</h2>
                    <form id="mission-form" class="space-y-4">
                        <div>
                            <label for="mission" class="block text-sm font-medium text-slate-300 mb-2">Describe the mission objective:</label>
                            <textarea id="mission" name="mission" rows="5" class="w-full bg-slate-800 border border-slate-600 rounded-lg p-3 text-white focus:ring-2 focus:ring-purple-500 focus:outline-none" placeholder="e.g., Infiltrate the enemy base, disable the magical barrier, and extract the hostage without raising any alarms." required></textarea>
                        </div>
                        <div>
                            <label for="team_size" class="block text-sm font-medium text-slate-300 mb-2">Team Size:</label>
                            <input type="number" id="team_size" name="team_size" value="3" min="1" max="5" class="w-full bg-slate-800 border border-slate-600 rounded-lg p-3 text-white focus:ring-2 focus:ring-purple-500 focus:outline-none">
                        </div>
                        <button type="submit" id="submit-btn" class="w-full bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-500 hover:to-pink-500 text-white font-bold py-3 px-4 rounded-lg transition duration-300 shadow-lg transform hover:-translate-y-1">
                            Assemble Team
                        </button>
                    </form>
                </div>

                <div class="mt-8 terminal p-4 rounded-xl shadow-inner h-64 overflow-y-auto" id="thought-terminal">
                    <div class="text-xs mb-2 opacity-50">/// COMMANDER TERMINAL ///</div>
                    <div id="logs-container" class="space-y-1 text-sm">
                        <div>Awaiting mission briefing...</div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div class="glass p-6 rounded-2xl shadow-xl min-h-[600px]">
                    <h2 class="text-2xl font-bold mb-6 text-white border-b border-slate-600 pb-2">Selected Operatives</h2>

                    <div id="loading-state" class="hidden flex flex-col items-center justify-center h-full pt-32">
                        <div class="animate-spin rounded-full h-16 w-16 border-t-2 border-b-2 border-purple-500 mb-4"></div>
                        <p class="text-purple-300 animate-pulse">Commander is analyzing candidates...</p>
                    </div>

                    <div id="team-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <!-- Character cards will be injected here -->
                        <div class="text-slate-400 italic col-span-2 text-center mt-32">No team assembled yet. Submit a mission to begin.</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('mission-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const missionInput = document.getElementById('mission').value;
            const teamSizeInput = parseInt(document.getElementById('team_size').value);
            const submitBtn = document.getElementById('submit-btn');
            const loadingState = document.getElementById('loading-state');
            const teamGrid = document.getElementById('team-grid');
            const logsContainer = document.getElementById('logs-container');

            // UI Reset & Loading State
            submitBtn.disabled = true;
            submitBtn.innerHTML = 'Assembling...';
            submitBtn.classList.add('opacity-75', 'cursor-not-allowed');
            teamGrid.innerHTML = '';
            loadingState.classList.remove('hidden');
            logsContainer.innerHTML = '<div>> Initiating protocol...</div>';

            try {
                const response = await fetch('/api/build-team', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        mission: missionInput,
                        team_size: teamSizeInput
                    }),
                });

                if (!response.ok) {
                    throw new Error('Network response was not ok');
                }

                const data = await response.json();

                // Process Logs with artificial delay for effect
                logsContainer.innerHTML = '';
                for (let i = 0; i < data.logs.length; i++) {
                    setTimeout(() => {
                        const logEntry = document.createElement('div');
                        logEntry.textContent = `> ${data.logs[i]}`;
                        logsContainer.appendChild(logEntry);
                        logsContainer.parentElement.scrollTop = logsContainer.parentElement.scrollHeight;
                    }, i * 300);
                }

                // Render Team Cards after a short delay
                setTimeout(() => {
                    loadingState.classList.add('hidden');

                    data.team.forEach((member, index) => {
                        const card = document.createElement('div');
                        card.className = 'bg-slate-800 rounded-xl p-5 border-l-4 border-purple-500 shadow-md card-enter';
                        card.style.animationDelay = `${index * 0.2}s`;

                        card.innerHTML = `
                            <div class="flex justify-between items-start mb-4">
                                <div>
                                    <h3 class="text-xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-white to-slate-300 tracking-wide">${member.name}</h3>
                                    <p class="text-xs text-purple-400 font-medium tracking-wider uppercase mt-1">${member.archetype}</p>
                                </div>
                                <span class="bg-purple-900/80 border border-purple-500/30 text-purple-200 text-xs font-bold px-3 py-1 rounded-full shadow-[0_0_10px_rgba(168,85,247,0.2)]">${member.role}</span>
                            </div>
                            <div class="bg-slate-900/50 rounded-lg p-3 border border-slate-700/50 mb-5 flex-grow">
                                <p class="text-sm text-slate-300 italic leading-relaxed">"${member.reasoning}"</p>
                            </div>
                            <div class="mt-auto pt-2">
                                <div class="flex justify-between items-center mb-1">
                                    <span class="text-xs font-semibold text-slate-400 uppercase">Aptitude</span>
                                    <span class="text-xs font-bold text-pink-400">${member.score}/100</span>
                                </div>
                                <div class="w-full bg-slate-900 rounded-full h-3 border border-slate-700 shadow-inner overflow-hidden">
                                  <div class="bg-gradient-to-r from-purple-600 via-pink-500 to-purple-500 h-full rounded-full score-bar shadow-[0_0_10px_rgba(236,72,153,0.5)]" id="score-bar-${index}"></div>
                                </div>
                            </div>
                        `;
                        teamGrid.appendChild(card);

                        // Trigger transition after appending
                        setTimeout(() => {
                            const bar = document.getElementById(`score-bar-${index}`);
                            if (bar) {
                                bar.style.width = `${Math.min(100, Math.max(10, member.score))}%`;
                            }
                        }, 50);
                    });
                }, data.logs.length * 300 + 500);

            } catch (error) {
                loadingState.classList.add('hidden');
                logsContainer.innerHTML += `<div class="text-red-500">> Error: ${error.message}</div>`;
                teamGrid.innerHTML = `<div class="text-red-400 col-span-2 text-center mt-32">Failed to assemble team. Communication with Commander agent lost.</div>`;
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Assemble Team';
                submitBtn.classList.remove('opacity-75', 'cursor-not-allowed');
            }
        });
    </script>
</body>
</html>
